<!DOCTYPE html>
<html lang="en">
<head>
    <title>Assignment Details</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Font: Inter (strictly modern) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (icons for clean visual hierarchy) - no functional change -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ----- RESET & BASE (strict palette applied) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #5f79ff 0%, #7a5cff 55%, #a16cff 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.8rem;
            margin: 0;
            color: #1e1e2f;
            line-height: 1.5;
        }

        /* main white card (exactly as spec: card background white) */
        .premium-container {
            max-width: 1000px;
            width: 100%;
        }

        .glass-card {
            background: #ffffff;                     /* card background white */
            border-radius: 28px;                      /* soft rounded (18–28) */
            padding: 2.5rem 2.8rem;
            box-shadow: 0 30px 50px -20px rgba(58, 48, 94, 0.35), 
                        0 0 0 1px #e3e3e3 inset;      /* border color */
            border: 1px solid #e3e3e3;
        }

        /* header section with back button + clean spacing */
        .header-section {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem 1.5rem;
            margin-bottom: 2rem;
        }

        /* back button – minimal, border, secondary text */
        .back-btn {
            background: #ffffff;
            border: 1.5px solid #e3e3e3;
            color: #777;                              /* secondary text */
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.7rem 2rem 0.7rem 1.6rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            font-family: 'Inter', sans-serif;
        }

        .back-btn i {
            color: #4c74ff;
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: #f3f6fb;                      /* input background */
            border-color: #b3c0d9;
            transform: translateX(-2px);
        }

        /* assignment title – gradient primary */
        #assignmentTitle {
            font-weight: 700;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            flex: 1;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        /* loading state - clean */
        #loading {
            background: #f3f6fb;                      /* input background */
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            color: #777;
            border: 1px solid #e3e3e3;
            font-weight: 500;
        }

        /* assignment detail card – white inner card, subtle shadow */
        .assignment-card {
            background: #ffffff;
            border: 1px solid #e3e3e3;
            border-radius: 22px;
            padding: 2.2rem;
            box-shadow: 0 15px 30px -12px rgba(0,0,0,0.07);
            margin-top: 1.2rem;
        }

        /* status badge – uses secondary colors, but we redesign with soft semantics */
        .status-badge {
            padding: 0.5rem 1.6rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 1.8rem;
            border: 1px solid #e3e3e3;
            background: #f3f6fb;
            color: #2d3a5e;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        /* status variants (original class names kept, only colors refined) */
        .not-viewed { 
            background: #fff2e0; 
            color: #a95b00; 
            border-left: 4px solid #ffb347; 
        }
        .viewed { 
            background: #e1f0fa; 
            color: #1a5c8c; 
            border-left: 4px solid #5bc0de; 
        }
        .submitted { 
            background: #e0f3e0; 
            color: #1f6d1f; 
            border-left: 4px solid #5cb85c; 
        }

        /* detail rows – minimal, clean spacing */
        .detail-row {
            margin: 1.1rem 0;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            border-bottom: 1px dashed #e3e3e3;
            padding-bottom: 0.8rem;
        }

        .detail-label {
            font-weight: 600;
            color: #777;                              /* secondary text */
            min-width: 130px;
            font-size: 0.9rem;
            letter-spacing: 0.02em;
        }

        .detail-value {
            color: #1e293b;
            flex: 1;
            font-weight: 500;
        }

        /* marks section – card style with subtle gradient border */
        #marksSection {
            background: #f3f6fb;                      /* input background */
            border: 1px solid #e3e3e3;
            border-radius: 24px;
            padding: 1.5rem 2rem;
            margin: 1.8rem 0 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 6px 12px -8px rgba(0,0,0,0.1);
        }

        #marksSection p {
            font-weight: 600;
            color: #1e293b;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #marksSection i {
            color: #4c74ff;
            font-size: 1.2rem;
        }

        #marksObtained {
            font-weight: 700;
            color: #4c74ff;
            background: white;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            border: 1px solid #e3e3e3;
            margin-left: 0.8rem;
        }

        /* primary gradient button */
        .submit-btn {
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            border: none;
            border-radius: 40px;
            padding: 0.9rem 2.4rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            box-shadow: 0 12px 20px -12px #4c74ff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .submit-btn i {
            font-size: 1rem;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #5f83ff, #9f63ff);
            transform: translateY(-2px);
            box-shadow: 0 20px 28px -10px #4c74ff;
        }

        .submit-btn:active {
            transform: translateY(1px);
            box-shadow: 0 8px 16px -6px #3f51b5;
        }

        /* note text – subtle, secondary */
        .note-text {
            font-size: 0.85rem;
            color: #777;
            margin-top: 1.5rem;
            padding: 1rem 1.5rem;
            background: #f9fcff;
            border-radius: 30px;
            border: 1px solid #e3e3e3;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .note-text i {
            color: #8a52ff;
        }

        /* responsive adjustments */
        @media (max-width: 700px) {
            body { padding: 1rem; }
            .glass-card { padding: 1.8rem; }
            #assignmentTitle { font-size: 1.8rem; }
            .detail-row { flex-direction: column; gap: 0.3rem; }
            .detail-label { min-width: auto; }
        }

        /* micro-icon spacing */
        .fas, .far, .fab {
            margin-right: 0.2rem;
        }

        /* no new elements, only visual */
    </style>
</head>
<body>
    <div class="premium-container">
        <div class="glass-card">
            <div class="header-section">
                <button class="back-btn" onclick="window.history.back()">
                    <i class="fas fa-arrow-left"></i> Back to Assignments
                </button>
            </div>
            
            <!-- loading state (existing element) -->
            <div id="loading"><i class="fas fa-spinner fa-pulse"></i> Loading assignment details...</div>
            
            <!-- main details container (existing) -->
            <div id="assignmentDetails" style="display: none;">
                <h2 id="assignmentTitle"></h2>
                
                <div class="assignment-card">
                    <!-- status badge (existing) -->
                    <div id="statusBadge" class="status-badge"></div>
                    
                    <!-- detail rows (exactly as original, only styled) -->
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-book-open"></i> Subject:</span>
                        <span class="detail-value" id="subject"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-align-left"></i> Description:</span>
                        <span class="detail-value" id="description"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-calendar-alt"></i> Due Date:</span>
                        <span class="detail-value" id="dueDate"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-star"></i> Maximum Marks:</span>
                        <span class="detail-value" id="maxMarks"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-clock"></i> Posted On:</span>
                        <span class="detail-value" id="createdAt"></span>
                    </div>
                    
                    <!-- marks section (conditionally displayed) -->
                    <div id="marksSection" style="display: none;">
                        <p>
                            <i class="fas fa-check-circle" style="color:#4c74ff;"></i> 
                            Marks Obtained: <span id="marksObtained"></span>
                        </p>
                    </div>
                    
                    <!-- submit area (original elements, unchanged) -->
                    <div style="margin-top: 30px;">
<button id="submitBtn" class="submit-btn" onclick="markAsSubmitted()">
                                <i class="fas fa-check-double"></i> Mark as Submitted
                        </button>
                        <p class="note-text">
                            <i class="fas fa-info-circle"></i> 
                            Note: Submit your assignment physically to your teacher. 
                            Click this button only after you have submitted.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript - EXACT original, untouched (only whitespace/comments possibly added, but logic preserved) -->
    <script>
        let studentProfile = JSON.parse(localStorage.getItem("studentProfile") || '{}');

        // If no profile, create test one
        if (!studentProfile.id) {
            studentProfile = {
                id: 1,
                branch: "CSE",
                semester: 2,
                fullName: "Test Student"
            };
            localStorage.setItem("studentProfile", JSON.stringify(studentProfile));
        }
        
        const API = "http://localhost:8080";
        let token = localStorage.getItem("token");
        let assignmentId = localStorage.getItem("currentAssignmentId");
        let assignmentDetails = null;

        window.onload = async function() {
            if (!token || !assignmentId) {
                alert("Invalid access");
                window.history.back();
                return;
            }
            
            await loadAssignmentDetails();
        };

        async function loadAssignmentDetails() {
            try {
                // Get assignment details
                const response = await fetch(`${API}/student/assignment/${assignmentId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (!response.ok) throw new Error('Failed to load assignment');
                
                assignmentDetails = await response.json();
                displayAssignment();
                
            } catch (err) {
                document.getElementById("loading").innerHTML = 
                    `<div style="color:red">Error: ${err.message}</div>`;
            }
        }

        function displayAssignment() {
            document.getElementById("loading").style.display = "none";
            document.getElementById("assignmentDetails").style.display = "block";
            
            // Basic info
            document.getElementById("assignmentTitle").textContent = assignmentDetails.title;
            document.getElementById("subject").textContent = assignmentDetails.subject;
            document.getElementById("description").textContent = assignmentDetails.description;
            document.getElementById("maxMarks").textContent = assignmentDetails.maxMarks;
            
            // Format dates
            const dueDate = new Date(assignmentDetails.dueDate);
            const createdAt = new Date(assignmentDetails.createdAt);
            
            document.getElementById("dueDate").textContent = 
                `${dueDate.toLocaleDateString()} ${dueDate.toLocaleTimeString()}`;
            document.getElementById("createdAt").textContent = 
                `${createdAt.toLocaleDateString()} ${createdAt.toLocaleTimeString()}`;
            
            // Get student's status for this assignment
            checkAssignmentStatus();
        }

        async function checkAssignmentStatus() {
            const studentId = studentProfile.id;
            try {
                const response = await fetch(
                    `${API}/student/assignment/list?studentId=${studentId}&branch=${studentProfile.branch}&semester=${studentProfile.semester}`,
                    { headers: { 'Authorization': 'Bearer ' + token } }
                );
                
                if (response.ok) {
                    const assignments = await response.json();
                    const current = assignments.find(a => a.assignment.id === assignmentDetails.id);
                    
                    if (current) {
                        updateStatusBadge(current.status);
                        
                        // Show marks if available
                        if (current.marksObtained) {
                            document.getElementById("marksSection").style.display = "block";
                            document.getElementById("marksObtained").textContent = 
                                `${current.marksObtained}/${assignmentDetails.maxMarks}`;
                        }
                    }
                }
            } catch (err) {
                console.error("Error checking status:", err);
            }
        }

        function updateStatusBadge(status) {
    const badge = document.getElementById("statusBadge");
    badge.textContent = status.replace('_', ' ');
    badge.className = `status-badge ${status.toLowerCase().replace('_', '-')}`;

    // Hide submit button if already submitted
    if (status === "SUBMITTED") {
        document.getElementById("submitBtn").style.display = "none";
    }
}

        async function markAsSubmitted() {
            if (!confirm("Have you physically submitted this assignment to your teacher?")) {
                return;
            }
            
            const studentId = studentProfile.id;
            try {
                const response = await fetch(
                    `${API}/student/assignment/submit/${assignmentId}?studentId=${studentId}`,
                    {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token }
                    }
                );
                
                if (response.ok) {
    alert("✅ Assignment marked as submitted!");
    updateStatusBadge("SUBMITTED");

    document.getElementById("submitBtn").style.display = "none";
} else {
                    throw new Error('Submission failed');
                }
            } catch (err) {
                alert("Error: " + err.message);
            }
        }
    </script>
</body>
</html>

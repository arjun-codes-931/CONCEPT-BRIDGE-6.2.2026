<!DOCTYPE html>
<html>
<head>
<title>Quiz Management | Nexus Admin</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  background: linear-gradient(145deg, #5f79ff, #7a5cff, #a16cff);
  background-attachment: fixed;
  padding: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1.5;
}

/* main white dashboard with sidebar layout */
.dashboard-wrapper {
  width: 100%;
  max-width: 1400px;
  background: white;
  border-radius: 28px;
  box-shadow: 0 35px 60px -20px rgba(30, 30, 60, 0.4), 0 10px 25px -8px rgba(0,0,0,0.2);
  display: flex;
  overflow: hidden;
  min-height: 750px;
}

/* ========== LEFT VERTICAL SIDEBAR ========== */
.sidebar {
  width: 280px;
  background: #f3f6fb;          /* input background */
  border-right: 1px solid #e3e3e3;
  padding: 2rem 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 2.2rem;
}

.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding-left: 0.5rem;
}

.brand-icon {
  width: 2.8rem;
  height: 2.8rem;
  background: linear-gradient(145deg, #4c74ff, #8a52ff);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 14px -6px #4c74ff66;
}

.brand-icon i {
  font-size: 1.6rem;
  color: white;
}

.brand-text {
  font-weight: 700;
  font-size: 1.4rem;
  background: linear-gradient(145deg, #1e1e3f, #4c74ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.02em;
}

/* vertical navigation */
.side-nav {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  flex: 1;
}

.side-nav-btn {
  background: transparent;
  border: 1px solid transparent;
  border-radius: 16px;
  padding: 1rem 1.2rem;
  color: #1e1e3a;
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: 1rem;
  width: 100%;
  text-align: left;
  font-family: 'Inter', sans-serif;
}

.side-nav-btn i {
  font-size: 1.4rem;
  width: 2rem;
  text-align: center;
  background: linear-gradient(145deg, #4c74ff, #8a52ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  transition: transform 0.15s;
}

.side-nav-btn span {
  font-weight: 600;
  color: #3f3f60;
}

.side-nav-btn:hover {
  background: white;
  border-color: #e3e3e3;
  box-shadow: 0 8px 18px -12px #4c74ff, 0 0 0 1px rgba(76,116,255,0.2) inset;
  transform: translateX(4px);
}

.side-nav-btn:hover i {
  transform: scale(1.05);
}

/* active item gradient highlight */
.side-nav-btn.active {
  background: white;
  border-color: #d0ddff;
  box-shadow: 0 0 0 2px rgba(76,116,255,0.15) inset;
}

.sidebar-footer {
  margin-top: auto;
  padding-top: 1.5rem;
  border-top: 1px solid #e3e3e3;
}

.logout-btn {
  background: #f3f6fb;
  border: 1px solid #e3e3e3;
  border-radius: 40px;
  padding: 0.9rem 1.2rem;
  color: #4c516d;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  width: 100%;
  font-family: 'Inter', sans-serif;
}

.logout-btn i {
  font-size: 1.2rem;
  color: #777;    /* secondary text */
}

.logout-btn span {
  color: #4c516d;
}

.logout-btn:hover {
  background: white;
  border-color: #ffb7b7;
  transform: translateY(-2px);
  box-shadow: 0 12px 18px -14px #e5515b;
}
.logout-btn:hover i {
  color: #e5515b;
  transform: translateX(3px);
}

/* ========== MAIN CONTENT ========== */
.main-content {
  flex: 1;
  padding: 2rem 2.5rem;
  background: white;
  display: flex;
  flex-direction: column;
}

/* minimal header */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.header-left i {
  font-size: 2.2rem;
  background: linear-gradient(145deg, #4c74ff, #8a52ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

h2 {
  font-weight: 700;
  font-size: 2rem;
  letter-spacing: -0.02em;
  background: linear-gradient(145deg, #1e1e30, #4c74ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-actions {
  display: flex;
  gap: 0.8rem;
  flex-wrap: wrap;
}

/* gradient buttons */
.btn-primary {
  background: linear-gradient(145deg, #4c74ff, #8a52ff);
  border: none;
  border-radius: 40px;
  padding: 0.7rem 1.6rem;
  font-weight: 600;
  font-size: 0.95rem;
  color: white;
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 8px 18px -8px #4c74ff;
  border: 1px solid rgba(255,255,255,0.2);
}

.btn-primary i {
  color: white;
}

.btn-primary:hover {
  background: linear-gradient(145deg, #5f7eff, #9a62ff);
  transform: translateY(-2px);
  box-shadow: 0 15px 25px -12px #4c74ff;
}

.btn-secondary {
  background: #f3f6fb;
  border: 1px solid #e3e3e3;
  border-radius: 40px;
  padding: 0.7rem 1.6rem;
  font-weight: 600;
  font-size: 0.95rem;
  color: #3f3f60;
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-secondary i {
  color: #777;
}

.btn-secondary:hover {
  background: white;
  border-color: #b5c8ff;
  transform: translateY(-2px);
  box-shadow: 0 8px 16px -10px #4c74ff;
}

/* section header */
.section-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
}

.section-header i {
  font-size: 1.6rem;
  background: linear-gradient(145deg, #4c74ff, #8a52ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

h3 {
  font-weight: 700;
  font-size: 1.5rem;
  color: #1e1e30;
}

/* quiz grid (list) */
.quiz-grid {
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}

/* quiz card (white card with soft bg) */
.quiz-card {
  background: #f9fbfe;
  border: 1px solid #e3e3e3;
  border-radius: 22px;
  padding: 1.5rem 1.8rem;
  transition: all 0.2s ease;
  box-shadow: 0 6px 14px -10px rgba(0,0,0,0.08);
}

.quiz-card:hover {
  border-color: #b5c8ff;
  box-shadow: 0 12px 24px -14px #4c74ff;
  transform: translateY(-2px);
}

.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  flex-wrap: wrap;
  gap: 1rem;
}

.quiz-title-section {
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}

.quiz-icon {
  width: 2.5rem;
  height: 2.5rem;
  background: linear-gradient(145deg, #4c74ff, #8a52ff);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 12px -6px #4c74ff;
}

.quiz-icon i {
  font-size: 1.2rem;
  color: white;
}

.quiz-title {
  font-weight: 700;
  font-size: 1.2rem;
  color: #1e1e30;
}

.quiz-badge {
  background: #f3f6fb;
  border: 1px solid #e3e3e3;
  border-radius: 30px;
  padding: 0.25rem 1rem;
  font-size: 0.8rem;
  font-weight: 600;
  color: #4c74ff;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
}

.quiz-details-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem;
  margin: 1rem 0 1.2rem;
}

.detail-item {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  color: #3f3f60;
  font-size: 0.95rem;
}

.detail-item i {
  width: 1.5rem;
  background: linear-gradient(145deg, #4c74ff, #8a52ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-size: 1rem;
}

.detail-item strong {
  font-weight: 700;
  color: #1e1e30;
  margin-right: 0.3rem;
}

.quiz-actions {
  display: flex;
  justify-content: flex-end;
  margin-top: 0.5rem;
}

/* delete button (secondary style) */
.btn-delete {
  background: #f3f6fb;
  border: 1px solid #e3e3e3;
  border-radius: 30px;
  padding: 0.6rem 1.5rem;
  color: #4c516d;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-family: 'Inter', sans-serif;
}

.btn-delete i {
  color: #777;
  font-size: 0.9rem;
}

.btn-delete:hover {
  background: white;
  border-color: #ff6b6b;
  color: #d14545;
  transform: translateY(-2px);
  box-shadow: 0 10px 16px -12px #d14545;
}
.btn-delete:hover i {
  color: #d14545;
  animation: shake 0.3s ease;
}

@keyframes shake {
  0%, 100% { transform: rotate(0); }
  25% { transform: rotate(8deg); }
  75% { transform: rotate(-8deg); }
}

.empty-state {
  background: #f9fbfe;
  border: 1px dashed #e3e3e3;
  border-radius: 22px;
  padding: 3rem 2rem;
  text-align: center;
  color: #777;
}

.empty-state i {
  font-size: 3rem;
  margin-bottom: 1rem;
  background: linear-gradient(145deg, #4c74ff, #8a52ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.empty-state p {
  font-size: 1.1rem;
  color: #3f3f60;
}

.loading-state {
  background: #f9fbfe;
  border-radius: 22px;
  padding: 3rem;
  text-align: center;
  color: #777;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
}

.loading-state i {
  animation: spin 1s linear infinite;
  background: linear-gradient(145deg, #4c74ff, #8a52ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

hr {
  display: none;
}

/* responsive */
@media (max-width: 900px) {
  .dashboard-wrapper {
    flex-wrap: wrap;
  }
  .sidebar {
    width: 100%;
    border-right: none;
    border-bottom: 1px solid #e3e3e3;
    flex-direction: row;
    flex-wrap: wrap;
    align-items: center;
    gap: 1rem;
    padding: 1.5rem;
  }
  .side-nav {
    flex-direction: row;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .sidebar-footer {
    margin-top: 0;
    border-top: none;
    padding-top: 0;
  }
  .logout-btn {
    width: auto;
    padding: 0.8rem 1.8rem;
  }
}

@media (max-width: 700px) {
  body { padding: 1rem; }
  .main-content { padding: 1.5rem; }
  .page-header { flex-direction: column; align-items: start; }
  .header-actions { width: 100%; }
  .btn-primary, .btn-secondary { flex: 1; justify-content: center; }
  .quiz-details-grid { grid-template-columns: 1fr; }
}

@media (max-width: 480px) {
  .quiz-header { flex-direction: column; }
  .quiz-actions { justify-content: stretch; }
  .btn-delete { width: 100%; justify-content: center; }
}

button:focus-visible {
  outline: 3px solid #8a52ff;
  outline-offset: 3px;
}
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #f3f6fb; border-radius: 12px; }
::-webkit-scrollbar-thumb { background: linear-gradient(145deg, #4c74ff, #8a52ff); border-radius: 12px; }
</style>
</head>
<body>
<div class="dashboard-wrapper">
    <!-- LEFT SIDEBAR (vertical) -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">
                <i class="fas fa-crown"></i>
            </div>
            <span class="brand-text">Nexus</span>
        </div>
        <div class="side-nav">
            <button class="side-nav-btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-home"></i><span>Dashboard</span></button>
            <button class="side-nav-btn" onclick="window.location.href='students.html'"><i class="fas fa-user-graduate"></i><span>Students</span></button>
            <button class="side-nav-btn" onclick="window.location.href='teachers.html'"><i class="fas fa-chalkboard-user"></i><span>Teachers</span></button>
            <button class="side-nav-btn" onclick="window.location.href='materials.html'"><i class="fas fa-book-open"></i><span>Materials</span></button>
            <button class="side-nav-btn" onclick="window.location.href='user-management.html'"><i class="fas fa-users-cog"></i><span>Manage Users</span></button>
            <button class="side-nav-btn" onclick="window.location.href='projects.html'"><i class="fas fa-code-branch"></i><span>Projects</span></button>
            <button class="side-nav-btn active" onclick="window.location.href='quizzes.html'"><i class="fas fa-puzzle-piece"></i><span>Quizzes</span></button>
            <button class="side-nav-btn" onclick="window.location.href='stats.html'"><i class="fas fa-chart-line"></i><span>System Stats</span></button>
        </div>
        <div class="sidebar-footer">
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i><span>Logout</span><i class="fas fa-arrow-right" style="font-size:0.8rem; opacity:0;"></i>
            </button>
        </div>
    </div>

    <!-- MAIN CONTENT (right) -->
    <div class="main-content">
        <div class="page-header">
            <div class="header-left">
                <i class="fas fa-puzzle-piece"></i>
                <h2>Quiz Management</h2>
            </div>
            <div class="header-actions">
                <button class="btn-secondary" onclick="goDashboard()">
                    <i class="fas fa-arrow-left"></i> Dashboard
                </button>
                <button class="btn-primary" onclick="loadQuizzes()">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
        </div>

        <div class="section-header">
            <i class="fas fa-layer-group"></i>
            <h3>All Quizzes</h3>
        </div>

        <div id="quizList" class="quiz-grid">Loading quizzes...</div>
    </div>
</div>

<hr style="display: none;">
<div id="questionArea" style="display: none;"></div>

<!-- ORIGINAL JAVASCRIPT – UNMODIFIED -->
<script>
const API = "http://localhost:8080";
const token = localStorage.getItem("token");

if(!token){
    alert("Login required");
    window.location.href = "../login.html";
}

// =======================
// LOAD ALL QUIZZES
// =======================
function loadQuizzes(){
  const quizListDiv = document.getElementById("quizList");
  quizListDiv.innerHTML = '<div class="loading-state"><i class="fas fa-spinner"></i> Loading quizzes...</div>';

  fetch(`${API}/admin/quizzes`,{
    headers:{ Authorization:"Bearer "+token }
  })
  .then(res=>res.json())
  .then(data=>{
    displayQuizzes(data);
  })
  .catch(err=>{
    document.getElementById("quizList").innerHTML='<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading quizzes</p></div>';
  });
}

// =======================
// DISPLAY QUIZZES
// =======================
function displayQuizzes(quizzes){
  const div=document.getElementById("quizList");
  div.innerHTML="";
  div.className = "quiz-grid";

  if(!quizzes || quizzes.length===0){
    div.innerHTML='<div class="empty-state"><i class="fas fa-clipboard-list"></i><p>No quizzes found</p></div>';
    return;
  }

  quizzes.forEach(q=>{
    const box=document.createElement("div");
    box.className = "quiz-card";
    
    const sectionDisplay = q.section && q.section !== "All" ? q.section : "All Sections";
    
    box.innerHTML=`
      <div class="quiz-header">
        <div class="quiz-title-section">
          <div class="quiz-icon">
            <i class="fas fa-question"></i>
          </div>
          <span class="quiz-title">${q.title}</span>
          <span class="quiz-badge">
            <i class="fas fa-clock"></i>
            ${q.durationMinutes} min
          </span>
        </div>
      </div>
      
      <div class="quiz-details-grid">
        <div class="detail-item">
          <i class="fas fa-book"></i>
          <span><strong>Subject:</strong> ${q.subject}</span>
        </div>
        <div class="detail-item">
          <i class="fas fa-code-branch"></i>
          <span><strong>Branch:</strong> ${q.branch}</span>
        </div>
        <div class="detail-item">
          <i class="fas fa-layer-group"></i>
          <span><strong>Semester:</strong> ${q.semester}</span>
        </div>
        <div class="detail-item">
          <i class="fas fa-users"></i>
          <span><strong>Section:</strong> ${sectionDisplay}</span>
        </div>
      </div>
      
      <div class="quiz-actions">
        <button class="btn-delete" onclick="deleteQuiz(${q.id})">
          <i class="fas fa-trash-alt"></i>
          Delete Quiz
        </button>
      </div>
    `;
    
    div.appendChild(box);
  });
}

// =======================
// DELETE QUIZ
// =======================
function deleteQuiz(id){
  if(!confirm("Delete this quiz?")) return;

  fetch(`${API}/admin/quiz/${id}`,{
    method:"DELETE",
    headers:{ Authorization:"Bearer "+token }
  })
  .then(res=>{
    if(res.ok){
      alert("Quiz deleted");
      loadQuizzes();
    }else{
      alert("Delete failed");
    }
  });
}

// =======================
// BACK
// =======================
function goDashboard(){
  window.location.href="dashboard.html";
}

loadQuizzes();

// logout helper (used in sidebar)
function logout() {
    localStorage.clear();
    window.location.href = "../login.html";
}
</script>
</body>
</html>

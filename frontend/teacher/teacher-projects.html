<!DOCTYPE html>
<html lang="en">
<head>
    <title>Teacher · Student Projects · Nexus</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Font: Inter (modern academic) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #5f79ff, #7a5cff, #a16cff);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 1.5rem;
            display: flex;
            gap: 1.5rem;
            line-height: 1.5;
        }

        /* ---------- LEFT VERTICAL SIDEBAR ---------- */
        .sidebar {
            flex: 0 0 280px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            border: 1px solid #e3e3e3;
            padding: 2rem 1rem 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: fit-content;
            max-height: calc(100vh - 3rem);
            position: sticky;
            top: 1.5rem;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding-left: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .brand-icon {
            width: 2.8rem;
            height: 2.8rem;
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 14px -6px #4c74ff66;
        }

        .brand-icon i {
            font-size: 1.6rem;
            color: white;
        }

        .brand-text {
            font-weight: 700;
            font-size: 1.4rem;
            background: linear-gradient(145deg, #1e1e3f, #4c74ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 1rem;
            border-radius: 16px;
            color: #4a4a6a;
            font-weight: 500;
            transition: all 0.2s ease;
            background: transparent;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            border: none;
            width: 100%;
            text-align: left;
            cursor: default;
        }

        .nav-item i {
            font-size: 1.3rem;
            width: 2rem;
            text-align: center;
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-item span {
            font-weight: 600;
        }

        .nav-item.active {
            background: #f3f6fb;
            border-left: 4px solid #8a52ff;
            border-radius: 16px 12px 12px 16px;
            color: #1e1e3a;
        }

        .nav-item:hover {
            background: #f3f6fb;
            transform: translateX(4px);
            color: #4c74ff;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 1.5rem;
            border-top: 1px solid #e3e3e3;
        }

        .logout-btn {
            background: #f3f6fb;
            border: 1px solid #e3e3e3;
            border-radius: 40px;
            padding: 0.9rem 1.2rem;
            color: #4c516d;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }

        .logout-btn i {
            font-size: 1.2rem;
            color: #777;
        }

        .logout-btn:hover {
            background: white;
            border-color: #ffb7b7;
            transform: translateY(-2px);
            box-shadow: 0 12px 18px -14px #e5515b;
        }
        .logout-btn:hover i {
            color: #e5515b;
        }

        /* ---------- MAIN CONTENT AREA ---------- */
        .main-content {
            flex: 1;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid #e3e3e3;
            padding: 2rem 2.5rem;
            overflow-y: auto;
            max-height: calc(100vh - 3rem);
        }

        /* TOP AREA – minimal header */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #e3e3e3;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .top-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(145deg, #1e1e30, #4c74ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-actions {
            display: flex;
            gap: 0.8rem;
        }

        /* buttons */
        .btn {
            padding: 0.7rem 1.6rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid transparent;
        }

        .btn-primary {
            background: #f3f6fb;
            border: 1px solid #e3e3e3;
            color: #3f3f60;
        }
        .btn-primary:hover {
            background: white;
            border-color: #b5c8ff;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -10px #4c74ff;
        }

        .btn-danger {
            background: #fff1f0;
            border: 1px solid #ffcdcd;
            color: #d14545;
        }
        .btn-danger:hover {
            background: #ffe5e5;
            transform: translateY(-2px);
        }

        /* teacher info card */
        .teacher-info-card {
            background: #f9fbfe;
            border: 1px solid #e3e3e3;
            border-radius: 22px;
            padding: 1.5rem 2rem;
            margin-bottom: 2.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            align-items: center;
            box-shadow: 0 8px 18px -10px rgba(0,0,0,0.1);
        }

        .teacher-info-card p {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #1e1e30;
            font-weight: 500;
            margin: 0.25rem 0;
        }
        .teacher-info-card i {
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            width: 1.5rem;
        }
        .teacher-info-card small {
            color: #777;
        }

        /* section title */
        .section-title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #1e1e30;
        }
        .section-title i {
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* table card */
        .table-wrapper {
            border-radius: 22px;
            border: 1px solid #e3e3e3;
            background: #f9fbfe;
            overflow: auto;
            box-shadow: 0 8px 20px -12px rgba(0,0,0,0.12);
            padding: 0.5rem 0;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 0.8rem;
            min-width: 700px;
            padding: 0 1rem;
        }

        th {
            text-align: left;
            padding: 1rem 1rem 0.8rem 1rem;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #777;
            border-bottom: 1px solid #e3e3e3;
            background: transparent;
        }

        td {
            padding: 1rem 1rem;
            background: white;
            border: 1px solid #e3e3e3;
            border-radius: 18px;
            color: #1e1e30;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px -8px rgba(0,0,0,0.1);
        }

        tr:hover td {
            background: #f3f6fb;
            border-color: #b5c8ff;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            background: #f3f6fb;
            color: #4c74ff;
            border: 1px solid #e3e3e3;
        }

        /* view button in table */
        td button {
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            border: none;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            box-shadow: 0 8px 12px -8px #4c74ff;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        td button:hover {
            transform: translateY(-2px);
            background: linear-gradient(145deg, #5f83ff, #9b66ff);
            box-shadow: 0 12px 18px -10px #4c74ff;
        }

        .error-box {
            background: #ffe8e8;
            border: 1px solid #ffc9c9;
            border-radius: 18px;
            padding: 1.5rem;
            color: #b00020;
            font-weight: 500;
        }

        .loading {
            color: #777;
            padding: 2rem;
            text-align: center;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f3f6fb; border-radius: 12px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(145deg, #4c74ff, #8a52ff); border-radius: 12px; }

        @media (max-width: 900px) {
            body {
                flex-direction: column;
                padding: 1rem;
            }
            .sidebar {
                flex: auto;
                position: static;
                max-height: none;
            }
            .main-content {
                max-height: none;
            }
        }
    </style>
    <script src="../js/auth.js"></script>
</head>
<body>
    <!-- LEFT VERTICAL SIDEBAR -->
    

    <!-- MAIN CONTENT AREA -->
    <main class="main-content">
        <!-- TOP AREA header minimal -->
        <div class="top-header">
            <h1><i class="fas fa-folder-open"></i> Student Projects</h1>
            <div class="header-actions">
                <!-- original buttons, with original classes and IDs -->
                <button id="backBtn" class="btn btn-primary" onclick="window.location.href='dashboard.html'">
                    <i class="fas fa-arrow-left"></i> Dashboard
                </button>
                <button id="logoutBtn" class="btn btn-danger" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <!-- original container (kept for JS integrity) -->
        <div class="container">
            <!-- teacher info card – original ID #teacherInfo, but styled via new card -->
            <div id="teacherInfo" class="teacher-info-card">
                <div class="loading">Loading teacher information...</div>
            </div>
            
            <div id="errorContainer" style="display: none;"></div>
            
            <div id="studentsContainer">
                <div class="section-title">
                    <i class="fas fa-users"></i> Students in Your Department
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Student Name</th>
                                <th>Roll Number</th>
                                <th>Branch</th>
                                <th>Semester</th>
                                <th>Section</th>
                                <th>Actions</th>
                                
                            </tr>
                        </thead>
                        <tbody id="studentsTable">
                            <tr>
                                <td colspan="6" style="text-align:center; padding:40px;">
                                    <div class="loading">Loading students...</div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- JavaScript – EXACT original, untouched -->
    <script>
        const API_BASE_URL = 'http://localhost:8080/api/teacher';
        
        document.addEventListener('DOMContentLoaded', function() {
            // Check authentication
            if (!checkAuth()) {
                window.location.href = '../login.html';
                return;
            }
            
            // Get username from token
            const username = getUsernameFromToken();
            console.log('📌 Username from token:', username);
            
            if (!username) {
                showError('Username not found. Please login again.');
                setTimeout(() => logout(), 3000);
                return;
            }
            
            // Load teacher data by username
            loadTeacherByUsername(username);
        });
        
        function showError(message) {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.style.display = 'block';
            errorContainer.innerHTML = `
                <div class="error-box">
                    <strong>❌ Error:</strong> ${message}
                </div>
            `;
            
            document.getElementById('teacherInfo').innerHTML = `
                <div class="error-box">
                    Failed to load teacher information. Please try again.
                </div>
            `;
        }
        
        async function loadTeacherByUsername(username) {
            try {
                console.log('🔍 Loading teacher data for username:', username);
                
                const response = await fetch(`${API_BASE_URL}/by-username?username=${encodeURIComponent(username)}`, {
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    }
                });
                
                console.log('📡 Response status:', response.status);
                
                if (response.status === 401) {
                    showError('Session expired. Please login again.');
                    setTimeout(() => logout(), 3000);
                    return;
                }
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('❌ Error response:', errorText);
                    
                    let errorMessage = `Server error: ${response.status}`;
                    try {
                        const errorJson = JSON.parse(errorText);
                        errorMessage = errorJson.message || errorJson.error || errorMessage;
                    } catch(e) {
                        errorMessage = errorText || errorMessage;
                    }
                    
                    throw new Error(errorMessage);
                }
                
                const data = await response.json();
                console.log('✅ Teacher data received:', data);
                
                displayTeacherData(data);
                
            } catch (error) {
                console.error('❌ Error in loadTeacherByUsername:', error);
                showError(error.message);
                
                document.getElementById('studentsTable').innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align:center; padding:40px; color: #dc3545;">
                            ❌ Error loading students: ${error.message}
                        </td>
                    </tr>
                `;
            }
        }
        
        function displayTeacherData(data) {
            // Hide error container if visible
            document.getElementById('errorContainer').style.display = 'none';
            
            // Show teacher info – styled nicely within teacher-info-card
            document.getElementById('teacherInfo').innerHTML = `
                <p><i class="fas fa-user-circle"></i> <strong>Teacher:</strong> ${data.teacherName || 'N/A'}</p>
                <p><i class="fas fa-building"></i> <strong>Department:</strong> ${data.department || 'N/A'}</p>
                <p><i class="fas fa-users"></i> <strong>Total Students:</strong> ${data.studentCount || 0}</p>
                <p><small><i class="fas fa-id-badge"></i> Teacher ID: ${data.teacherId || 'N/A'}</small></p>
            `;
            
            // Show students table
            const tableBody = document.getElementById('studentsTable');
            tableBody.innerHTML = '';
            
            if (!data.students || data.students.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align:center; padding:40px;">
                            <div style="color: #666;">
                                <p><i class="fas fa-inbox" style="font-size:2rem; color:#ccc;"></i></p>
                                <p>📭 No students found in ${data.department || 'your'} department</p>
                                <p style="font-size: 14px; margin-top: 10px;">
                                    This could mean:
                                    <br>• No students have been added to this department yet
                                    <br>• Students haven't completed their profiles
                                    <br>• The department name might be different in student records
                                </p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }
            
            data.students.forEach(student => {
                const studentName = student.fullName || 'Student Name Not Set';
                const rollNumber = student.rollNumber || 'N/A';
                const branch = student.branch || data.department || 'N/A';
                const semester = student.semester || 'N/A';
                const section = student.section || 'N/A';
                const userId = student.userId || student.id;
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${studentName}</strong></td>
                    <td>${rollNumber}</td>
                    <td><span class="badge">${branch}</span></td>
                    <td>Semester ${semester}</td>
                    <td>${section}</td>
                    <td>
                       <button onclick="viewStudentProjects(${student.id})"><i class="fas fa-eye"></i> View</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }
        
       function viewStudentProjects(studentId) {
    window.location.href = `view-student-projects.html?userId=${studentId}`;
}
function viewProjectDetails(projectId) {
    window.location.href = "project-details.html?id=" + projectId;
}
   function openProjectPage(userId) {

    // store student id for next page
    localStorage.setItem("selectedStudentId", userId);

    // open project details page
    window.open("../student/project-details.html", "_blank");

}     
        function logout() {
            localStorage.clear();
            window.location.href = '../login.html';
        }
    </script>
</body>
</html>

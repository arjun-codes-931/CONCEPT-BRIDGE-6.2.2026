<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Projects</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #5f79ff 0%, #7a5cff 55%, #a16cff 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
            color: #1e1e2f;
            line-height: 1.5;
        }

        /* LAYOUT: left sidebar + main content */
        .app-wrapper {
            display: flex;
            max-width: 1400px;
            width: 100%;
            gap: 1.8rem;
            align-items: stretch;
        }

        /* ---------- LEFT SIDEBAR (vertical menu) ---------- */
        .sidebar {
            width: 280px;
            background: white;
            border-radius: 24px;
            padding: 2rem 1.2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2), 0 0 0 1px #e3e3e3 inset;
            border: 1px solid #e3e3e3;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 0 0.5rem 1.8rem 0.5rem;
            border-bottom: 1px solid #e3e3e3;
            margin-bottom: 1.8rem;
        }

        .sidebar-header h3 {
            font-weight: 600;
            font-size: 1.4rem;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }

        .sidebar-header h3 i {
            font-size: 1.8rem;
            color: #4c74ff;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            flex: 1;
        }

        .sidebar-nav-item {
            padding: 1rem 1.2rem;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #777;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid transparent;
            cursor: pointer;
            background: transparent;
            width: 100%;
            text-align: left;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }

        .sidebar-nav-item i {
            width: 1.8rem;
            color: #777;
            font-size: 1.25rem;
            transition: color 0.2s;
        }

        .sidebar-nav-item:hover {
            background: #f3f6fb;
            border-color: #e3e3e3;
            color: #1e293b;
        }

        .sidebar-nav-item:hover i {
            color: #4c74ff;
        }

        .sidebar-nav-item.active {
            background: linear-gradient(135deg, #4c74ff10, #8a52ff10);
            border-left: 4px solid #4c74ff;
            background: #f0f4ff;
            font-weight: 600;
            color: #1e293b;
        }

        .sidebar-nav-item.active i {
            color: #4c74ff;
        }

        .sidebar-footer {
            padding: 1.5rem 0.8rem 0.2rem;
            border-top: 1px solid #e3e3e3;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #777;
        }

        /* ---------- MAIN CONTENT (white card) ---------- */
        .main-content {
            flex: 1;
            background: white;
            border-radius: 28px;
            padding: 2.2rem 2.5rem;
            box-shadow: 0 30px 60px -15px rgba(58, 48, 94, 0.3), 0 0 0 1px #e3e3e3 inset;
            border: 1px solid #e3e3e3;
        }

        /* header area */
        .projects-header {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem 1.5rem;
            margin-bottom: 2rem;
        }

        /* Back button styling - using attribute selector for consistency */
        .back-btn {
            background: white;
            border: 1.5px solid #e3e3e3;
            color: #777;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.7rem 2rem 0.7rem 1.6rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            font-family: 'Inter', sans-serif;
        }

        .back-btn i {
            color: #4c74ff;
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: #f3f6fb;
            border-color: #b3c0d9;
            transform: translateX(-2px);
        }

        h2 {
            font-weight: 700;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h2 i {
            font-size: 2.2rem;
            color: #4c74ff;
        }

        .new-project-btn {
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            border: none;
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.9rem 2.2rem;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 10px 18px -8px rgba(76, 116, 255, 0.4);
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.7rem;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .new-project-btn:hover {
            background: linear-gradient(135deg, #5f83ff, #9f63ff);
            transform: translateY(-2px);
            box-shadow: 0 20px 28px -10px #4c74ff;
        }

        /* project list container */
        #projectList {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* project cards – clean white cards with border */
        #projectList > div[style*="border:1px solid #ccc"] {
            background: white !important;
            border: 1px solid #e3e3e3 !important;
            border-radius: 22px !important;
            padding: 1.8rem 2rem !important;
            margin: 0 !important;
            box-shadow: 0 8px 18px -8px rgba(0,0,0,0.05) !important;
            backdrop-filter: none !important;
            transition: all 0.2s ease;
        }

        #projectList > div[style*="border:1px solid #ccc"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 28px -12px rgba(76, 116, 255, 0.15) !important;
            border-color: #b3c0d9 !important;
        }

        #projectList h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e1e2f;
            margin: 0 0 0.5rem 0 !important;
        }

        /* status badges */
        #projectList span[style*="background:"] {
            font-size: 0.8rem !important;
            font-weight: 600 !important;
            padding: 0.4rem 1.2rem !important;
            border-radius: 40px !important;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            display: inline-block;
            border: 1px solid #e3e3e3;
            margin-right: 0.5rem;
            color: white !important;
            border: none;
        }

        #projectList span[style*="background:gray"] {
            background: #6c757d !important;
        }
        #projectList span[style*="background:blue"] {
            background: #4c74ff !important;
        }
        #projectList span[style*="background:orange"] {
            background: #f39c12 !important;
        }
        #projectList span[style*="background:green"] {
            background: #2ecc71 !important;
        }
        #projectList span[style*="background:#eee"] {
            background: #f3f6fb !important;
            color: #777 !important;
            border: 1px solid #e3e3e3;
        }

        /* progress percentage */
        #projectList div[style*="font-size:20px; font-weight:bold; color:green;"] {
            color: #4c74ff !important;
            font-size: 1.8rem !important;
            font-weight: 700 !important;
        }

        /* progress bar */
        #projectList div[style*="background:#eee; height:8px; border-radius:4px;"] {
            background: #f3f6fb !important;
            height: 8px !important;
            border-radius: 40px !important;
            overflow: hidden;
            margin: 1rem 0 !important;
        }

        #projectList div[style*="background:green; height:100%;"] {
            background: linear-gradient(90deg, #4c74ff, #8a52ff) !important;
            border-radius: 40px !important;
        }

        #projectList p {
            color: #4a5b7a !important;
            font-size: 1rem;
            margin: 0.8rem 0 !important;
            line-height: 1.6;
        }

        /* date text */
        #projectList div[style*="font-size:14px; color:#666;"] {
            color: #777 !important;
        }

        /* view button */
        #projectList button[onclick^="viewProjectDetails"] {
            background: linear-gradient(135deg, #4c74ff, #8a52ff) !important;
            border: none !important;
            border-radius: 40px !important;
            padding: 0.6rem 1.8rem !important;
            font-weight: 600 !important;
            font-size: 0.85rem !important;
            box-shadow: 0 8px 16px -8px #4c74ff !important;
            transition: all 0.2s !important;
            cursor: pointer;
            color: white !important;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-right: 0.5rem;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #projectList button[onclick^="viewProjectDetails"]:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 20px -8px #4c74ff !important;
        }

        /* delete button */
        #projectList button[onclick^="confirmDelete"] {
            background: white !important;
            border: 1px solid #e3e3e3 !important;
            border-radius: 40px !important;
            padding: 0.6rem 1.8rem !important;
            font-weight: 600 !important;
            font-size: 0.85rem !important;
            box-shadow: 0 4px 10px -6px rgba(0,0,0,0.1) !important;
            transition: all 0.2s !important;
            cursor: pointer;
            color: #b91c1c !important;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        #projectList button[onclick^="confirmDelete"]:hover {
            background: #fee2e2 !important;
            border-color: #fecaca !important;
            transform: translateY(-1px);
        }

        /* empty state */
        #projectList p, #projectList div[style*="color: red;"] {
            background: #f3f6fb;
            border-radius: 22px;
            padding: 2rem;
            text-align: center;
            color: #777;
            border: 1px solid #e3e3e3;
        }

        /* Delete confirmation modal */
        .delete-confirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .delete-confirm-box {
            background: white;
            border: 1px solid #e3e3e3;
            border-radius: 28px;
            padding: 2.5rem;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .delete-confirm-box h3 {
            color: #b91c1c;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .delete-confirm-box p {
            color: #4a5b7a;
            margin-bottom: 1.5rem;
            font-size: 1rem;
        }

        .delete-confirm-box button {
            padding: 0.8rem 2rem;
            margin: 0 0.5rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
        }

        .delete-confirm-btn {
            background: linear-gradient(135deg, #dc3545, #b02a37);
            color: white;
        }
        .delete-cancel-btn {
            background: white;
            border: 1px solid #e3e3e3;
            color: #777;
        }

        /* responsive */
        @media (max-width: 900px) {
            .app-wrapper {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
                padding: 1.2rem;
            }
            .sidebar-header { width: 100%; }
            .sidebar-nav {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 0.3rem;
            }
            .sidebar-nav-item { flex: 1 0 auto; }
        }

        @media (max-width: 600px) {
            body { padding: 1rem; }
            .main-content { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- LEFT SIDEBAR (with working navigation) -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-graduation-cap"></i> Concept Bridge</h3>
            </div>
            <div class="sidebar-nav">
                <!-- All menu items have onclick handlers to redirect -->
                <div class="sidebar-nav-item" onclick="window.location.href='assignment-list.html'">
                    <i class="fas fa-tasks"></i> Assignments
                </div>
                <div class="sidebar-nav-item" onclick="window.location.href='quiz.html'">
                    <i class="fas fa-puzzle-piece"></i> Quizzes
                </div>
                <div class="sidebar-nav-item active" onclick="window.location.href='project-list.html'">
                    <i class="fas fa-code"></i> Projects
                </div>
                <div class="sidebar-nav-item" onclick="window.location.href='pdf-list.html'">
                    <i class="fas fa-file-pdf"></i> PDFs
                </div>
                <div class="sidebar-nav-item" onclick="window.location.href='student-profile.html'">
                    <i class="fas fa-user-circle"></i> Profile
                </div>
            </div>
            
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- header section with fixed back button -->
            <div class="projects-header">
                <button onclick="window.location.href='dashboard.html'" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
                <h2><i class="fas fa-rocket"></i> My Projects</h2>
                <button onclick="createNewProject()" class="new-project-btn">
                    <i class="fas fa-plus-circle"></i> New Project
                </button>
            </div>

            <!-- projectList container -->
            <div id="projectList">Loading...</div>
        </div>
    </div>

    <!-- Delete Confirmation Modal (hidden by default) -->
    <div id="deleteConfirmModal" style="display:none;"></div>

    <script>
    const API = "http://localhost:8080";
    const token = localStorage.getItem("token");
    
    // Store current profile
    let currentProfile = null;
    
    // Profile loader
    async function getStudentProfile() {
        // Try to get from localStorage first
        let profile = JSON.parse(localStorage.getItem("studentProfile") || '{}');
        if (profile.id) {
            currentProfile = profile;
            return profile;
        }
        
        // Try API
        try {
            const response = await fetch(`${API}/student/profile`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            
            if (response.ok) {
                profile = await response.json();
                localStorage.setItem("studentProfile", JSON.stringify(profile));
                currentProfile = profile;
                return profile;
            } else {
                throw new Error(`HTTP ${response.status}: Profile not found`);
            }
        } catch (err) {
            showProfileError();
            throw err;
        }
    }
    
    function showProfileError() {
        document.body.innerHTML = `
            <div style="padding: 40px; text-align: center;">
                <h2 style="color: #dc3545;">⚠️ Profile Required</h2>
                <p>Your student profile needs to be created first.</p>
                <p style="color: #666; margin: 20px 0;">
                    Please go to your dashboard and complete your profile.
                </p>
                <div style="margin-top: 30px;">
                    <button onclick="window.history.back()" 
                            style="padding: 10px 20px; margin: 5px; background: #6c757d; color: white; border: none;">
                        ← Go Back
                    </button>
                    <button onclick="goToDashboard()" 
                            style="padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none;">
                        Go to Dashboard
                    </button>
                </div>
            </div>
        `;
    }
    
    function goToDashboard() {
        window.location.href = "dashboard.html";
    }
    
    window.onload = async () => {
        if (!token) {
            alert("Login required");
            location.href = "../login.html";
            return;
        }
        
        try {
            const profile = await getStudentProfile();
            await loadProjects(profile);
        } catch (err) {
            // Error already shown
        }
    };
    
    async function loadProjects(profile) {
        try {
            const res = await fetch(`${API}/student/project/list?studentId=${profile.id}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            
            if (!res.ok) throw new Error('Failed to load projects');
            
            const projects = await res.json();
            displayProjects(projects);
        } catch (err) {
            document.getElementById("projectList").innerHTML = `
                <div style="color: red; padding: 20px; text-align: center;">
                    <h3>⚠️ Cannot Load Projects</h3>
                    <p>${err.message}</p>
                </div>
            `;
        }
    }
    
    function displayProjects(projects) {
        const container = document.getElementById("projectList");
        
        if (!projects || projects.length === 0) {
            container.innerHTML = `<p>No projects. <button onclick="createNewProject()">Create one</button></p>`;
            return;
        }
    
        let html = '';
        projects.forEach(p => {
            const statusColor = {
                'IDEA': 'gray', 'IN_PROGRESS': 'blue', 
                'PAUSED': 'orange', 'COMPLETED': 'green'
            }[p.currentStatus] || 'gray';
    
            html += `
                <div style="border:1px solid #ccc; padding:15px; margin:10px 0;">
                    <div style="display:flex; justify-content:space-between;">
                        <div>
                            <h3 style="margin:0;">${p.title}</h3>
                            <span style="background:${statusColor}; color:white; padding:3px 10px; border-radius:10px;">
                                ${p.currentStatus}
                            </span>
                            <span style="background:#eee; padding:3px 10px; border-radius:10px; margin-left:5px;">
                                ${p.category}
                            </span>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:20px; font-weight:bold; color:green;">${p.progressPercentage}%</div>
                            <small>Progress</small>
                        </div>
                    </div>
                    
                    <p>${p.description || 'No description'}</p>
                    
                    <div style="background:#eee; height:8px; border-radius:4px; margin:10px 0;">
                        <div style="background:green; height:100%; width:${p.progressPercentage}%; border-radius:4px;"></div>
                    </div>
                    
                    <div style="display:flex; justify-content:space-between; align-items:center; font-size:14px; color:#666;">
                        <div>
                            Start: ${new Date(p.startDate).toLocaleDateString()} | 
                            Target: ${new Date(p.expectedEndDate).toLocaleDateString()}
                        </div>
                        <div>
                            <button onclick="viewProjectDetails(${p.id})"><i class="fas fa-eye"></i> View</button>
                            <button onclick="confirmDelete(${p.id}, '${p.title}')" style="background:#dc3545; color:white; border:none; border-radius:3rem; padding:0.7rem 2rem; margin-left:10px; cursor:pointer;">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    
    // View project details
    function viewProjectDetails(projectId) {
        window.location.href = `project-details.html?id=${projectId}`;
    }
    
    // Delete confirmation
    function confirmDelete(projectId, projectTitle) {
        const modal = document.getElementById('deleteConfirmModal');
        
        modal.style.display = 'block';
        modal.innerHTML = `
            <div class="delete-confirm-overlay">
                <div class="delete-confirm-box">
                    <h3><i class="fas fa-exclamation-triangle" style="color: #b91c1c;"></i> Delete Project</h3>
                    <p>Are you sure you want to delete "<strong>${projectTitle}</strong>"?</p>
                    <p style="font-size: 0.9rem; color: #777;">This action cannot be undone. All associated data will be permanently removed.</p>
                    <div>
                        <button class="delete-confirm-btn" onclick="deleteProject(${projectId})">
                            <i class="fas fa-trash"></i> Yes, Delete
                        </button>
                        <button class="delete-cancel-btn" onclick="closeDeleteModal()">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
                </div>
            </div>
        `;
    }
    
    function closeDeleteModal() {
        document.getElementById('deleteConfirmModal').style.display = 'none';
    }
    
    // DELETE PROJECT FUNCTION
    async function deleteProject(projectId) {
        try {
            console.log('🗑️ Deleting project:', projectId);
            
            // Show loading state
            const deleteBtn = event?.target;
            if (deleteBtn) {
                deleteBtn.disabled = true;
                deleteBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Deleting...';
            }
            
            const response = await fetch(`${API}/student/project/${projectId}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                }
            });
            
            console.log('📊 Response status:', response.status);
            
            // Check if response is OK
            if (!response.ok) {
                if (response.status === 403) {
                    throw new Error('Permission denied. You may not have access to delete this project.');
                } else if (response.status === 404) {
                    throw new Error('Project not found');
                } else {
                    throw new Error(`HTTP error ${response.status}`);
                }
            }
            
            // Try to parse JSON, but handle empty response
            let data = {};
            const contentType = response.headers.get('content-type');
            if (contentType && contentType.includes('application/json')) {
                data = await response.json();
            } else {
                const text = await response.text();
                console.log('Response text:', text);
                data = { message: text || 'Project deleted successfully' };
            }
            
            console.log('✅ Delete successful:', data);
            
            // Close modal
            closeDeleteModal();
            
            // Show success message
            alert('✅ Project deleted successfully!');
            
            // Reload projects list
            if (currentProfile) {
                await loadProjects(currentProfile);
            }
            
        } catch (error) {
            console.error('❌ Delete error:', error);
            alert('❌ Error deleting project: ' + error.message);
            closeDeleteModal();
        }
    }
    
    function createNewProject() {
        location.href = "project-create.html";
    }
    
    // Also keep the old viewProject function for backward compatibility
    function viewProject(id) {
        localStorage.setItem("currentProjectId", id);
        location.href = "project-details.html";
    }
    </script>
</body>
</html>

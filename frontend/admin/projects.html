<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Directory with Projects · Nexus</title>
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #5f79ff, #7a5cff, #a16cff);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.5;
        }

        /* main white dashboard card with sidebar layout */
        .dashboard-wrapper {
            width: 100%;
            max-width: 1600px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 35px 60px -20px rgba(30, 30, 60, 0.4), 0 10px 25px -8px rgba(0,0,0,0.2);
            display: flex;
            overflow: hidden;
            min-height: 850px;
        }

        /* ========== LEFT SIDEBAR ========== */
        .sidebar {
            width: 280px;
            background: #f3f6fb;          /* input background */
            border-right: 1px solid #e3e3e3;
            padding: 2rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 2.2rem;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding-left: 0.5rem;
        }

        .brand-icon {
            width: 2.8rem;
            height: 2.8rem;
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 14px -6px #4c74ff66;
        }

        .brand-icon i {
            font-size: 1.6rem;
            color: white;
        }

        .brand-text {
            font-weight: 700;
            font-size: 1.4rem;
            background: linear-gradient(145deg, #1e1e3f, #4c74ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        /* vertical navigation */
        .side-nav {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            flex: 1;
        }

        .side-nav-btn {
            background: transparent;
            border: 1px solid transparent;
            border-radius: 16px;
            padding: 1rem 1.2rem;
            color: #1e1e3a;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
            width: 100%;
            text-align: left;
            font-family: 'Inter', sans-serif;
        }

        .side-nav-btn i {
            font-size: 1.4rem;
            width: 2rem;
            text-align: center;
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: transform 0.15s;
        }

        .side-nav-btn span {
            font-weight: 600;
            color: #3f3f60;
        }

        .side-nav-btn:hover {
            background: white;
            border-color: #e3e3e3;
            box-shadow: 0 8px 18px -12px #4c74ff, 0 0 0 1px rgba(76,116,255,0.2) inset;
            transform: translateX(4px);
        }

        .side-nav-btn:hover i {
            transform: scale(1.05);
        }

        /* active item gradient highlight */
        .side-nav-btn.active {
            background: white;
            border-color: #d0ddff;
            box-shadow: 0 0 0 2px rgba(76,116,255,0.15) inset;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 1.5rem;
            border-top: 1px solid #e3e3e3;
        }

        .logout-btn {
            background: #f3f6fb;
            border: 1px solid #e3e3e3;
            border-radius: 40px;
            padding: 0.9rem 1.2rem;
            color: #4c516d;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }

        .logout-btn i {
            font-size: 1.2rem;
            color: #777;    /* secondary text */
        }

        .logout-btn span {
            color: #4c516d;
        }

        .logout-btn:hover {
            background: white;
            border-color: #ffb7b7;
            transform: translateY(-2px);
            box-shadow: 0 12px 18px -14px #e5515b;
        }
        .logout-btn:hover i {
            color: #e5515b;
            transform: translateX(3px);
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            padding: 2rem 2.5rem;
            background: white;
            display: flex;
            flex-direction: column;
        }

        /* minimal header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header-left i {
            font-size: 2.2rem;
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h3 {
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.02em;
            background: linear-gradient(145deg, #1e1e30, #4c74ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .action-buttons {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        /* gradient buttons */
        .btn-primary {
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            border: none;
            border-radius: 40px;
            padding: 0.7rem 1.6rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 18px -8px #4c74ff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-primary i {
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(145deg, #5f7eff, #9a62ff);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -12px #4c74ff;
        }

        .btn-secondary {
            background: #f3f6fb;
            border: 1px solid #e3e3e3;
            border-radius: 40px;
            padding: 0.7rem 1.6rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: #3f3f60;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            background: white;
            border-color: #b5c8ff;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -10px #4c74ff;
        }

        /* filter card (white with soft background) */
        .filter-card {
            background: #f9fbfe;
            border: 1px solid #e3e3e3;
            border-radius: 22px;
            padding: 1.8rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 22px -12px rgba(0,0,0,0.06);
        }

        .filter-header {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 1.5rem;
        }

        .filter-header i {
            font-size: 1.5rem;
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .filter-header span {
            font-weight: 600;
            font-size: 1.1rem;
            color: #2c2c4a;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1.2rem;
        }

        .filter-field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .filter-field label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #777;            /* secondary text */
            letter-spacing: 0.2px;
        }

        .filter-field select,
        .filter-field input {
            background: #f3f6fb;
            border: 1px solid #e3e3e3;
            border-radius: 30px;
            padding: 0.6rem 1rem;
            font-size: 0.95rem;
            color: #1e1e30;
            font-family: 'Inter', sans-serif;
        }

        .filter-field input:focus,
        .filter-field select:focus {
            outline: none;
            border-color: #8a52ff;
            box-shadow: 0 0 0 3px rgba(138,82,255,0.15);
        }

        .filter-stats {
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            color: #777;
            font-size: 0.95rem;
        }

        /* main two-column layout */
        .two-column {
            display: flex;
            gap: 1.8rem;
            flex-wrap: wrap;
        }

        .student-list-column {
            flex: 1;
            min-width: 320px;
            background: #f9fbfe;
            border: 1px solid #e3e3e3;
            border-radius: 22px;
            padding: 1.5rem;
            height: 600px;
            overflow-y: auto;
            box-shadow: 0 8px 22px -12px rgba(0,0,0,0.06);
        }

        .student-detail-column {
            flex: 2;
            min-width: 480px;
            background: #f9fbfe;
            border: 1px solid #e3e3e3;
            border-radius: 22px;
            padding: 1.8rem;
            height: 600px;
            overflow-y: auto;
            box-shadow: 0 8px 22px -12px rgba(0,0,0,0.06);
        }

        .list-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
            color: #2c2c4a;
        }
        .list-header i {
            font-size: 1.4rem;
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .list-header h4 {
            font-weight: 700;
            font-size: 1.3rem;
        }

        /* student cards in list */
        .student-card {
            border: 1px solid #e3e3e3;
            border-radius: 18px;
            padding: 1rem 1.2rem;
            margin-bottom: 0.8rem;
            background: white;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 10px -8px rgba(0,0,0,0.1);
        }

        .student-card:hover {
            border-color: #b5c8ff;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -14px #4c74ff;
        }

        .student-card.selected {
            border: 2px solid #8a52ff;
            background: #f0f3ff;
        }

        .student-name {
            font-weight: 700;
            color: #1e1e30;
            margin-bottom: 0.3rem;
        }

        .student-meta {
            font-size: 0.8rem;
            color: #777;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .project-badge {
            background: #f3f6fb;
            border-radius: 30px;
            padding: 0.2rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #4c74ff;
            border: 1px solid #e3e3e3;
        }

        /* detail card for student profile */
        .profile-card {
            background: white;
            border: 1px solid #e3e3e3;
            border-radius: 22px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 12px -8px rgba(0,0,0,0.08);
        }

        .profile-header {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1.2rem;
        }
        .profile-header i {
            font-size: 2.2rem;
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 0.5rem;
            font-size: 0.95rem;
        }
        .profile-grid div:nth-child(odd) {
            color: #777;
            font-weight: 500;
        }
        .profile-grid div:nth-child(even) {
            color: #1e1e30;
            font-weight: 500;
        }

        /* project cards */
        .project-card {
            background: white;
            border: 1px solid #e3e3e3;
            border-radius: 20px;
            padding: 1.3rem;
            margin: 1rem 0;
            box-shadow: 0 6px 14px -10px rgba(0,0,0,0.08);
        }

        .project-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }
        .project-title h5 {
            font-weight: 700;
            font-size: 1.2rem;
            color: #1e1e30;
        }
        .status-badge {
            background: #f3f6fb;
            border-radius: 30px;
            padding: 0.2rem 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid #e3e3e3;
        }

        .tech-tag {
            display: inline-block;
            background: linear-gradient(145deg, #4c74ff20, #8a52ff20);
            border: 1px solid #e3e3e3;
            border-radius: 30px;
            padding: 0.25rem 0.8rem;
            font-size: 0.75rem;
            margin: 0.2rem 0.2rem;
            color: #2d2d4a;
        }

        .progress-bar {
            background: #f3f6fb;
            height: 8px;
            border-radius: 20px;
            margin: 0.8rem 0;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            height: 8px;
            border-radius: 20px;
        }

        .project-actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.8rem;
        }

        .project-actions button {
            background: #f3f6fb;
            border: 1px solid #e3e3e3;
            border-radius: 30px;
            padding: 0.4rem 1.2rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #3f3f60;
            cursor: pointer;
            transition: all 0.1s;
        }
        .project-actions button:hover {
            background: white;
            border-color: #8a52ff;
        }

        .debug-section {
            margin-top: 2rem;
            border-top: 1px solid #e3e3e3;
            padding-top: 1rem;
        }
        .debug-summary {
            color: #777;
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
        }
        .debug-content {
            background: #f3f6fb;
            border-radius: 16px;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.8rem;
            max-height: 150px;
            overflow-y: auto;
            color: #1e1e30;
        }

        @media (max-width: 950px) {
            .dashboard-wrapper {
                flex-wrap: wrap;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #e3e3e3;
                flex-direction: row;
                flex-wrap: wrap;
                align-items: center;
                gap: 1rem;
                padding: 1.5rem;
            }
            .side-nav {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            .sidebar-footer {
                margin-top: 0;
                border-top: none;
                padding-top: 0;
            }
            .logout-btn {
                width: auto;
                padding: 0.8rem 1.8rem;
            }
        }
        @media (max-width: 700px) {
            .main-content {
                padding: 1.5rem;
            }
            .filter-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="dashboard-wrapper">
    <!-- LEFT SIDEBAR (vertical) -->
    <div class="sidebar">
        <div class="sidebar-brand">
            
        </div>
        <div class="side-nav">
            <button class="side-nav-btn" onclick="window.location.href='dashboard.html'"><i class="fas fa-home"></i><span>Dashboard</span></button>
            <button class="side-nav-btn" onclick="window.location.href='students.html'"><i class="fas fa-user-graduate"></i><span>Students</span></button>
            <button class="side-nav-btn active" onclick="window.location.href='student-directory.html'"><i class="fas fa-folder-tree"></i><span>Student Projects</span></button>
            <button class="side-nav-btn" onclick="window.location.href='teachers.html'"><i class="fas fa-chalkboard-user"></i><span>Teachers</span></button>
            <button class="side-nav-btn" onclick="window.location.href='materials.html'"><i class="fas fa-book-open"></i><span>Materials</span></button>
            <button class="side-nav-btn" onclick="window.location.href='user-management.html'"><i class="fas fa-users-cog"></i><span>Manage Users</span></button>
            <button class="side-nav-btn" onclick="window.location.href='projects.html'"><i class="fas fa-code-branch"></i><span>Projects</span></button>
            <button class="side-nav-btn" onclick="window.location.href='quizzes.html'"><i class="fas fa-puzzle-piece"></i><span>Quizzes</span></button>
            <button class="side-nav-btn" onclick="window.location.href='stats.html'"><i class="fas fa-chart-line"></i><span>System Stats</span></button>
        </div>
        <div class="sidebar-footer">
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i><span>Logout</span><i class="fas fa-arrow-right" style="font-size:0.8rem; opacity:0;"></i>
            </button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <!-- simple header -->
        <div class="page-header">
            <div class="header-left">
                <i class="fas fa-folder-tree"></i>
                <h3>📋 STUDENT DIRECTORY WITH PROJECTS</h3>
            </div>
            <div class="action-buttons">
                <button class="btn-secondary" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> BACK TO DASHBOARD</button>
                <button class="btn-primary" onclick="loadStudentsWithProjects()"><i class="fas fa-sync-alt"></i> REFRESH</button>
                <!-- <button class="btn-secondary" onclick="toggleView()" id="toggleViewBtn"><i class="fas fa-users"></i> SHOW ALL STUDENTS</button> -->
            </div>
        </div>

        <!-- FILTER CARD (same content, redesigned) -->
        <div class="filter-card">
            <div class="filter-header">
                <i class="fas fa-filter"></i>
                <span>FILTER STUDENTS</span>
            </div>
            <div class="filter-grid">
                <div class="filter-field">
                    <label>Branch</label>
                    <select id="filterBranch" onchange="applyFilters()"><option value="">ALL</option></select>
                </div>
                <div class="filter-field">
                    <label>Section</label>
                    <select id="filterSection" onchange="applyFilters()"><option value="">ALL</option></select>
                </div>
                <div class="filter-field">
                    <label>Semester</label>
                    <select id="filterSemester" onchange="applyFilters()"><option value="">ALL</option></select>
                </div>
                <div class="filter-field">
                    <label>Batch</label>
                    <select id="filterBatch" onchange="applyFilters()"><option value="">ALL</option></select>
                </div>
                <div class="filter-field">
                    <label>Status</label>
                    <select id="filterStatus" onchange="applyFilters()">
                        <option value="">ALL</option>
                        <option value="ACTIVE">ACTIVE</option>
                        <option value="INACTIVE">INACTIVE</option>
                        <option value="SUSPENDED">SUSPENDED</option>
                        <option value="GRADUATED">GRADUATED</option>
                    </select>
                </div>
                <div class="filter-field">
                    <label>Search (Name/Roll)</label>
                    <input type="text" id="filterSearch" placeholder="e.g., John" onkeyup="applyFilters()">
                </div>
                <div class="filter-field">
                    <label>Project Filter</label>
                    <select id="filterProjectStatus" onchange="applyFilters()">
                        <option value="">ALL PROJECTS</option>
                        <option value="HAS_PROJECTS">Has Projects</option>
                        <option value="NO_PROJECTS">No Projects</option>
                    </select>
                </div>
            </div>
            <div class="filter-stats">
                <span id="filterStats">Loading students...</span>
                <button class="btn-secondary" onclick="resetFilters()" style="padding:0.4rem 1.2rem;"><i class="fas fa-undo-alt"></i> RESET</button>
            </div>
        </div>

        <!-- Two column main area -->
        <div class="two-column">
            <!-- left: student list -->
            <div class="student-list-column">
                <div class="list-header">
                    <i class="fas fa-users"></i>
                    <h4>STUDENTS <span id="studentCount"></span></h4>
                </div>
                <div id="studentListContainer">Loading...</div>
            </div>

            <!-- right: student details + projects -->
            <div class="student-detail-column" id="studentDetails">
                <div class="list-header" style="margin-top:0;">
                    <i class="fas fa-user-graduate"></i>
                    <h4>STUDENT DETAILS & PROJECTS</h4>
                </div>
                <div id="detailsContent">
                    <p style="color:#777;">Select a student to view profile and projects</p>
                </div>
            </div>
        </div>

        <!-- DEBUG SECTION (unchanged functionality) -->
        <details class="debug-section">
            <summary class="debug-summary"><i class="fas fa-bug"></i> DEBUG INFO</summary>
            <div class="debug-content" id="debugInfo"></div>
        </details>
    </div>
</div>

<!-- ORIGINAL JAVASCRIPT – UNMODIFIED (only visual CSS changed) -->
<script>
    // ==================== CONFIG ====================
    console.log('🚀 Student Directory with Projects initializing...');
    
    const API = "http://localhost:8080";
    let allStudentsWithProjects = [];
    let filteredStudents = [];
    let selectedStudent = null;
    let currentView = "with-projects"; // "with-projects" or "all"
    
    // ==================== TOKEN ====================
    function getToken() {
        const token = localStorage.getItem("token");
        console.log('🔑 Token exists:', !!token);
        return token;
    }
    
    // ==================== CHECK AUTH ====================
    function checkAuth() {
        const token = getToken();
        if (!token) {
            alert("Please login first");
            window.location.href = "../login.html";
            return false;
        }
        return true;
    }
    
    // ==================== TOGGLE VIEW ====================
    function toggleView() {
        const btn = document.getElementById('toggleViewBtn');
        if (currentView === "with-projects") {
            currentView = "all";
            btn.innerHTML = '<i class="fas fa-users"></i> SHOW WITH PROJECTS';
            loadAllStudents();
        } else {
            currentView = "with-projects";
            btn.innerHTML = '<i class="fas fa-users"></i> SHOW ALL STUDENTS';
            loadStudentsWithProjects();
        }
    }
    
    // ==================== LOAD STUDENTS WITH PROJECTS ====================
    async function loadStudentsWithProjects() {
        console.log('📥 Loading students with projects...');
        
        if (!checkAuth()) return;
        
        const token = getToken();
        
        try {
            document.getElementById('studentListContainer').innerHTML = '<div style="text-align:center; padding:2rem; color:#777;"><i class="fas fa-spinner fa-pulse"></i> Loading...</div>';
            
            const response = await fetch(`${API}/admin/with-projects`, {
                headers: { "Authorization": "Bearer " + token }
            });
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            allStudentsWithProjects = await response.json();
            console.log('✅ Students with projects loaded:', allStudentsWithProjects.length, allStudentsWithProjects);
            
            // Extract filter options
            extractFilterOptions();
            
            // Apply filters
            applyFilters();
            
            updateDebugInfo('Students with projects loaded: ' + allStudentsWithProjects.length);
            
        } catch (error) {
            console.error('❌ Error:', error);
            document.getElementById('studentListContainer').innerHTML = 
                `<p style="color:red;">❌ Error: ${error.message}</p>`;
            updateDebugInfo('Error: ' + error.message);
        }
    }
    
    // ==================== LOAD ALL STUDENTS (BASIC) ====================
    async function loadAllStudents() {
        console.log('📥 Loading all students (basic)...');
        
        if (!checkAuth()) return;
        
        const token = getToken();
        
        try {
            document.getElementById('studentListContainer').innerHTML = '<div style="text-align:center; padding:2rem; color:#777;"><i class="fas fa-spinner fa-pulse"></i> Loading...</div>';
            
            const response = await fetch(`${API}/api/admin/students`, {
                headers: { "Authorization": "Bearer " + token }
            });
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const students = await response.json();
            
            // Convert to the same format as with-projects for consistency
            allStudentsWithProjects = students.map(student => ({
                student: student,
                projects: []
            }));
            
            console.log('✅ Students loaded:', allStudentsWithProjects.length);
            
            // Extract filter options
            extractFilterOptions();
            
            // Apply filters
            applyFilters();
            
            updateDebugInfo('Students loaded: ' + allStudentsWithProjects.length);
            
        } catch (error) {
            console.error('❌ Error:', error);
            document.getElementById('studentListContainer').innerHTML = 
                `<p style="color:red;">❌ Error: ${error.message}</p>`;
        }
    }
    
    // ==================== EXTRACT FILTER OPTIONS ====================
    function extractFilterOptions() {
        const branches = new Set();
        const sections = new Set();
        const semesters = new Set();
        const batches = new Set();
        
        allStudentsWithProjects.forEach(item => {
            const s = item.student;
            if (s.branch) branches.add(s.branch);
            if (s.section) sections.add(s.section);
            if (s.semester) semesters.add(s.semester);
            if (s.batch) batches.add(s.batch);
        });
        
        populateSelect('filterBranch', [...branches]);
        populateSelect('filterSection', [...sections]);
        populateSelect('filterSemester', [...semesters]);
        populateSelect('filterBatch', [...batches]);
    }
    
    function populateSelect(selectId, values) {
        const select = document.getElementById(selectId);
        if (!select) return;
        
        select.innerHTML = '<option value="">ALL</option>';
        values.sort().forEach(value => {
            const option = document.createElement('option');
            option.value = value;
            option.textContent = value;
            select.appendChild(option);
        });
    }
    
    // ==================== APPLY FILTERS ====================
    function applyFilters() {
        console.log('🔍 Applying filters...');
        
        const branch = document.getElementById('filterBranch').value;
        const section = document.getElementById('filterSection').value;
        const semester = document.getElementById('filterSemester').value;
        const batch = document.getElementById('filterBatch').value;
        const status = document.getElementById('filterStatus').value;
        const search = document.getElementById('filterSearch').value.toLowerCase();
        const projectFilter = document.getElementById('filterProjectStatus').value;
        
        filteredStudents = allStudentsWithProjects.filter(item => {
            const s = item.student;
            const projects = item.projects || [];
            
            // Branch filter
            if (branch && s.branch !== branch) return false;
            
            // Section filter
            if (section && s.section !== section) return false;
            
            // Semester filter
            if (semester && s.semester != semester) return false;
            
            // Batch filter
            if (batch && s.batch !== batch) return false;
            
            // Status filter
            if (status && s.profileStatus !== status) return false;
            
            // Project filter
            if (projectFilter === 'HAS_PROJECTS' && projects.length === 0) return false;
            if (projectFilter === 'NO_PROJECTS' && projects.length > 0) return false;
            
            // Search filter
            if (search) {
                const name = (s.fullName || '').toLowerCase();
                const roll = (s.rollNumber || '').toLowerCase();
                if (!name.includes(search) && !roll.includes(search)) return false;
            }
            
            return true;
        });
        
        console.log(`✅ Filters applied: ${filteredStudents.length} students`);
        
        // Update stats
        document.getElementById('filterStats').innerHTML = 
            `Showing ${filteredStudents.length} of ${allStudentsWithProjects.length} students`;
        
        // Render student list
        renderStudentList();
    }
    
    // ==================== RESET FILTERS ====================
    function resetFilters() {
        console.log('⟲ Resetting filters...');
        
        document.getElementById('filterBranch').value = '';
        document.getElementById('filterSection').value = '';
        document.getElementById('filterSemester').value = '';
        document.getElementById('filterBatch').value = '';
        document.getElementById('filterStatus').value = '';
        document.getElementById('filterSearch').value = '';
        document.getElementById('filterProjectStatus').value = '';
        
        applyFilters();
    }
    
    // ==================== RENDER STUDENT LIST ====================
    function renderStudentList() {
        const container = document.getElementById('studentListContainer');
        const countSpan = document.getElementById('studentCount');
        
        if (filteredStudents.length === 0) {
            container.innerHTML = '<p style="color:#777; padding:1rem;">No students match the filters</p>';
            if (countSpan) countSpan.textContent = '(0)';
            return;
        }
        
        let html = '';
        filteredStudents.forEach(item => {
            const s = item.student;
            const projectCount = item.projects ? item.projects.length : 0;
            const isSelected = selectedStudent && selectedStudent.id === s.id;
            const selectedClass = isSelected ? 'selected' : '';
            
            html += `
                <div class="student-card ${selectedClass}" onclick="selectStudent(${s.id})">
                    <div class="student-name">${s.fullName || 'Unnamed'}</div>
                    <div class="student-meta">
                        <span>Roll: ${s.rollNumber || 'N/A'}</span>
                        <span>Branch: ${s.branch || 'N/A'}</span>
                        <span>Sem: ${s.semester || 'N/A'}</span>
                        <span class="project-badge"><i class="fas fa-code-branch"></i> ${projectCount}</span>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
        if (countSpan) countSpan.textContent = `(${filteredStudents.length})`;
    }
    
    // ==================== SELECT STUDENT ====================
    function selectStudent(studentId) {
        console.log('👤 Selecting student:', studentId);
        
        const item = allStudentsWithProjects.find(item => item.student.id == studentId);
        if (!item) return;
        
        selectedStudent = item.student;
        showStudentDetails(item);
        
        // Re-render list to highlight selected student
        renderStudentList();
    }
    
    // ==================== SHOW STUDENT DETAILS WITH PROJECTS ====================
    function showStudentDetails(item) {
        const s = item.student;
        const projects = item.projects || [];
        
        console.log(`📋 Showing details for ${s.fullName} with ${projects.length} projects`);
        
        // Student info HTML
        let studentInfoHtml = `
            <div class="profile-card">
                <div class="profile-header">
                    <i class="fas fa-user-circle"></i>
                    <h4 style="margin:0; font-size:1.5rem;">${s.fullName}</h4>
                </div>
                <div class="profile-grid">
                    <div>Roll Number:</div><div>${s.rollNumber || '—'}</div>
                    <div>Register Number:</div><div>${s.registerNumber || '—'}</div>
                    <div>Branch:</div><div>${s.branch || '—'}</div>
                    <div>Section:</div><div>${s.section || '—'}</div>
                    <div>Semester:</div><div>${s.semester || '—'}</div>
                    <div>Batch:</div><div>${s.batch || '—'}</div>
                    <div>Admission Year:</div><div>${s.admissionYear || '—'}</div>
                    <div>College:</div><div>${s.collegeName || '—'}</div>
                    <div>University:</div><div>${s.university || '—'}</div>
                    <div>Status:</div><div>${s.profileStatus || '—'}</div>
                </div>
            </div>
        `;
        
        // Projects HTML
        let projectsHtml = '<h4 style="margin-bottom:1rem; display:flex; gap:0.5rem;"><i class="fas fa-code-branch" style="background:linear-gradient(145deg,#4c74ff,#8a52ff); -webkit-background-clip:text; background-clip:text; color:transparent;"></i> PROJECTS</h4>';
        
        if (projects.length === 0) {
            projectsHtml += '<p style="color:#777;">No projects found for this student.</p>';
        } else {
            projects.forEach((project, index) => {
                const statusColor = {
                    'IDEA': '#888',
                    'IN_PROGRESS': '#36f',
                    'PAUSED': '#f90',
                    'COMPLETED': '#2c7'
                }[project.currentStatus] || '#888';
                
                const techStackHtml = (project.techStack || []).map(tech => 
                    `<span class="tech-tag"><i class="fas fa-code"></i> ${tech.technology} (${tech.type})</span>`
                ).join(' ');
                
                projectsHtml += `
                    <div class="project-card">
                        <div class="project-title">
                            <h5>${project.title || 'Untitled'}</h5>
                            <span class="status-badge" style="background:${statusColor}; color:white;">${project.currentStatus || 'IDEA'}</span>
                        </div>
                        <p style="color:#3f3f60; margin-bottom:1rem;">${project.description || 'No description'}</p>
                        <div style="margin:0.8rem 0;">
                            <div style="display:flex; justify-content:space-between; font-size:0.85rem; color:#777;">
                                <span>Progress</span>
                                <span>${project.progressPercentage || 0}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width:${project.progressPercentage || 0}%;"></div>
                            </div>
                        </div>
                        <div style="margin:1rem 0;">
                            ${techStackHtml}
                        </div>
                        <div style="margin-top:0.8rem; font-size:0.8rem; color:#777;">
                            <span><i class="far fa-calendar-alt"></i> Start: ${project.startDate ? new Date(project.startDate).toLocaleDateString() : 'Not set'}</span>
                            <span style="margin-left:1rem;"><i class="far fa-calendar-check"></i> Target: ${project.expectedEndDate ? new Date(project.expectedEndDate).toLocaleDateString() : 'Not set'}</span>
                        </div>
                        
                    </div>
                `;
            });
        }
        
        const details = document.getElementById("studentDetails");
        details.innerHTML = `
            ${studentInfoHtml}
            ${projectsHtml}
            
        `;
    }
    
    // ==================== RENDER TECH STACK (kept for reference, but not used directly) ====================
    function renderTechStack(techStack) {
        if (!techStack || techStack.length === 0) {
            return '<p style="color:#666; font-style:italic;">No technologies added</p>';
        }
        let html = '<div style="margin:10px 0;"><b>Tech Stack:</b><br>';
        techStack.forEach(tech => {
            html += `<span style="display:inline-block; background:#446; color:white; padding:4px 12px; margin:4px; border-radius:20px; font-size:12px;">${tech.technology} (${tech.type})</span>`;
        });
        html += '</div>';
        return html;
    }
    
    // ==================== NAVIGATION FUNCTIONS ====================
    function viewProjectDetails(projectId) {
        localStorage.setItem("currentProjectId", projectId);
        window.location.href = `project-details.html?id=${projectId}`;
    }
    
    function editProject(projectId) {
        localStorage.setItem("currentProjectId", projectId);
        window.location.href = `project-edit.html?id=${projectId}`;
    }
    
    function createNewProject(studentId) {
        window.location.href = `project-create.html?studentId=${studentId}`;
    }
    
    // ==================== UPDATE DEBUG ====================
    function updateDebugInfo(message) {
        const debugEl = document.getElementById('debugInfo');
        if (debugEl) {
            debugEl.innerHTML = new Date().toLocaleTimeString() + ': ' + message + '<br>' + debugEl.innerHTML;
        }
    }
    
    // ==================== INIT ====================
    window.onload = function() {
        console.log('🟢 Page loaded');
        if (!checkAuth()) return;
        loadStudentsWithProjects();
    };
    
    // logout helper (used in sidebar)
    function logout() {
        localStorage.clear();
        window.location.href = "../login.html";
    }
</script>
</body>

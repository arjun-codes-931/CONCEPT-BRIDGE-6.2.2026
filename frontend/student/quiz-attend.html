<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attend Quiz</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#4e73df,#1cc88a);
    color:#333;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    margin-top:40px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.timer{
    font-size:20px;
    font-weight:bold;
    color:#e74a3b;
}

.question{
    margin-top:25px;
    padding:15px;
    border:1px solid #ddd;
    border-radius:8px;
}

.option{
    margin:6px 0;
}

.progress{
    margin-top:10px;
    font-weight:bold;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:6px;
    background:#4e73df;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2e59d9;
}

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.modal-box{
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
<h2 id="quizTitle">Quiz</h2>
<div class="timer" id="timer">00:00</div>
</div>

<p id="quizInfo"></p>

<div class="progress" id="progress"></div>

<div id="questionContainer"></div>

<br>
<button onclick="confirmSubmit()">Submit Quiz</button>

</div>

<div class="modal" id="confirmModal">
<div class="modal-box">
<h3>Submit Quiz?</h3>
<p>Are you sure you want to submit?</p>
<button onclick="submitQuiz()">Yes Submit</button>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<script>

const API = "http://localhost:8080";
const token = localStorage.getItem("token");

const urlParams = new URLSearchParams(window.location.search);
const quizId = urlParams.get("quizId");
let studentId = urlParams.get("studentId") || localStorage.getItem("studentId");

let attemptId = null;
let questions = [];
let answers = {};
let timerInterval = null;
let remainingSeconds = 0;

console.log("QuizId:",quizId);
console.log("StudentId:",studentId);

window.onload = async () => {

if(!token){
alert("Login required");
window.location.href="../login.html";
return;
}

await loadQuiz();
};

async function loadQuiz(){

try{

console.log("Checking quiz status...");

const statusRes = await fetch(`${API}/student/quiz/status/${quizId}?studentId=${studentId}`,{
headers:{ "Authorization":"Bearer "+token }
});

const status = await statusRes.json();

console.log("Status:",status);

if(status.hasAttempted && status.status==="IN_PROGRESS"){
attemptId = status.attemptId;
console.log("Resuming attempt:",attemptId);
await loadSavedAnswers();
}else if(!status.hasAttempted){
await startQuiz();
}else{
alert("Quiz already submitted. Score: "+status.score);
return;
}

await loadQuizDetails();
await loadQuestions();

}catch(err){
console.error("Error loading quiz:",err);
alert("Failed to load quiz");
}

}

async function startQuiz(){

console.log("Starting new attempt...");

const res = await fetch(`${API}/student/quiz/${quizId}/start?studentId=${studentId}`,{
method:"POST",
headers:{ "Authorization":"Bearer "+token }
});

const data = await res.json();
attemptId = data.id;

console.log("New attempt:",attemptId);
}

async function loadQuizDetails(){

const res = await fetch(`${API}/student/quiz/${quizId}/details`,{
headers:{ "Authorization":"Bearer "+token }
});

const quiz = await res.json();

document.getElementById("quizTitle").innerText = quiz.title;
document.getElementById("quizInfo").innerText =
`${quiz.subject} | Duration: ${quiz.durationMinutes} minutes | Marks: ${quiz.totalMarks}`;

remainingSeconds = quiz.durationMinutes * 60;

startTimer();
}

async function loadQuestions(){

const res = await fetch(`${API}/student/quiz/${quizId}/questions`,{
headers:{ "Authorization":"Bearer "+token }
});

questions = await res.json();

console.log("Questions:",questions);

renderQuestions();
updateProgress();
}

async function loadSavedAnswers(){

const res = await fetch(`${API}/student/quiz/attempt/${attemptId}/answers`,{
headers:{ "Authorization":"Bearer "+token }
});

const saved = await res.json();

saved.forEach(a=>{
answers[a.questionId] = a.selectedOption;
});

console.log("Loaded answers:",answers);
}

function renderQuestions(){

const container = document.getElementById("questionContainer");

container.innerHTML = questions.map((q,i)=>{

const selected = answers[q.id];

return `
<div class="question">
<b>Q${i+1}. ${q.questionText}</b>

<div class="option">
<label>
<input type="radio" name="q${q.id}" value="A"
${selected==="A"?"checked":""}
onclick="saveAnswer(${q.id},'A')">
A) ${q.optionA}
</label>
</div>

<div class="option">
<label>
<input type="radio" name="q${q.id}" value="B"
${selected==="B"?"checked":""}
onclick="saveAnswer(${q.id},'B')">
B) ${q.optionB}
</label>
</div>

<div class="option">
<label>
<input type="radio" name="q${q.id}" value="C"
${selected==="C"?"checked":""}
onclick="saveAnswer(${q.id},'C')">
C) ${q.optionC}
</label>
</div>

<div class="option">
<label>
<input type="radio" name="q${q.id}" value="D"
${selected==="D"?"checked":""}
onclick="saveAnswer(${q.id},'D')">
D) ${q.optionD}
</label>
</div>

</div>
`;

}).join("");

}

async function saveAnswer(questionId,option){

console.log("Saving answer:",questionId,option);

answers[questionId] = option;
updateProgress();

try{

await fetch(`${API}/student/quiz/attempt/${attemptId}/answer`,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({
questionId:questionId,
selectedOption:option
})
});

}catch(err){
console.error("Save answer failed:",err);
}

}

function updateProgress(){

const total = questions.length;
const answered = Object.keys(answers).length;

document.getElementById("progress").innerText =
`Answered ${answered} / ${total} questions`;
}

function startTimer(){

timerInterval = setInterval(()=>{

remainingSeconds--;

const min = Math.floor(remainingSeconds/60);
const sec = remainingSeconds%60;

document.getElementById("timer").innerText =
`${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

if(remainingSeconds<=0){
clearInterval(timerInterval);
alert("Time up! Submitting quiz.");
submitQuiz();
}

},1000);

}

function confirmSubmit(){
document.getElementById("confirmModal").style.display="flex";
}

function closeModal(){
document.getElementById("confirmModal").style.display="none";
}

async function submitQuiz(){

clearInterval(timerInterval);

const payload = Object.entries(answers).map(([qid,opt])=>({
questionId:parseInt(qid),
selectedOption:opt
}));

console.log("Submitting answers:",payload);

try{

const res = await fetch(`${API}/student/quiz/submit/${attemptId}`,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify(payload)
});

const result = await res.json();

alert("Quiz submitted! Score: "+result.score);

window.location.href="quiz.html";

}catch(err){

console.error("Submit failed:",err);
alert("Failed to submit quiz");

}

}

</script>

</body>
</html>

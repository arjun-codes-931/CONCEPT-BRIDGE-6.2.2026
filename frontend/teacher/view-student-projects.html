<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Projects · Nexus</title>
    <!-- Google Fonts: Inter modern sans-serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (free) for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #5f79ff, #7a5cff, #a16cff);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            line-height: 1.5;
        }

        /* main white dashboard with sidebar layout */
        .dashboard-wrapper {
            width: 100%;
            max-width: 1600px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 35px 60px -20px rgba(30, 30, 60, 0.4), 0 10px 25px -8px rgba(0,0,0,0.2);
            display: flex;
            overflow: hidden;
            min-height: 750px;
        }

        /* ========== LEFT VERTICAL SIDEBAR ========== */
        .sidebar {
            width: 280px;
            background: #f3f6fb;          /* input background */
            border-right: 1px solid #e3e3e3;
            padding: 2rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 2.2rem;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding-left: 0.5rem;
        }

        .brand-icon {
            width: 2.8rem;
            height: 2.8rem;
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 14px -6px #4c74ff66;
        }

        .brand-icon i {
            font-size: 1.6rem;
            color: white;
        }

        .brand-text {
            font-weight: 700;
            font-size: 1.4rem;
            background: linear-gradient(145deg, #1e1e3f, #4c74ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        /* vertical navigation */
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 1rem;
            border-radius: 16px;
            color: #4a4a6a;
            font-weight: 500;
            transition: all 0.2s ease;
            background: transparent;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            border: none;
            width: 100%;
            text-align: left;
            cursor: default;
        }

        .nav-item i {
            font-size: 1.3rem;
            width: 2rem;
            text-align: center;
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-item span {
            font-weight: 600;
        }

        .nav-item.active {
            background: white;
            border-left: 4px solid #8a52ff;
            border-radius: 16px 12px 12px 16px;
            box-shadow: 0 0 0 1px rgba(76,116,255,0.15) inset;
            color: #1e1e3a;
        }

        .nav-item:hover {
            background: white;
            border-color: #e3e3e3;
            box-shadow: 0 8px 18px -12px #4c74ff, 0 0 0 1px rgba(76,116,255,0.2) inset;
            transform: translateX(4px);
            color: #4c74ff;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 1.5rem;
            border-top: 1px solid #e3e3e3;
        }

        .logout-btn {
            background: #f3f6fb;
            border: 1px solid #e3e3e3;
            border-radius: 40px;
            padding: 0.9rem 1.2rem;
            color: #4c516d;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }

        .logout-btn i {
            font-size: 1.2rem;
            color: #777;
        }

        .logout-btn:hover {
            background: white;
            border-color: #ffb7b7;
            transform: translateY(-2px);
            box-shadow: 0 12px 18px -14px #e5515b;
        }
        .logout-btn:hover i {
            color: #e5515b;
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            padding: 2rem 2.5rem;
            background: white;
            display: flex;
            flex-direction: column;
        }

        /* TOP AREA – minimal header */
        .header-flex {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .title-section h1 {
            font-weight: 700;
            font-size: 2rem;
            background: linear-gradient(145deg, #1e1e30, #4c74ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .title-section h1 i {
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .student-greeting {
            background: #f3f6fb;
            border: 1px solid #e3e3e3;
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            color: #3f3f60;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .student-greeting i {
            color: #777;
        }
        #studentName {
            font-weight: 700;
            color: #1e1e30;
        }

        #backBtn {
            background: #f3f6fb;
            border: 1px solid #e3e3e3;
            border-radius: 40px;
            padding: 0.7rem 1.6rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: #3f3f60;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #backBtn i {
            color: #777;
        }
        #backBtn:hover {
            background: white;
            border-color: #b5c8ff;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -10px #4c74ff;
        }

        /* table card – white */
        .table-card {
            background: #f9fbfe;
            border: 1px solid #e3e3e3;
            border-radius: 24px;
            padding: 1rem 0;
            box-shadow: 0 8px 22px -12px rgba(0,0,0,0.06);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 0.8rem;
            min-width: 700px;
            padding: 0 1.2rem;
        }

        th {
            text-align: left;
            padding: 1rem 1rem 0.8rem 1rem;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #777;
            border-bottom: 1px solid #e3e3e3;
        }

        td {
            padding: 1.2rem 1rem;
            background: white;
            border: 1px solid #e3e3e3;
            border-radius: 18px;
            color: #1e1e30;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px -8px rgba(0,0,0,0.1);
        }

        tr:hover td {
            background: #f3f6fb;
            border-color: #b5c8ff;
        }

        td strong {
            font-weight: 700;
            color: #1e1e30;
        }

        /* details button – primary gradient */
        button[onclick^="showProjectDetails"] {
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            border: none;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.5rem 1.4rem;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 12px -8px #4c74ff;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            border: 1px solid rgba(255,255,255,0.2);
        }
        button[onclick^="showProjectDetails"] i {
            font-size: 0.8rem;
        }
        button[onclick^="showProjectDetails"]:hover {
            background: linear-gradient(145deg, #5f7eff, #9a62ff);
            transform: translateY(-2px);
            box-shadow: 0 12px 18px -10px #4c74ff;
        }

        /* empty / loading states */
        #projectsTable td[colspan] {
            color: #777;
            text-align: center;
            padding: 2.5rem !important;
            background: white;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f3f6fb; border-radius: 12px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(145deg, #4c74ff, #8a52ff); border-radius: 12px; }

        @media (max-width: 900px) {
            body {
                flex-direction: column;
                padding: 1rem;
            }
            .dashboard-wrapper {
                flex-wrap: wrap;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #e3e3e3;
                flex-direction: row;
                flex-wrap: wrap;
                align-items: center;
                gap: 1rem;
                padding: 1.5rem;
            }
            .nav-menu {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            .sidebar-footer {
                margin-top: 0;
                border-top: none;
                padding-top: 0;
            }
            .logout-btn {
                width: auto;
                padding: 0.8rem 1.8rem;
            }
        }

        @media (max-width: 640px) {
            .main-content {
                padding: 1.5rem;
            }
            .header-flex {
                flex-direction: column;
                align-items: start;
            }
        }

        button:focus-visible {
            outline: 3px solid #8a52ff;
            outline-offset: 3px;
        }
    </style>
</head>
<body>
<div class="dashboard-wrapper">
    <!-- LEFT VERTICAL SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            
        </div>
        <nav class="nav-menu">
            <div class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></div>
            <div class="nav-item"><i class="fas fa-user-graduate"></i><span>Students</span></div>
            <div class="nav-item active"><i class="fas fa-code-branch"></i><span>Projects</span></div>
            <div class="nav-item"><i class="fas fa-book-open"></i><span>Materials</span></div>
            <div class="nav-item"><i class="fas fa-puzzle-piece"></i><span>Quizzes</span></div>
            <div class="nav-item"><i class="fas fa-tasks"></i><span>Assignments</span></div>
        </nav>
        <div class="sidebar-footer">
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i><span>Logout</span><i class="fas fa-arrow-right" style="font-size:0.8rem; opacity:0;"></i>
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="main-content">
        <!-- Header with back button & student pill -->
        <div class="header-flex">
            <div class="title-section">
                <h1><i class="fas fa-layer-group"></i> Student projects</h1>
                <div class="student-greeting">
                    <i class="fas fa-graduation-cap"></i>
                    <span>Student: <strong id="studentName">Loading...</strong></span>
                </div>
            </div>
            <button id="backBtn">
                <i class="fas fa-arrow-left"></i> Back to dashboard
            </button>
        </div>

        <!-- Table area – white card -->
        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th><i class="fas fa-code-branch" style="margin-right: 0.4rem;"></i>Project Title</th>
                        <th><i class="fas fa-tag" style="margin-right: 0.4rem;"></i>Category</th>
                        <th><i class="fas fa-spinner" style="margin-right: 0.4rem;"></i>Status</th>
                        <th><i class="fas fa-chart-line" style="margin-right: 0.4rem;"></i>Progress</th>
                        <th><i class="fas fa-cog" style="margin-right: 0.4rem;"></i>Actions</th>
                    </tr>
                </thead>
                <tbody id="projectsTable">
                    <tr><td colspan="5" style="text-align: center;">Loading projects...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- JavaScript remains 100% untouched – only visual changes above -->
<script>
    const API_BASE_URL = 'http://localhost:8080';
    const params = new URLSearchParams(window.location.search);
const projectId = params.get("id");

console.log("📌 Project ID:", projectId);
    document.addEventListener('DOMContentLoaded', function() {
        // Get student info from URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId');
        const studentName = urlParams.get('studentName') || 'Student';
        
        if (!userId) {
            alert('No student ID provided');
            window.close();
            return;
        }
        
        document.getElementById('studentName').textContent = decodeURIComponent(studentName);
        loadStudentProjects(userId);
        
        // Setup back button
        document.getElementById('backBtn').addEventListener('click', () => {
            window.history.back();
        });
    });
    
    async function loadStudentProjects(userId) {

    const tableBody = document.getElementById('projectsTable');

    try {

        const token = localStorage.getItem("token");

        if (!token) {
            throw new Error("No authentication token");
        }

        console.log("Fetching projects for student:", userId);

        const response = await fetch(`${API_BASE_URL}/student/project/list?studentId=${userId}`, {
            headers: {
                'Authorization': 'Bearer ' + token
            }
        });

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${await response.text()}`);
        }

        const projects = await response.json();

        displayProjects(projects);

    } catch (error) {

        console.error("Error:", error);

        tableBody.innerHTML = `
        <tr>
            <td colspan="5" style="color:#d14545;text-align:center;">
                Error: ${error.message}
            </td>
        </tr>
        `;
    }
}
    
    function displayProjects(projects) {
        const tableBody = document.getElementById('projectsTable');
        tableBody.innerHTML = '';
        
        if (!projects || projects.length === 0) {
            tableBody.innerHTML = `
                <tr>
                    <td colspan="5" style="text-align:center; padding:20px; color: #777;">
                        <i class="fas fa-folder-open" style="margin-right: 0.5rem;"></i>No projects found
                    </td>
                </tr>
            `;
            return;
        }
        
        projects.forEach(project => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${project.title}</strong></td>
                <td>${project.category || 'N/A'}</td>
                <td>${project.currentStatus || 'N/A'}</td>
                <td>${project.progressPercentage || 0}%</td>
                <td>
                    <button onclick="showProjectDetails(${project.id})">
                        <i class="fas fa-chevron-circle-right"></i> Details
                    </button>
                </td>
            `;
            tableBody.appendChild(row);
        });
    }
    
   function showProjectDetails(projectId) {

    console.log("Opening project:", projectId);

    window.location.href = `../student/project-details.html?id=${projectId}`;

}
    
    function logout() {
        localStorage.clear();
        window.location.href = '../login.html';
    }
</script>
</body>
</html>

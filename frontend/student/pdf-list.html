<!DOCTYPE html>
<html lang="en">
<head>
    <title>PDF Library</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Font: Inter (modern) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (icons for clean premium look) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ----- RESET & BASE (strict palette) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #5f79ff 0%, #7a5cff 55%, #a16cff 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
            color: #1e1e2f;
            line-height: 1.5;
        }

        /* ----- LAYOUT: left sidebar + main content (visual only) ----- */
        .app-wrapper {
            display: flex;
            max-width: 1400px;
            width: 100%;
            gap: 1.8rem;
            align-items: stretch;
        }

        /* ---------- LEFT SIDEBAR (vertical menu) ---------- */
        .sidebar {
            width: 280px;
            background: white;                    /* card background */
            border-radius: 24px;
            padding: 2rem 1.2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2), 0 0 0 1px #e3e3e3 inset;
            border: 1px solid #e3e3e3;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 0 0.5rem 1.8rem 0.5rem;
            border-bottom: 1px solid #e3e3e3;
            margin-bottom: 1.8rem;
        }

        .sidebar-header h3 {
            font-weight: 600;
            font-size: 1.4rem;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }

        .sidebar-header h3 i {
            font-size: 1.8rem;
            color: #4c74ff;
        }

        /* menu items — now clickable with navigation */
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            flex: 1;
        }

        .sidebar-nav-item {
            padding: 1rem 1.2rem;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #777;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid transparent;
            cursor: pointer;
            background: transparent;
            width: 100%;
            text-align: left;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }

        .sidebar-nav-item i {
            width: 1.8rem;
            color: #777;
            font-size: 1.25rem;
            transition: color 0.2s;
        }

        .sidebar-nav-item:hover {
            background: #f3f6fb;
            border-color: #e3e3e3;
            color: #1e293b;
        }

        .sidebar-nav-item:hover i {
            color: #4c74ff;
        }

        .sidebar-nav-item.active {
            background: linear-gradient(135deg, #4c74ff10, #8a52ff10);
            border-left: 4px solid #4c74ff;
            background: #f0f4ff;
            font-weight: 600;
            color: #1e293b;
        }

        .sidebar-nav-item.active i {
            color: #4c74ff;
        }

        .sidebar-footer {
            padding: 1.5rem 0.8rem 0.2rem;
            border-top: 1px solid #e3e3e3;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #777;
        }

        /* ---------- MAIN CONTENT (white card) ---------- */
        .main-content {
            flex: 1;
            background: white;
            border-radius: 28px;
            padding: 2.2rem 2.5rem;
            box-shadow: 0 30px 60px -15px rgba(58, 48, 94, 0.3), 0 0 0 1px #e3e3e3 inset;
            border: 1px solid #e3e3e3;
        }

        /* header area */
        .header-section {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem 1.5rem;
            margin-bottom: 2rem;
        }

        .back-btn {
            background: white;
            border: 1.5px solid #e3e3e3;
            color: #777;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.7rem 2rem 0.7rem 1.6rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            font-family: 'Inter', sans-serif;
        }

        .back-btn i {
            color: #4c74ff;
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: #f3f6fb;
            border-color: #b3c0d9;
            transform: translateX(-2px);
        }

        .premium-title {
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .premium-title i {
            font-size: 2rem;
            color: #4c74ff;
        }

        /* PDF List container */
        #pdfList {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* PDF item styling - exactly the same elements, redesigned */
        #pdfList > div, .pdf-item {
            background: white !important;
            border: 1px solid #e3e3e3 !important;
            border-radius: 22px !important;
            padding: 1.5rem 2rem !important;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 18px -8px rgba(0,0,0,0.05);
            backdrop-filter: none !important;
            color: #1e293b;
        }

        #pdfList > div:hover, .pdf-item:hover {
            transform: translateY(-2px);
            border-color: #b3c0d9 !important;
            box-shadow: 0 16px 28px -12px rgba(76, 116, 255, 0.2) !important;
            background: #f9fcff !important;
        }

        #pdfList > div strong, .pdf-item strong {
            color: #1e293b;
            font-size: 1.2rem;
            font-weight: 600;
            display: block;
            margin-bottom: 0.4rem;
        }

        #pdfList > div small, .pdf-item small {
            color: #777;
            font-size: 0.9rem;
            display: block;
        }

        /* Loading state */
        #pdfList:empty::before,
        #pdfList p:only-child {
            background: #f3f6fb;
            border-radius: 22px;
            padding: 3rem;
            text-align: center;
            color: #777;
            border: 1px solid #e3e3e3;
            font-size: 1rem;
        }

        /* Error container styling */
        #pdfList div[style*="color: red"] {
            background: #fff2f0 !important;
            border: 1px solid #ffb0b0 !important;
            border-radius: 22px !important;
            padding: 2rem !important;
            color: #b33c3c !important;
            font-weight: 500;
        }

        #pdfList button {
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            border: none;
            border-radius: 40px;
            padding: 0.7rem 2rem;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.2);
            font-family: 'Inter', sans-serif;
            margin-right: 0.8rem;
            box-shadow: 0 6px 14px rgba(76, 116, 255, 0.25);
        }

        #pdfList button:hover {
            background: linear-gradient(135deg, #5f83ff, #9f63ff);
            transform: translateY(-2px);
            box-shadow: 0 14px 22px -8px #4c74ff;
        }

        /* responsive */
        @media (max-width: 800px) {
            .app-wrapper {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
                padding: 1.2rem;
            }
            .sidebar-header {
                width: 100%;
                border-bottom: none;
                padding-bottom: 0.8rem;
            }
            .sidebar-nav {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 0.3rem;
            }
            .sidebar-nav-item {
                flex: 1 0 auto;
                justify-content: center;
            }
        }

        @media (max-width: 550px) {
            body { padding: 0.8rem; }
            .main-content { padding: 1.5rem; }
        }

        /* icons */
        .fas, .far, .fab {
            margin-right: 0.2rem;
        }
    </style>
</head>
<body>
    <!-- layout wrapper: left sidebar + main content -->
    <div class="app-wrapper">
        <!-- LEFT SIDEBAR (now with working navigation) -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-graduation-cap"></i> Concept Bridge</h3>
            </div>
            <div class="sidebar-nav">
                <!-- Each menu item now redirects to the correct page -->
                <div class="sidebar-nav-item" onclick="window.location.href='assignment-list.html'">
                    <i class="fas fa-tasks"></i> Assignments
                </div>
                <div class="sidebar-nav-item" onclick="window.location.href='quiz.html'">
                    <i class="fas fa-puzzle-piece"></i> Quizzes
                </div>
                <div class="sidebar-nav-item" onclick="window.location.href='project-list.html'">
                    <i class="fas fa-code"></i> Projects
                </div>
                <div class="sidebar-nav-item active" onclick="window.location.href='pdf-list.html'">
                    <i class="fas fa-file-pdf"></i> PDFs
                </div>
                <div class="sidebar-nav-item" onclick="window.location.href='student-profile.html'">
                    <i class="fas fa-user-circle"></i> Profile
                </div>
            </div>
            
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="header-section">
                <button class="back-btn" onclick="window.history.back()">
                    <i class="fas fa-arrow-left"></i> Dashboard
                </button>
                <h2 class="premium-title"><i class="fas fa-file-pdf"></i> Available PDFs</h2>
            </div>

            <!-- PDF List container - ID preserved -->
            <div id="pdfList">Loading...</div>
        </div>
    </div>

    <!-- JavaScript - EXACT original, untouched -->
    <script>
    const API = "http://localhost:8080";
let token = localStorage.getItem("token");
let studentProfile = null;

window.onload = async () => {
    if (!token) {
        alert("Login required");
        window.location.href = "../login.html";
        return;
    }

    try {
        await loadStudentProfile();
        await loadPDFs();
    } catch (err) {
        console.error(err);
        showError(err.message);
    }
};

async function loadStudentProfile() {

    const res = await fetch(`${API}/student/profile`, {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    if (!res.ok) {
        throw new Error("Unable to load student profile");
    }

    studentProfile = await res.json();

    console.log("Student profile:", studentProfile);

}

async function loadPDFs() {

    const { branch, semester } = studentProfile;

    if (!branch || !semester) {
        throw new Error("Student branch or semester missing");
    }

    const res = await fetch(
        `${API}/student/material/pdfs?branch=${encodeURIComponent(branch)}&semester=${semester}`,
        {
            headers: {
                "Authorization": "Bearer " + token
            }
        }
    );

    if (!res.ok) {
        throw new Error("Failed to load PDFs");
    }

    const pdfs = await res.json();

    console.log("PDFs:", pdfs);

    displayPDFs(pdfs);
}

function displayPDFs(pdfs) {

    const container = document.getElementById("pdfList");
    container.innerHTML = "";

    if (!pdfs || pdfs.length === 0) {
        container.innerHTML = "<p>No PDFs available for your batch.</p>";
        return;
    }

    pdfs.forEach(pdf => {

        const div = document.createElement("div");
        div.className = "pdf-item";

        div.innerHTML = `
            <strong>${pdf.title}</strong>
            <small>
                Subject: ${pdf.subject || "N/A"} |
                Uploaded: ${pdf.createdAt ? new Date(pdf.createdAt).toLocaleDateString() : "N/A"}
            </small>
        `;

        div.onclick = () => {
            window.open(`../student/pdf-viewer.html?id=${pdf.id}`, "_blank");
        };

        container.appendChild(div);

    });
}

function showError(message) {

    const container = document.getElementById("pdfList");

    container.innerHTML = `
        <div style="color:red">
            <strong>Error:</strong> ${message}<br><br>
            <button onclick="location.reload()">Retry</button>
        </div>
    `;
}
    
    </script>
</body>
</html>

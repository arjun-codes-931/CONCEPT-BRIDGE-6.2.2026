<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard | Nexus</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
  /* ----- RESET & GLOBAL ----- */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    background: linear-gradient(145deg, #5f79ff, #7a5cff, #a16cff);
    background-attachment: fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    position: relative;
  }

  /* subtle background depth (only visual) */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 10% 30%, rgba(255,255,255,0.2) 0%, transparent 40%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 1300px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
  }

  /* ----- MAIN DASHBOARD CARD (WHITE, SIDEBAR LAYOUT) ----- */
  .dashboard {
    background: white;
    border-radius: 28px;
    display: flex;
    flex-wrap: nowrap;
    min-height: 580px;
    box-shadow: 
      0 35px 60px -20px rgba(30, 30, 60, 0.4),
      0 10px 25px -8px rgba(0,0,0,0.2),
      inset 0 1px 1px rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.4);
    overflow: hidden;
  }

  /* ----- VERTICAL SIDEBAR (left) ----- */
  .sidebar {
    width: 260px;
    background: #f3f6fb;          /* input bg */
    border-right: 1px solid #e3e3e3;
    padding: 2rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 2.2rem;
  }

  .sidebar-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding-left: 0.75rem;
  }

  .brand-icon {
    width: 2.8rem;
    height: 2.8rem;
    background: linear-gradient(145deg, #4c74ff, #8a52ff);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 14px -6px #4c74ff66;
  }

  .brand-icon i {
    font-size: 1.6rem;
    color: white;
  }

  .brand-text {
    font-weight: 700;
    font-size: 1.3rem;
    background: linear-gradient(145deg, #1e1e3f, #2d2d5a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
  }

  /* side navigation menu (vertical) */
  .side-nav {
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
    flex: 1;
  }

  /* nav items – identical to original buttons but vertical */
  .side-nav-btn {
    background: transparent;
    border: none;
    border-radius: 16px;
    padding: 1rem 1.2rem;
    color: #1e1e3a;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 1rem;
    width: 100%;
    text-align: left;
    font-family: 'Inter', sans-serif;
    border: 1px solid transparent;
  }

  .side-nav-btn i {
    font-size: 1.4rem;
    width: 2rem;
    text-align: center;
    background: linear-gradient(145deg, #4c74ff, #8a52ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    transition: transform 0.15s;
  }

  .side-nav-btn span {
    font-weight: 600;
    color: #3f3f60;
  }

  /* hover & active effect (gradient highlight) */
  .side-nav-btn:hover {
    background: white;
    border-color: #e3e3e3;
    box-shadow: 0 8px 18px -12px #4c74ff, 0 0 0 1px rgba(76,116,255,0.2) inset;
    transform: translateX(4px);
  }

  .side-nav-btn:hover i {
    transform: scale(1.05);
  }

  /* simulate an "active" state on first button (just for show, no JS change) – purely visual */
  .side-nav-btn:first-child {
    background: white;
    border-color: #d0ddff;
    box-shadow: 0 6px 14px -10px #4c74ff, 0 0 0 2px rgba(76,116,255,0.15) inset;
  }

  /* logout button inside sidebar */
  .sidebar-logout {
    margin-top: auto;
    padding-top: 1.5rem;
    border-top: 1px solid #e3e3e3;
  }

  .logout-btn {
    background: #f3f6fb;
    border: 1px solid #e3e3e3;
    border-radius: 40px;
    padding: 0.9rem 1.2rem;
    color: #4c516d;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    width: 100%;
    font-family: 'Inter', sans-serif;
  }

  .logout-btn i {
    font-size: 1.2rem;
    color: #777;    /* secondary text */
  }

  .logout-btn span {
    color: #4c516d;
  }

  .logout-btn:hover {
    background: white;
    border-color: #ffb7b7;
    transform: translateY(-2px);
    box-shadow: 0 12px 18px -14px #e5515b;
  }

  .logout-btn:hover i {
    color: #e5515b;
    transform: translateX(3px);
  }

  /* ----- MAIN CONTENT AREA (right) ----- */
  .main-content {
    flex: 1;
    padding: 2rem 2.5rem;
    background: white;
    display: flex;
    flex-direction: column;
  }

  /* header inside main content */
  .content-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .header-icon {
    width: 3.2rem;
    height: 3.2rem;
    background: linear-gradient(145deg, #4c74ff, #8a52ff);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 18px -10px #4c74ff;
  }

  .header-icon i {
    font-size: 1.8rem;
    color: white;
  }

  h2 {
    font-weight: 700;
    font-size: 2rem;
    letter-spacing: -0.02em;
    color: #1e1e30;
    background: linear-gradient(145deg, #1e1e30, #3a3a60);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .badge {
    background: #f3f6fb;
    border-radius: 40px;
    padding: 0.5rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 0.7rem;
    color: #2c2c4a;
    font-size: 0.95rem;
    font-weight: 500;
    border: 1px solid #e3e3e3;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
  }

  .badge i {
    color: #4c74ff;
  }

  /* content cards / area (represents main panels) */
  .content-panel {
    background: #f9fbfe;   /* very light off-white */
    border-radius: 22px;
    padding: 2rem 1.8rem;
    border: 1px solid #e3e3e3;
    box-shadow: 0 8px 22px -12px rgba(0,0,0,0.08);
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* placeholder for the original nav-grid (now moved inside content panel) 
     but we keep original classes and elements untouched – just repositioned */
  .glass-panel {
    background: transparent;
    padding: 0;
    width: 100%;
  }

  /* the original .nav-grid (horizontal grid) now lives inside main content */
  .nav-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1.2rem;
    margin-bottom: 1rem;
  }

  /* original button style adapted to white background, keep classes exactly */
  .nav-btn {
    background: #f3f6fb;            /* input bg */
    border: 1px solid #e3e3e3;
    border-radius: 18px;
    padding: 1.4rem 0.5rem;
    color: #1e1e2f;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.9rem;
    box-shadow: 0 6px 12px -8px rgba(0,0,0,0.08);
    width: 100%;
    font-family: 'Inter', sans-serif;
  }

  .nav-btn i {
    font-size: 2rem;
    background: linear-gradient(145deg, #4c74ff, #8a52ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    transition: transform 0.15s;
  }

  .nav-btn span {
    font-weight: 600;
    color: #3f3f60;
  }

  .nav-btn:hover {
    background: white;
    border-color: #b5c8ff;
    transform: translateY(-4px);
    box-shadow: 0 20px 24px -16px rgba(76,116,255,0.3), 0 0 0 1px rgba(76,116,255,0.2) inset;
  }

  .nav-btn:hover i {
    transform: scale(1.05);
  }

  /* the original logout-section is hidden now, because we moved logout to sidebar */
  .logout-section {
    display: none;   /* original element hidden, but kept in DOM */
  }

  /* original hr hidden */
  hr {
    display: none;
  }

  /* responsive adjustments */
  @media (max-width: 900px) {
    .dashboard {
      flex-wrap: wrap;
    }
    .sidebar {
      width: 100%;
      border-right: none;
      border-bottom: 1px solid #e3e3e3;
      padding: 1.5rem;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
    }
    .side-nav {
      flex-direction: row;
      flex-wrap: wrap;
      gap: 0.5rem;
      flex: 1;
    }
    .side-nav-btn {
      width: auto;
      padding: 0.8rem 1.2rem;
    }
    .sidebar-logout {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
      width: auto;
    }
    .logout-btn {
      width: auto;
      padding: 0.8rem 1.8rem;
    }
    .brand-text {
      font-size: 1.2rem;
    }
  }

  @media (max-width: 700px) {
    .main-content {
      padding: 1.75rem;
    }
    .nav-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .content-header {
      flex-direction: column;
      align-items: flex-start;
    }
  }

  @media (max-width: 480px) {
    .sidebar {
      flex-direction: column;
      align-items: stretch;
    }
    .side-nav {
      justify-content: center;
    }
    .nav-grid {
      grid-template-columns: 1fr;
    }
    .badge {
      width: 100%;
      justify-content: center;
    }
  }

  /* keep focus style */
  button:focus-visible {
    outline: 3px solid #8a52ff;
    outline-offset: 3px;
  }

  /* scrollbar */
  ::-webkit-scrollbar {
    width: 8px;
  }
  ::-webkit-scrollbar-track {
    background: #f3f6fb;
    border-radius: 12px;
  }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(145deg, #4c74ff, #8a52ff);
    border-radius: 12px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="dashboard">

    <!-- LEFT SIDEBAR (vertical) – contains navigation and logout -->
    <div class="sidebar">
      <div class="sidebar-header">
        
      </div>

      <!-- vertical navigation: all original buttons (same classes, same onclick) -->
      <div class="side-nav">
        <button class="side-nav-btn" onclick="openStudents()">
          <i class="fas fa-user-graduate"></i>
          <span>Students</span>
        </button>
        <button class="side-nav-btn" onclick="openTeachers()">
          <i class="fas fa-chalkboard-user"></i>
          <span>Teachers</span>
        </button>
        <button class="side-nav-btn" onclick="openManage()">
          <i class="fas fa-chalkboard-user"></i>
          <span>Manage Users</span>
        </button>
        <button class="side-nav-btn" onclick="openMaterials()">
          <i class="fas fa-book-open"></i>
          <span>Materials</span>
        </button>
        <button class="side-nav-btn" onclick="openProjects()">
          <i class="fas fa-code-branch"></i>
          <span>Projects</span>
        </button>
        <button class="side-nav-btn" onclick="openQuizzes()">
          <i class="fas fa-puzzle-piece"></i>
          <span>Quizzes</span>
        </button>
        <button class="side-nav-btn" onclick="openStats()">
          <i class="fas fa-chart-line"></i>
          <span>System Stats</span>
        </button>
      </div>

      <!-- logout inside sidebar (replacing original bottom section, but original DOM element kept hidden) -->
      <div class="sidebar-logout">
        <button class="logout-btn" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
          <i class="fas fa-arrow-right" style="font-size: 0.8rem; opacity: 0;"></i>
        </button>
      </div>
    </div>

    <!-- RIGHT MAIN CONTENT AREA (white card) -->
    <div class="main-content">
      <!-- header area (original elements exactly) -->
      <div class="content-header">
        <div class="header-left">
          <div class="header-icon">
            <i class="fas fa-crown"></i>
          </div>
          <h2>⚙️ Admin Dashboard</h2>
        </div>
        <div class="badge">
          
        </div>
      </div>

      <!-- main panel containing the original navigation grid -->
      <div class="content-panel">
        <div class="glass-panel">   <!-- original wrapper, kept for structure -->
          <div class="nav-grid">      <!-- original grid with original buttons -->
            <button class="nav-btn" onclick="openStudents()">
              <i class="fas fa-user-graduate"></i>
              <span>Students</span>
            </button>
            <button class="nav-btn" onclick="openTeachers()">
              <i class="fas fa-chalkboard-user"></i>
              <span>Teachers</span>
            </button>
            <button class="nav-btn" onclick="openManage()">
              <i class="fas fa-chalkboard-user"></i>
              <span>Manage Users</span>
            </button>
            <button class="nav-btn" onclick="openMaterials()">
              <i class="fas fa-book-open"></i>
              <span>Materials</span>
            </button>
            <button class="nav-btn" onclick="openProjects()">
              <i class="fas fa-code-branch"></i>
              <span>Projects</span>
            </button>
            <button class="nav-btn" onclick="openQuizzes()">
              <i class="fas fa-puzzle-piece"></i>
              <span>Quizzes</span>
            </button>
            <button class="nav-btn" onclick="openStats()">
              <i class="fas fa-chart-line"></i>
              <span>System Stats</span>
            </button>
          </div>
        </div>

        <!-- Optional: additional "cards" feel using extra spacing (no content added) -->
        <div style="height: 1rem;"></div>
        <!-- the original logout-section is hidden via CSS, but we keep it in DOM -->
      </div>
    </div>
  </div>
</div>

<!-- ORIGINAL HIDDEN ELEMENTS (kept exactly) -->
<div class="logout-section" style="display: none;">
  <button class="logout-btn" onclick="logout()">
    <i class="fas fa-sign-out-alt"></i>
    <span>Logout</span>
    <i class="fas fa-arrow-right" style="font-size: 0.8rem; opacity: 0;"></i>
  </button>
</div>
<hr style="display: none;">

<script src="../js/auth.js"></script>
<script>
checkAuth()

function openStudents(){
window.location.href="students.html"
}

function openTeachers(){
window.location.href="teachers.html"
}

function openMaterials(){
window.location.href="materials.html"
}

function openManage(){
window.location.href="user-management.html"
}

function openProjects(){
window.location.href="projects.html"
}

function openQuizzes(){
window.location.href="quizzes.html"
}

function openStats(){
window.location.href="stats.html"
}

function logout() {
  localStorage.clear();
  window.location.href = "../login.html";
}
</script>

</body>
</html>

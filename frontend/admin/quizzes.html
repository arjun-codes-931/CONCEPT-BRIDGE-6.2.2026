<!DOCTYPE html>
<html>
<head>
<title>Quiz Management | Nexus Admin</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  background: radial-gradient(ellipse at top right, #1e1a4a, #0a0a1a);
  background-attachment: fixed;
  padding: 2rem;
  position: relative;
  display: flex;
  justify-content: center;
}

body::before {
  content: '';
  position: absolute;
  top: -20%;
  left: -10%;
  width: 70%;
  height: 70%;
  background: radial-gradient(circle, rgba(0, 150, 255, 0.2) 0%, transparent 70%);
  border-radius: 50%;
  filter: blur(100px);
  z-index: 0;
}

body::after {
  content: '';
  position: absolute;
  bottom: -10%;
  right: -5%;
  width: 60%;
  height: 60%;
  background: radial-gradient(circle, rgba(150, 0, 255, 0.2) 0%, transparent 70%);
  border-radius: 50%;
  filter: blur(120px);
  z-index: 0;
}

.container {
  width: 100%;
  max-width: 1000px;
  margin: 0 auto;
  position: relative;
  z-index: 10;
}

.dashboard {
  background: rgba(18, 22, 40, 0.7);
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  border-radius: 2rem;
  padding: 2rem;
  box-shadow: 
    0 30px 60px -15px rgba(0, 0, 0, 0.6),
    0 0 0 1px rgba(255, 255, 255, 0.05) inset,
    0 0 40px 0 rgba(88, 28, 255, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2rem;
  flex-wrap: wrap;
  gap: 1rem;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.header-icon {
  width: 3rem;
  height: 3rem;
  background: linear-gradient(135deg, #3b48e0, #8a2be2);
  border-radius: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 16px -4px rgba(59, 72, 224, 0.5);
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.header-icon i {
  font-size: 1.5rem;
  color: white;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
}

h2 {
  color: white;
  font-weight: 600;
  font-size: 1.8rem;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #ffffff, #d4d0ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-actions {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
}

.btn {
  padding: 0.75rem 1.5rem;
  border-radius: 2rem;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  border: 1px solid rgba(255, 255, 255, 0.1);
  font-family: 'Inter', sans-serif;
  background: rgba(255, 255, 255, 0.03);
  color: white;
  backdrop-filter: blur(4px);
}

.btn i {
  font-size: 0.9rem;
  transition: transform 0.2s ease;
}

.btn-primary {
  background: linear-gradient(135deg, #3b48e0, #8a2be2);
  border: none;
  box-shadow: 0 8px 16px -8px rgba(88, 28, 255, 0.6);
  color: white;
  font-weight: 600;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 24px -8px rgba(88, 28, 255, 0.8);
  background: linear-gradient(135deg, #4f5cf0, #9b3cf2);
}

.btn-primary:hover i {
  transform: rotate(180deg);
}

.btn-outline {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.btn-outline:hover {
  background: rgba(255, 255, 255, 0.1);
  border-color: rgba(255, 255, 255, 0.2);
  transform: translateX(-4px);
}

.btn-outline:hover i {
  transform: translateX(-4px);
}

.section-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin: 2rem 0 1.5rem;
}

.section-header i {
  font-size: 1.5rem;
  color: #7b5eff;
  background: rgba(123, 94, 255, 0.1);
  padding: 0.5rem;
  border-radius: 0.8rem;
}

h3 {
  color: white;
  font-weight: 600;
  font-size: 1.4rem;
  letter-spacing: -0.01em;
  background: linear-gradient(135deg, #ffffff, #c0b8ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.quiz-grid {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.quiz-card {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 1.5rem;
  padding: 1.5rem;
  transition: all 0.25s ease;
  backdrop-filter: blur(4px);
  box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.3);
}

.quiz-card:hover {
  background: rgba(255, 255, 255, 0.05);
  border-color: rgba(255, 255, 255, 0.1);
  transform: translateY(-2px);
  box-shadow: 
    0 20px 30px -12px rgba(88, 28, 255, 0.4),
    0 0 0 1px rgba(255, 255, 255, 0.1) inset;
}

.quiz-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 1rem;
  flex-wrap: wrap;
  gap: 1rem;
}

.quiz-title-section {
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}

.quiz-icon {
  width: 2.5rem;
  height: 2.5rem;
  background: linear-gradient(135deg, #3b48e0, #8a2be2);
  border-radius: 0.8rem;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 12px -4px rgba(59, 72, 224, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.quiz-icon i {
  font-size: 1.2rem;
  color: white;
}

.quiz-title {
  font-weight: 600;
  font-size: 1.2rem;
  color: white;
  letter-spacing: -0.01em;
}

.quiz-badge {
  background: rgba(123, 94, 255, 0.2);
  border: 1px solid rgba(123, 94, 255, 0.3);
  border-radius: 2rem;
  padding: 0.25rem 1rem;
  font-size: 0.8rem;
  color: #b4a6ff;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
}

.quiz-details-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 1rem;
  margin: 1rem 0;
}

.detail-item {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  color: rgba(255, 255, 255, 0.8);
  font-size: 0.95rem;
}

.detail-item i {
  width: 1.5rem;
  color: #7b5eff;
  font-size: 0.9rem;
}

.detail-item strong {
  color: white;
  font-weight: 600;
  margin-right: 0.3rem;
}

.quiz-actions {
  display: flex;
  justify-content: flex-end;
  margin-top: 1rem;
}

.btn-delete {
  background: rgba(255, 70, 85, 0.1);
  border: 1px solid rgba(255, 70, 85, 0.3);
  border-radius: 2rem;
  padding: 0.6rem 1.5rem;
  color: #ff8a9f;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-family: 'Inter', sans-serif;
}

.btn-delete i {
  font-size: 0.9rem;
}

.btn-delete:hover {
  background: rgba(255, 70, 85, 0.2);
  border-color: rgba(255, 70, 85, 0.5);
  color: #ffb0c0;
  transform: translateY(-2px);
  box-shadow: 0 8px 16px -8px rgba(255, 70, 85, 0.4);
}

.btn-delete:hover i {
  animation: shake 0.3s ease;
}

@keyframes shake {
  0%, 100% { transform: rotate(0); }
  25% { transform: rotate(10deg); }
  75% { transform: rotate(-10deg); }
}

.empty-state {
  background: rgba(255, 255, 255, 0.02);
  border: 1px dashed rgba(255, 255, 255, 0.1);
  border-radius: 1.5rem;
  padding: 3rem 2rem;
  text-align: center;
  color: rgba(255, 255, 255, 0.5);
  backdrop-filter: blur(4px);
}

.empty-state i {
  font-size: 3rem;
  margin-bottom: 1rem;
  color: rgba(123, 94, 255, 0.3);
}

.empty-state p {
  font-size: 1.1rem;
}

.loading-state {
  background: rgba(255, 255, 255, 0.02);
  border-radius: 1.5rem;
  padding: 3rem;
  text-align: center;
  color: rgba(255, 255, 255, 0.5);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
}

.loading-state i {
  animation: spin 1s linear infinite;
  color: #7b5eff;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

hr {
  display: none;
}

/* Responsive */
@media (max-width: 768px) {
  body {
    padding: 1rem;
  }
  
  .dashboard {
    padding: 1.5rem;
  }
  
  h2 {
    font-size: 1.5rem;
  }
  
  .header {
    flex-direction: column;
    align-items: flex-start;
  }
  
  .header-actions {
    width: 100%;
  }
  
  .btn {
    flex: 1;
    justify-content: center;
  }
  
  .quiz-details-grid {
    grid-template-columns: 1fr;
    gap: 0.75rem;
  }
}

@media (max-width: 480px) {
  .quiz-header {
    flex-direction: column;
  }
  
  .quiz-actions {
    justify-content: stretch;
  }
  
  .btn-delete {
    width: 100%;
    justify-content: center;
  }
}

/* Focus styles */
button:focus-visible {
  outline: 2px solid #8a2be2;
  outline-offset: 2px;
}

/* Custom scrollbar */
::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: rgba(255, 255, 255, 0.05);
  border-radius: 10px;
}

::-webkit-scrollbar-thumb {
  background: linear-gradient(135deg, #3b48e0, #8a2be2);
  border-radius: 10px;
}
</style>
</head>
<body>
<div class="container">
  <div class="dashboard">
    <div class="header">
      <div class="header-left">
        <div class="header-icon">
          <i class="fas fa-puzzle-piece"></i>
        </div>
        <h2>Quiz Management</h2>
      </div>
      <div class="header-actions">
        <button class="btn btn-outline" onclick="goDashboard()">
          <i class="fas fa-arrow-left"></i>
          <span>Dashboard</span>
        </button>
        <button class="btn btn-primary" onclick="loadQuizzes()">
          <i class="fas fa-sync-alt"></i>
          <span>Refresh</span>
        </button>
      </div>
    </div>

    <div class="section-header">
      <i class="fas fa-layer-group"></i>
      <h3>All Quizzes</h3>
    </div>
    
    <div id="quizList" class="quiz-grid">Loading quizzes...</div>
  </div>
</div>

<hr style="display: none;">
<div id="questionArea" style="display: none;"></div>

<script>
const API = "http://localhost:8080";
const token = localStorage.getItem("token");

if(!token){
    alert("Login required");
    window.location.href = "../login.html";
}

// =======================
// LOAD ALL QUIZZES
// =======================
function loadQuizzes(){
  const quizListDiv = document.getElementById("quizList");
  quizListDiv.innerHTML = '<div class="loading-state"><i class="fas fa-spinner"></i> Loading quizzes...</div>';

  fetch(`${API}/admin/quizzes`,{
    headers:{ Authorization:"Bearer "+token }
  })
  .then(res=>res.json())
  .then(data=>{
    displayQuizzes(data);
  })
  .catch(err=>{
    document.getElementById("quizList").innerHTML='<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading quizzes</p></div>';
  });
}

// =======================
// DISPLAY QUIZZES
// =======================
function displayQuizzes(quizzes){
  const div=document.getElementById("quizList");
  div.innerHTML="";
  div.className = "quiz-grid";

  if(!quizzes || quizzes.length===0){
    div.innerHTML='<div class="empty-state"><i class="fas fa-clipboard-list"></i><p>No quizzes found</p></div>';
    return;
  }

  quizzes.forEach(q=>{
    const box=document.createElement("div");
    box.className = "quiz-card";
    
    const sectionDisplay = q.section && q.section !== "All" ? q.section : "All Sections";
    
    box.innerHTML=`
      <div class="quiz-header">
        <div class="quiz-title-section">
          <div class="quiz-icon">
            <i class="fas fa-question"></i>
          </div>
          <span class="quiz-title">${q.title}</span>
          <span class="quiz-badge">
            <i class="fas fa-clock"></i>
            ${q.durationMinutes} min
          </span>
        </div>
      </div>
      
      <div class="quiz-details-grid">
        <div class="detail-item">
          <i class="fas fa-book"></i>
          <span><strong>Subject:</strong> ${q.subject}</span>
        </div>
        <div class="detail-item">
          <i class="fas fa-code-branch"></i>
          <span><strong>Branch:</strong> ${q.branch}</span>
        </div>
        <div class="detail-item">
          <i class="fas fa-layer-group"></i>
          <span><strong>Semester:</strong> ${q.semester}</span>
        </div>
        <div class="detail-item">
          <i class="fas fa-users"></i>
          <span><strong>Section:</strong> ${sectionDisplay}</span>
        </div>
      </div>
      
      <div class="quiz-actions">
        <button class="btn-delete" onclick="deleteQuiz(${q.id})">
          <i class="fas fa-trash-alt"></i>
          Delete Quiz
        </button>
      </div>
    `;
    
    div.appendChild(box);
  });
}

// =======================
// DELETE QUIZ
// =======================
function deleteQuiz(id){
  if(!confirm("Delete this quiz?")) return;

  fetch(`${API}/admin/quiz/${id}`,{
    method:"DELETE",
    headers:{ Authorization:"Bearer "+token }
  })
  .then(res=>{
    if(res.ok){
      alert("Quiz deleted");
      loadQuizzes();
    }else{
      alert("Delete failed");
    }
  });
}

// =======================
// BACK
// =======================
function goDashboard(){
  window.location.href="dashboard.html";
}

loadQuizzes();
</script>

</body>
</html>

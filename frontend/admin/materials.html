<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin · Material Management</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts (Inter) for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #5f79ff, #7a5cff, #a16cff);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
            line-height: 1.5;
        }

        /* main container with white card + sidebar layout */
        .admin-container {
            width: 100%;
            max-width: 1500px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 35px 60px -20px rgba(30, 30, 60, 0.4), 0 10px 25px -8px rgba(0,0,0,0.2);
            display: flex;
            overflow: hidden;
            min-height: 750px;
        }

        /* ========== LEFT VERTICAL SIDEBAR ========== */
        .sidebar {
            width: 270px;
            background: #f3f6fb;          /* input background */
            border-right: 1px solid #e3e3e3;
            padding: 2rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 2.2rem;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding-left: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .brand-icon {
            width: 2.8rem;
            height: 2.8rem;
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 14px -6px #4c74ff66;
        }

        .brand-icon i {
            font-size: 1.6rem;
            color: white;
        }

        .brand-text {
            font-weight: 700;
            font-size: 1.4rem;
            background: linear-gradient(145deg, #1e1e3f, #4c74ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        /* vertical navigation menu */
        .side-nav {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            flex: 1;
        }

        .side-nav-btn {
            background: transparent;
            border: 1px solid transparent;
            border-radius: 16px;
            padding: 1rem 1.2rem;
            color: #1e1e3a;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
            width: 100%;
            text-align: left;
            font-family: 'Inter', sans-serif;
        }

        .side-nav-btn i {
            font-size: 1.4rem;
            width: 2rem;
            text-align: center;
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: transform 0.15s;
        }

        .side-nav-btn span {
            font-weight: 600;
            color: #3f3f60;
        }

        /* hover & active (gradient highlight) */
        .side-nav-btn:hover {
            background: white;
            border-color: #e3e3e3;
            box-shadow: 0 8px 18px -12px #4c74ff, 0 0 0 1px rgba(76,116,255,0.2) inset;
            transform: translateX(4px);
        }

        .side-nav-btn:hover i {
            transform: scale(1.05);
        }

        /* highlight for current section (active item) — purely visual, no JS */
        .side-nav-btn.active {
            background: white;
            border-color: #d0ddff;
            box-shadow: 0 6px 14px -10px #4c74ff, 0 0 0 2px rgba(76,116,255,0.15) inset;
        }
        .side-nav-btn.active i {
            background: linear-gradient(145deg, #4c74ff, #a16cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 1.5rem;
            border-top: 1px solid #e3e3e3;
        }

        .logout-btn {
            background: #f3f6fb;
            border: 1px solid #e3e3e3;
            border-radius: 40px;
            padding: 0.9rem 1.2rem;
            color: #4c516d;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }

        .logout-btn i {
            font-size: 1.2rem;
            color: #777;    /* secondary text */
        }

        .logout-btn span {
            color: #4c516d;
        }

        .logout-btn:hover {
            background: white;
            border-color: #ffb7b7;
            transform: translateY(-2px);
            box-shadow: 0 12px 18px -14px #e5515b;
        }
        .logout-btn:hover i {
            color: #e5515b;
            transform: translateX(3px);
        }

        /* ========== MAIN CONTENT AREA (right) ========== */
        .main-content {
            flex: 1;
            padding: 2rem 2.5rem;
            background: white;
            display: flex;
            flex-direction: column;
        }

        /* header inside main content */
        .page-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .title-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .title-section i {
            font-size: 2.5rem;
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 {
            font-weight: 700;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            color: #1e1e30;
            background: linear-gradient(145deg, #1e1e30, #3a3a60);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        /* gradient buttons (primary gradient) */
        .btn-primary {
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            border: none;
            border-radius: 40px;
            padding: 0.75rem 1.8rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 18px -8px #4c74ff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-primary i {
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(145deg, #5f7eff, #9a62ff);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -12px #4c74ff;
        }

        .btn-secondary {
            background: #f3f6fb;            /* input background */
            border: 1px solid #e3e3e3;
            border-radius: 40px;
            padding: 0.75rem 1.8rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: #3f3f60;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            background: white;
            border-color: #b5c8ff;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -10px #4c74ff;
        }

        /* search card (white card with soft bg) */
        .search-card {
            background: #f9fbfe;            /* near white */
            border: 1px solid #e3e3e3;
            border-radius: 22px;
            padding: 1.8rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 22px -12px rgba(0,0,0,0.08);
            transition: border 0.2s;
        }

        .search-card:hover {
            border-color: #b5c8ff;
        }

        .search-header {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 1.5rem;
        }

        .search-header i {
            font-size: 1.6rem;
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .search-header span {
            font-weight: 600;
            font-size: 1.1rem;
            color: #2c2c4a;
        }

        .search-grid {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 1.2rem;
        }

        .search-field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            min-width: 170px;
        }

        .search-field label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #777;                /* secondary text */
            letter-spacing: 0.2px;
        }

        .search-field input {
            background: #f3f6fb;          /* input bg */
            border: 1px solid #e3e3e3;
            border-radius: 30px;
            padding: 0.7rem 1.2rem;
            font-size: 0.95rem;
            color: #1e1e30;
            font-family: 'Inter', sans-serif;
        }

        .search-field input:focus {
            outline: none;
            border-color: #8a52ff;
            box-shadow: 0 0 0 3px rgba(138,82,255,0.15);
        }

        .search-field input::placeholder {
            color: #aaa;
        }

        .search-actions {
            display: flex;
            gap: 0.8rem;
            margin-left: auto;
            align-items: center;
        }

        /* table container (white card) */
        .table-container {
            background: #f9fbfe;
            border: 1px solid #e3e3e3;
            border-radius: 22px;
            padding: 1.5rem;
            box-shadow: 0 8px 22px -12px rgba(0,0,0,0.06);
            overflow-x: auto;
            margin-top: 0.5rem;
        }

        .admin-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            color: #1e1e30;
        }

        .admin-table thead tr {
            background: transparent;
        }

        .admin-table th {
            text-align: left;
            padding: 0.8rem 1.2rem;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #777;               /* secondary text */
            border-bottom: 1px solid #e3e3e3;
        }

        .admin-table td {
            padding: 1.2rem 1.2rem;
            background: white;
            border-radius: 18px;
            transition: all 0.2s;
            box-shadow: 0 4px 10px -6px rgba(0,0,0,0.1), 0 0 0 1px #f0f0f0 inset;
        }

        .admin-table tbody tr:hover td {
            background: #f3f6fb;
            transform: scale(1.01);
            box-shadow: 0 8px 18px -10px rgba(76,116,255,0.2), 0 0 0 1px #d0ddff inset;
        }

        .badge {
            background: #f3f6fb;
            border-radius: 30px;
            padding: 0.25rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid #e3e3e3;
            display: inline-block;
            color: #2d2d4a;
        }

        .action-cell {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .table-btn {
            background: #f3f6fb;
            border: 1px solid #e3e3e3;
            border-radius: 30px;
            padding: 0.5rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #3f3f60;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            transition: all 0.15s;
        }

        .table-btn i {
            font-size: 0.9rem;
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .table-btn.view:hover {
            background: white;
            border-color: #4c74ff;
        }

        .table-btn.delete:hover {
            background: white;
            border-color: #ff6b6b;
        }
        .table-btn.delete:hover i {
            background: #ff6b6b;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .empty-row td {
            text-align: center;
            padding: 2.5rem;
            color: #777;
            font-style: italic;
        }

        /* loading state */
        .loading-placeholder {
            text-align: center;
            padding: 2.5rem;
            color: #777;
        }

        /* responsive */
        @media (max-width: 950px) {
            .admin-container {
                flex-wrap: wrap;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #e3e3e3;
                flex-direction: row;
                flex-wrap: wrap;
                align-items: center;
                gap: 1rem;
                padding: 1.5rem;
            }
            .side-nav {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            .sidebar-footer {
                margin-top: 0;
                border-top: none;
                padding-top: 0;
                width: auto;
            }
            .logout-btn {
                width: auto;
                padding: 0.8rem 1.8rem;
            }
            .brand-text {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 700px) {
            .main-content {
                padding: 1.75rem;
            }
            .page-header {
                flex-direction: column;
                align-items: start;
            }
            .search-grid {
                flex-direction: column;
                align-items: stretch;
            }
            .search-actions {
                margin-left: 0;
                justify-content: flex-start;
            }
            .admin-table th, .admin-table td {
                padding: 0.8rem;
            }
        }
        @media (max-width: 480px) {
            .side-nav {
                justify-content: center;
            }
            .sidebar-brand {
                width: 100%;
            }
        }

        /* active page indicator (manually set on "Materials" to highlight) */
        .side-nav-btn:nth-child(3) {
            background: white;
            border-color: #d0ddff;
            box-shadow: 0 0 0 2px rgba(76,116,255,0.15) inset;
        }
        /* preserve focus style */
        button:focus-visible {
            outline: 3px solid #8a52ff;
            outline-offset: 3px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- LEFT SIDEBAR (vertical) with icons + labels -->
        <div class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <span class="brand-text">Nexus</span>
            </div>

            <!-- vertical navigation (same buttons as originally, but placed in sidebar) -->
            <div class="side-nav">
                <button class="side-nav-btn" onclick="goDashboard()">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </button>
                <button class="side-nav-btn" onclick="window.location.href='students.html'">
                    <i class="fas fa-user-graduate"></i>
                    <span>Students</span>
                </button>
                <button class="side-nav-btn active" onclick="window.location.href='materials.html'">
                    <i class="fas fa-folder-open"></i>
                    <span>Materials</span>
                </button>
                <button class="side-nav-btn" onclick="window.location.href='teachers.html'">
                    <i class="fas fa-chalkboard-user"></i>
                    <span>Teachers</span>
                </button>
                <button class="side-nav-btn" onclick="window.location.href='user-management.html'">
                    <i class="fas fa-users-cog"></i>
                    <span>Manage Users</span>
                </button>
                <button class="side-nav-btn" onclick="window.location.href='projects.html'">
                    <i class="fas fa-code-branch"></i>
                    <span>Projects</span>
                </button>
                <button class="side-nav-btn" onclick="window.location.href='quizzes.html'">
                    <i class="fas fa-puzzle-piece"></i>
                    <span>Quizzes</span>
                </button>
                <button class="side-nav-btn" onclick="window.location.href='stats.html'">
                    <i class="fas fa-chart-line"></i>
                    <span>System Stats</span>
                </button>
            </div>

            <!-- logout inside sidebar -->
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                    <i class="fas fa-arrow-right" style="font-size: 0.8rem; opacity: 0;"></i>
                </button>
            </div>
        </div>

        <!-- MAIN CONTENT (right area) -->
        <div class="main-content">
            <!-- Header with minimal design -->
            <div class="page-header">
                <div class="title-section">
                    <i class="fas fa-folder-open"></i>
                    <h1>Material Management</h1>
                </div>
                <div class="header-actions">
                    <button class="btn-primary" onclick="goDashboard()"><i class="fas fa-home"></i> Dashboard</button>
                    <button class="btn-secondary" onclick="loadMaterials()"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>
            </div>

            <!-- Search / Filter Card (exactly same elements) -->
            <div class="search-card">
                <div class="search-header">
                    <i class="fas fa-filter"></i>
                    <span>FILTER MATERIALS</span>
                </div>
                <div class="search-grid">
                    <div class="search-field">
                        <label>Search Title</label>
                        <input type="text" id="searchTitle" placeholder="e.g., Algorithms">
                    </div>
                    <div class="search-field">
                        <label>Subject</label>
                        <input type="text" id="searchSubject" placeholder="e.g., Mathematics">
                    </div>
                    <div class="search-field">
                        <label>Branch</label>
                        <input type="text" id="searchBranch" placeholder="e.g., CSE">
                    </div>
                    <div class="search-actions">
                        <button class="btn-primary searchBtn" onclick="searchMaterials()"><i class="fas fa-search"></i> Search</button>
                        <button class="btn-secondary" onclick="clearSearch()"><i class="fas fa-undo-alt"></i> Clear</button>
                    </div>
                </div>
            </div>

            <!-- Materials Table Section -->
            <div style="margin-top: 0.5rem;">
                <div style="display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.2rem;">
                    <i class="fas fa-table" style="font-size: 1.8rem; background: linear-gradient(145deg,#4c74ff,#8a52ff); -webkit-background-clip:text; background-clip:text; color:transparent;"></i>
                    <h2 style="font-weight: 700; font-size: 1.7rem; color:#1e1e30;">All Materials</h2>
                </div>
                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Subject</th>
                                <th>Branch</th>
                                <th>Semester</th>
                                <th>Uploaded</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="materialsTable">
                            <tr class="empty-row">
                                <td colspan="8">
                                    <i class="fas fa-spinner fa-pulse"></i> Loading materials...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ORIGINAL JAVASCRIPT – UNMODIFIED (preserved exactly) -->
    <script>
        const API = "http://localhost:8080";
        const token = localStorage.getItem("token");

        function goDashboard(){
            window.location.href="dashboard.html";
        }

        window.onload = () => {
            if(!token){
                alert("Login required");
                window.location.href="../login.html";
                return;
            }
            loadMaterials();
        };

        async function loadMaterials(){
            try{
                const res = await fetch(`${API}/admin/materials`,{
                    headers:{
                        "Authorization":"Bearer "+token
                    }
                });
                if(!res.ok){
                    throw new Error("Failed to load materials");
                }
                const materials = await res.json();
                displayMaterials(materials);
            }catch(err){
                document.getElementById("materialsTable").innerHTML =
                    `<tr><td colspan="8" style="color:red; text-align:center;">Error loading materials</td></tr>`;
            }
        }

        function displayMaterials(materials){
            const table = document.getElementById("materialsTable");
            table.innerHTML="";
            if(!materials || materials.length===0){
                table.innerHTML=`<tr><td colspan="8" style="text-align:center;">No materials found</td></tr>`;
                return;
            }
            materials.forEach(m=>{
                const date = m.createdAt
                    ? new Date(m.createdAt).toLocaleDateString()
                    : "-";
                table.innerHTML += `
                    <tr>
                        <td><span class="badge">${m.id}</span></td>
                        <td><span style="font-weight:500;">${m.title}</span></td>
                        <td>${m.subject || "-"}</td>
                        <td>${m.branch || "-"}</td>
                        <td>${m.semester || "-"}</td>
                        <td>${date}</td>
                        <td class="action-cell">
                            <button class="table-btn view" onclick="viewPDF(${m.id})"><i class="fas fa-eye"></i> View</button>
                            <button class="table-btn delete" onclick="deletePDF(${m.id})"><i class="fas fa-trash-alt"></i> Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        function searchMaterials(){
            const title = document.getElementById("searchTitle").value.toLowerCase();
            const subject = document.getElementById("searchSubject").value.toLowerCase();
            const branch = document.getElementById("searchBranch").value.toLowerCase();
            const rows = document.querySelectorAll("#materialsTable tr");
            rows.forEach(row=>{
                const text = row.innerText.toLowerCase();
                if(text.includes(title) && text.includes(subject) && text.includes(branch)){
                    row.style.display="";
                }else{
                    row.style.display="none";
                }
            });
        }

        function clearSearch(){
            document.getElementById("searchTitle").value="";
            document.getElementById("searchSubject").value="";
            document.getElementById("searchBranch").value="";
            loadMaterials();
        }

        function viewPDF(id){
            window.open(`../student/pdf-viewer.html?id=${id}&from=admin`);
        }

        async function deletePDF(id){
            if(!confirm("Delete this material?")) return;
            try{
                const res = await fetch(`${API}/admin/material/${id}`,{
                    method:"DELETE",
                    headers:{
                        "Authorization":"Bearer "+token
                    }
                });
                if(!res.ok){
                    throw new Error("Delete failed");
                }
                alert("Material deleted");
                loadMaterials();
            }catch(err){
                alert("Error deleting material");
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = "../login.html";
        }
    </script>
</body>
</html>

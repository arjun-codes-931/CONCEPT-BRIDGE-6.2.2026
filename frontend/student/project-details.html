<!DOCTYPE html>
<html lang="en">
<head>
    <title>Project Details</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Font: Inter (modern academic) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (icons for premium look, no functionality) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #5f79ff 0%, #7a5cff 55%, #a16cff 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 1.5rem;
            display: flex;
            gap: 1.5rem;
            color: #1e1e2f;
            line-height: 1.5;
        }

        /* ---------- LEFT SIDE MENU (vertical sidebar) ---------- */
        .sidebar {
            flex: 0 0 280px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2), 0 0 0 1px #e3e3e3 inset;
            border: 1px solid #e3e3e3;
            padding: 2rem 1rem 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            height: fit-content;
            max-height: calc(100vh - 3rem);
            position: sticky;
            top: 1.5rem;
        }

        .sidebar-header {
            padding: 0 0.8rem 1.2rem 0.8rem;
            border-bottom: 1px solid #e3e3e3;
            margin-bottom: 0.5rem;
        }

        .sidebar-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sidebar-header p {
            color: #777;
            font-size: 0.85rem;
            margin-top: 0.3rem;
            font-weight: 500;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 1rem;
            border-radius: 16px;
            color: #777;
            font-weight: 500;
            transition: all 0.2s ease;
            background: transparent;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            border: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
        }

        .nav-item i {
            width: 1.8rem;
            font-size: 1.2rem;
            color: #777;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #4c74ff10, #8a52ff10);
            border-left: 4px solid #4c74ff;
            border-radius: 16px 12px 12px 16px;
            background: #f0f4ff;
            font-weight: 600;
            color: #1e293b;
        }

        .nav-item.active i {
            color: #4c74ff;
        }

        .nav-item:hover {
            background: #f3f6fb;
            border-color: #e3e3e3;
            color: #1e293b;
            transform: translateX(4px);
        }

        .nav-item:hover i {
            color: #4c74ff;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 1.5rem;
            border-top: 1px solid #e3e3e3;
            color: #777;
            font-size: 0.75rem;
            display: flex;
            gap: 1rem;
        }

        /* ---------- MAIN CONTENT AREA ---------- */
        .main-content {
            flex: 1;
            background: white;
            border-radius: 28px;
            box-shadow: 0 30px 60px -15px rgba(58, 48, 94, 0.3), 0 0 0 1px #e3e3e3 inset;
            border: 1px solid #e3e3e3;
            padding: 2rem 2rem;
            overflow-y: auto;
            max-height: calc(100vh - 3rem);
        }

        /* TOP AREA – minimal header */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #e3e3e3;
        }

        .top-header h3 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0;
        }

        .header-actions {
            display: flex;
            gap: 0.8rem;
        }

        /* Buttons – gradient primary / secondary */
        button {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 10px -6px rgba(0,0,0,0.1);
            border: 1px solid transparent;
        }

        button[onclick="window.history.back()"],
        button[onclick="location.reload()"] {
            background: white;
            color: #777;
            border: 1px solid #e3e3e3;
        }
        button[onclick="window.history.back()"]:hover,
        button[onclick="location.reload()"]:hover {
            background: #f3f6fb;
            color: #4c74ff;
            transform: translateY(-2px);
        }

        #editProjectBtn {
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            color: white;
            border: none;
            box-shadow: 0 8px 16px -8px #4c74ff;
        }
        #editProjectBtn:hover {
            background: linear-gradient(135deg, #5f83ff, #9b66ff);
            transform: translateY(-2px);
            box-shadow: 0 14px 22px -10px #4c74ff;
        }

        /* debug info */
        #debugInfo {
            background: #f3f6fb;
            border: 1px solid #e3e3e3;
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            font-family: monospace;
            color: #4a4a6a;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        /* Project details card */
        .project-card {
            background: white;
            border: 1px solid #e3e3e3;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 15px 30px -12px rgba(0,0,0,0.1);
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e3e3e3;
            padding-bottom: 1.2rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .project-title {
            font-size: 2rem;
            font-weight: 700;
            color: #1e1e2f;
            margin: 0;
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            background: #f3f6fb;
            color: #4a4a6a;
            border: 1px solid #e3e3e3;
        }

        .status-badge.primary {
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            color: white;
            border: none;
        }

        .description-text {
            font-size: 1.1rem;
            color: #4a4a6a;
            margin: 1.5rem 0;
            line-height: 1.7;
        }

        .progress-section {
            background: #f3f6fb;
            border-radius: 18px;
            padding: 1.5rem;
            margin: 1.8rem 0;
            border: 1px solid #e3e3e3;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1e1e2f;
        }

        .progress-bar-bg {
            background: #e0e7f0;
            height: 12px;
            border-radius: 40px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            height: 12px;
            border-radius: 40px;
            width: 0%;
        }

        .tech-stack-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 1.2rem 0 1.8rem 0;
        }

        .tech-tag {
            background: #f3f6fb;
            border: 1px solid #e3e3e3;
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #1e1e2f;
        }

        .tech-tag .tech-type {
            background: white;
            border-radius: 30px;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #4c74ff;
            border: 1px solid #e3e3e3;
        }

        .links-section {
            background: #f9faff;
            border-radius: 18px;
            padding: 1.5rem;
            margin: 1.8rem 0;
            border: 1px solid #e3e3e3;
        }

        .links-section h3 {
            color: #1e1e2f;
            margin-bottom: 1rem;
        }

        .links-section a {
            color: #4c74ff;
            text-decoration: none;
            font-weight: 500;
        }
        .links-section a:hover {
            text-decoration: underline;
        }

        .metadata-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            background: #f3f6fb;
            border-radius: 18px;
            padding: 1.5rem;
            border: 1px solid #e3e3e3;
            margin: 1.8rem 0;
        }

        .metadata-item {
            display: flex;
            flex-direction: column;
        }
        .metadata-item .label {
            color: #777;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        .metadata-item .value {
            font-weight: 600;
            margin-top: 0.2rem;
            color: #1e1e2f;
        }

        details {
            background: #f3f6fb;
            border-radius: 18px;
            padding: 1.2rem;
            border: 1px solid #e3e3e3;
            margin-top: 2rem;
        }

        details summary {
            font-weight: 600;
            color: #4c74ff;
            cursor: pointer;
        }

        pre {
            background: white;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid #e3e3e3;
            overflow-x: auto;
            font-size: 0.8rem;
            margin-top: 1rem;
            color: #1e1e2f;
        }

        /* error / loading */
        .error-box {
            background: #fff5f5;
            border: 1px solid #ffc9c9;
            border-radius: 18px;
            padding: 1.5rem;
            color: #b91c1c;
            font-weight: 500;
            margin: 1rem 0;
        }

        .loading {
            color: #777;
            font-style: italic;
            padding: 2rem;
            text-align: center;
        }

        #projectDetailsContainer {
            margin-top: 1.5rem;
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f3f6fb;
            border-radius: 20px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 20px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* responsive */
        @media (max-width: 900px) {
            body {
                flex-direction: column;
                padding: 1rem;
            }
            .sidebar {
                flex: auto;
                position: static;
                max-height: none;
                width: 100%;
            }
            .main-content {
                max-height: none;
            }
        }
    </style>
</head>
<body>
    <!-- LEFT SIDE MENU (vertical sidebar) – now with working navigation -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-graduation-cap"></i> Concept Bridge</h2>
            <p>academic dashboard</p>
        </div>
        <div class="nav-menu">
            <!-- All menu items now have onclick handlers to redirect -->
            <div class="nav-item" onclick="window.location.href='assignment-list.html'">
                <i class="fas fa-tasks"></i> Assignments
            </div>
            <div class="nav-item" onclick="window.location.href='quiz.html'">
                <i class="fas fa-puzzle-piece"></i> Quizzes
            </div>
            <div class="nav-item active" onclick="window.location.href='project-list.html'">
                <i class="fas fa-code"></i> Projects
            </div>
            <div class="nav-item" onclick="window.location.href='pdf-list.html'">
                <i class="fas fa-file-pdf"></i> PDFs
            </div>
            <div class="nav-item" onclick="window.location.href='student-profile.html'">
                <i class="fas fa-user-circle"></i> Profile
            </div>
        </div>
        
    </div>

    <!-- MAIN CONTENT AREA -->
    <main class="main-content">
        <!-- TOP AREA minimal header -->
        <div class="top-header">
            <h3><i class="fas fa-code-branch"></i> PROJECT DETAILS</h3>
            <div class="header-actions">
                <!-- original buttons (kept exactly) -->
                <button onclick="window.history.back()"><i class="fas fa-arrow-left"></i> BACK</button>
                <button id="editProjectBtn" style="display:none;" onclick="handleEdit()"><i class="fas fa-pen"></i> EDIT</button>
                <button onclick="location.reload()"><i class="fas fa-sync-alt"></i> REFRESH</button>
            </div>
        </div>

        <!-- debug info (original) -->
        <div id="debugInfo" style="font-family:monospace; background:#f0f0f0; padding:10px;"></div>

        <!-- Project details container – original ID, will be filled by JS -->
        <div id="projectDetailsContainer">
            <p>⏳ Loading project details...</p>
        </div>
    </main>

    <!-- JavaScript – EXACT original, untouched -->
    <script>
        // ==================== CONFIG ====================
        console.log('🚀 Project Details Loading...');
        const API = "http://localhost:8080";
        
        // Get project ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id') || localStorage.getItem("currentProjectId");
        
        console.log('📌 Project ID:', projectId);
        
        function getToken() {
            const token = localStorage.getItem("token");
            console.log('🔑 Token exists:', !!token);
            return token;
        }

        // ==================== LOAD PROJECT ====================
        async function loadProject() {
            const debugEl = document.getElementById('debugInfo');
            const container = document.getElementById('projectDetailsContainer');
            
            if (!projectId) {
                container.innerHTML = '<p style="color:red;">❌ ERROR: No project ID specified</p>';
                return;
            }
            
            try {
                const token = getToken();
                if (!token) throw new Error('No authentication token');
                
                debugEl.innerHTML = `Project ID: ${projectId}<br>⏳ Fetching project...`;
                
                // FETCH PROJECT - THIS NOW RETURNS ProjectResponse WITH techStack
                console.log('📥 Fetching from:', `${API}/student/project/${projectId}`);
                const response = await fetch(`${API}/student/project/${projectId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${await response.text()}`);
                }
                
                const data = await response.json();
                console.log('✅ FULL RESPONSE:', data);
                
                // Check what we got
                console.log('📊 Response contains:', {
                    id: data.id,
                    title: data.title,
                    hasTechStack: Array.isArray(data.techStack),
                    techStackCount: data.techStack?.length || 0
                });
                
                debugEl.innerHTML = `✅ Loaded: ${data.title || 'Unnamed'}<br>Tech stack: ${data.techStack?.length || 0} items`;
                
                // ==================== DISPLAY ====================
                let techHtml = '';
                
                if (data.techStack && data.techStack.length > 0) {
                    console.log('🔧 Building tech stack display with', data.techStack.length, 'items');
                    
                    techHtml = '<div style="margin:20px 0;"><h3 style="font-size:1.3rem; margin-bottom:1rem;">🛠️ Tech Stack</h3>';
                    techHtml += '<div class="tech-stack-grid">';
                    
                    data.techStack.forEach((tech, index) => {
                        console.log(`  Tech ${index+1}:`, tech);
                        techHtml += `
                            <div class="tech-tag">
                                ${tech.technology} 
                                <span class="tech-type">${tech.type}</span>
                            </div>
                        `;
                    });
                    
                    techHtml += '</div></div>';
                } else {
                    console.log('⚠️ No tech stack in response');
                    techHtml = `
                        <div style="margin:20px 0; padding:20px; background:#f3f6fb; border-radius:18px; border:1px solid #e3e3e3;">
                            <h3 style="color:#777; margin-top:0;">📭 No technologies added</h3>
                            <p style="color:#777;">The project has no technologies added yet.</p>
                        </div>
                    `;
                }
                
                // Format dates
                const startDate = data.startDate ? new Date(data.startDate).toLocaleDateString() : 'Not set';
                const expectedDate = data.expectedEndDate ? new Date(data.expectedEndDate).toLocaleDateString() : 'Not set';
                
                // Status color mapping (for JS use, but we rely on classes)
                const statusColor = {
                    'IDEA': '#888',
                    'IN_PROGRESS': '#36f',
                    'PAUSED': '#f90',
                    'COMPLETED': '#2c7'
                }[data.currentStatus] || '#888';
                
                // Main HTML – we keep the same data but wrap in our card structure
                container.innerHTML = `
                    <div class="project-card">
                        <!-- HEADER -->
                        <div class="project-header">
                            <h2 class="project-title">${data.title || 'Untitled'}</h2>
                            <div>
                                <span class="status-badge primary" style="background:${statusColor}; border:none; color:white;">${data.currentStatus || 'IDEA'}</span>
                                <span class="status-badge" style="margin-left:0.5rem;">${data.category || 'MINI'}</span>
                            </div>
                        </div>
                        
                        <!-- DESCRIPTION -->
                        <p class="description-text">${data.description || 'No description provided.'}</p>
                        
                        <!-- PROGRESS -->
                        <div class="progress-section">
                            <div class="progress-label">
                                <span>Progress</span>
                                <span>${data.progressPercentage || 0}%</span>
                            </div>
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" style="width:${data.progressPercentage || 0}%;"></div>
                            </div>
                        </div>
                        
                        <!-- TECH STACK -->
                        ${techHtml}
                        
                        <!-- LINKS -->
                        <div class="links-section">
                            <h3 style="margin-top:0;">🔗 Links</h3>
                            <p><strong>GitHub:</strong> ${data.githubRepo ? `<a href="${data.githubRepo}" target="_blank">${data.githubRepo}</a>` : '—'}</p>
                            <p><strong>Live Demo:</strong> ${data.liveDemoUrl ? `<a href="${data.liveDemoUrl}" target="_blank">${data.liveDemoUrl}</a>` : '—'}</p>
                        </div>
                        
                        <!-- METADATA -->
                        <div class="metadata-grid">
                            <div class="metadata-item"><span class="label">Project ID</span><span class="value">${data.id}</span></div>
                            <div class="metadata-item"><span class="label">Student ID</span><span class="value">${data.studentId}</span></div>
                            <div class="metadata-item"><span class="label">Start Date</span><span class="value">${startDate}</span></div>
                            <div class="metadata-item"><span class="label">Target Date</span><span class="value">${expectedDate}</span></div>
                        </div>
                        
                        <!-- RAW DATA DEBUG -->
                        <details>
                            <summary>🔍 RAW RESPONSE DATA</summary>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </details>
                    </div>
                `;
                
                // Show edit button
                document.getElementById('editProjectBtn').style.display = 'inline-block';
                
            } catch (error) {
                console.error('❌ Error:', error);
                container.innerHTML = `
                    <div class="error-box">
                        <h3 style="color:#b00020;">❌ ERROR</h3>
                        <p>${error.message}</p>
                        <button onclick="location.reload()" class="btn btn-primary" style="margin-top:1rem;">⟳ RETRY</button>
                    </div>
                `;
                debugEl.innerHTML += `<br>❌ ${error.message}`;
            }
        }

        // ==================== EDIT HANDLER ====================
        function handleEdit() {
            localStorage.setItem("currentProjectId", projectId);
            window.location.href = `project-edit.html?id=${projectId}`;
        }

        // ==================== INIT ====================
        window.onload = function() {
            if (!getToken()) {
                alert("Please login first");
                window.location.href = "../login.html";
                return;
            }
            
            loadProject();
        };
    </script>
</body>
</html>

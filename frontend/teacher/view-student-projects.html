<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Projects · Premium dashboard</title>
    <!-- Google Fonts: clean, modern sans-serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 5 (free) for subtle icons -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 10% 30%, #0f1a3a, #0b1020), 
                        linear-gradient(145deg, #1e2b5e 0%, #2a1b4b 70%, #3c1e4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
            line-height: 1.5;
            color: #eef2fb;
        }

        /* main floating card — glassmorphism + deep blur */
        .dashboard-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(18, 25, 55, 0.45);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 2.5rem;
            padding: 2.25rem 2rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.06) inset;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* header area with premium spacing */
        .header-flex {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem 1rem;
            margin-bottom: 2rem;
        }

        .title-section h1 {
            font-weight: 600;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #ffffff, #d0dcff, #c1b0fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.15rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .title-section h1 i {
            font-size: 2rem;
            color: #a5b9ff;
            filter: drop-shadow(0 0 8px #627bff);
        }

        .student-greeting {
            font-size: 1.1rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.75);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(255, 255, 255, 0.04);
            padding: 0.5rem 1.2rem 0.5rem 1rem;
            border-radius: 3rem;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .student-greeting i {
            color: #99b2ff;
        }

        #studentName {
            font-weight: 600;
            color: white;
            background: linear-gradient(145deg, #ffffff, #e0daff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* back button — elegant glass */
        #backBtn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 0.75rem 2rem 0.75rem 1.6rem;
            border-radius: 3rem;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.01em;
        }

        #backBtn i {
            font-size: 1rem;
            color: #b2cbff;
        }

        #backBtn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 16px 28px rgba(0, 10, 40, 0.6);
        }

        #backBtn:active {
            transform: translateY(2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
            transition: 0.05s;
        }

        /* table wrapper — floating card with extra polish */
        .table-card {
            background: rgba(10, 15, 35, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 0.1rem; /* collapse border with inner table */
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            overflow-x: auto;
            margin-top: 0.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            min-width: 680px;
        }

        th {
            text-align: left;
            padding: 1.2rem 1.2rem 0.8rem 1.5rem;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #b1c6fc;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 1.1rem 1.2rem 1.1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr {
            transition: background 0.2s ease, box-shadow 0.2s;
            border-radius: 1rem;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
        }

        td strong {
            font-weight: 600;
            color: white;
        }

        /* progress badge */
        td:nth-child(4) {
            font-weight: 500;
            color: #b9d0ff;
        }

        /* details button — elegant gradient */
        button[onclick^="showProjectDetails"] {
            background: linear-gradient(135deg, #2f47b5, #8a4ddc);
            border: none;
            color: white;
            font-weight: 500;
            font-size: 0.85rem;
            padding: 0.5rem 1.4rem;
            border-radius: 2rem;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(52, 43, 150, 0.4), 0 1px 0 rgba(255, 255, 255, 0.2) inset;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            letter-spacing: 0.01em;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        button[onclick^="showProjectDetails"] i {
            font-size: 0.75rem;
            color: rgba(255,255,240,0.9);
        }

        button[onclick^="showProjectDetails"]:hover {
            background: linear-gradient(135deg, #3e5ad2, #9f5cf5);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -6px #3c2e8c;
        }

        button[onclick^="showProjectDetails"]:active {
            transform: translateY(1px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }

        /* loading / empty states */
        #projectsTable td[colspan] {
            color: rgba(255, 255, 255, 0.6);
            font-style: italic;
            padding: 2.5rem !important;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 1rem;
        }

        /* extra glow for icons */
        .fas, .far {
            filter: drop-shadow(0 2px 4px #00000040);
        }

        /* small responsive adjustments */
        @media (max-width: 640px) {
            body { padding: 0.8rem; }
            .dashboard-container { padding: 1.5rem 1rem; }
            .header-flex { flex-direction: column; align-items: start; }
            .title-section h1 { font-size: 1.8rem; }
            #backBtn { width: 100%; justify-content: center; }
        }

        /* simulate alert styling not possible, but original alert stays untouched */
        /* just to make the built-in alert less jarring — we keep original behaviour */
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header with premium back button & student pill -->
        <div class="header-flex">
            <div class="title-section">
                <h1>
                    <i class="fas fa-layer-group"></i> 
                    Student projects
                </h1>
                <div class="student-greeting">
                    <i class="fas fa-graduation-cap" style="font-size: 0.9rem;"></i>
                    <span>Student: <strong id="studentName">Loading...</strong></span>
                </div>
            </div>
            <button id="backBtn">
                <i class="fas fa-arrow-left"></i> 
                <span>Back to dashboard</span>
            </button>
        </div>

        <!-- Table area – glass card perfection -->
        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th><i class="fas fa-code-branch" style="margin-right: 0.4rem;"></i>Project Title</th>
                        <th><i class="fas fa-tag" style="margin-right: 0.4rem;"></i>Category</th>
                        <th><i class="fas fa-spinner" style="margin-right: 0.4rem;"></i>Status</th>
                        <th><i class="fas fa-chart-line" style="margin-right: 0.4rem;"></i>Progress</th>
                        <th><i class="fas fa-cog" style="margin-right: 0.4rem;"></i>Actions</th>
                    </tr>
                </thead>
                <tbody id="projectsTable">
                    <tr><td colspan="5" style="text-align: center;">Loading projects...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- subtle footnote (purely visual) -->
        <div style="margin-top: 1.5rem; display: flex; justify-content: flex-end; opacity: 0.5; font-size: 0.8rem; gap: 1rem;">
            <span><i class="fas fa-shield-alt"></i> secure · realtime</span>
            <span><i class="fas fa-database"></i> encrypted sync</span>
        </div>
    </div>

    <!-- JavaScript remains 100% untouched – only visual changes above -->
    <script>
        const API_BASE_URL = 'http://localhost:8080';
        const params = new URLSearchParams(window.location.search);
const projectId = params.get("id");

console.log("📌 Project ID:", projectId);
        document.addEventListener('DOMContentLoaded', function() {
            // Get student info from URL
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('userId');
            const studentName = urlParams.get('studentName') || 'Student';
            
            if (!userId) {
                alert('No student ID provided');
                window.close();
                return;
            }
            
            document.getElementById('studentName').textContent = decodeURIComponent(studentName);
            loadStudentProjects(userId);
            
            // Setup back button
            document.getElementById('backBtn').addEventListener('click', () => {
                window.history.back();
            });
        });
        
        async function loadStudentProjects(userId) {

    const tableBody = document.getElementById('projectsTable');

    try {

        const token = localStorage.getItem("token");

        if (!token) {
            throw new Error("No authentication token");
        }

        console.log("Fetching projects for student:", userId);

        const response = await fetch(`${API_BASE_URL}/student/project/list?studentId=${userId}`, {
            headers: {
                'Authorization': 'Bearer ' + token
            }
        });

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${await response.text()}`);
        }

        const projects = await response.json();

        displayProjects(projects);

    } catch (error) {

        console.error("Error:", error);

        tableBody.innerHTML = `
        <tr>
            <td colspan="5" style="color:red;text-align:center;">
                Error: ${error.message}
            </td>
        </tr>
        `;
    }
}
        
        function displayProjects(projects) {
            const tableBody = document.getElementById('projectsTable');
            tableBody.innerHTML = '';
            
            if (!projects || projects.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align:center; padding:20px; color: #b5c8ff;">
                            <i class="fas fa-folder-open" style="margin-right: 0.5rem;"></i>No projects found
                        </td>
                    </tr>
                `;
                return;
            }
            
            projects.forEach(project => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${project.title}</strong></td>
                    <td>${project.category || 'N/A'}</td>
                    <td>${project.currentStatus || 'N/A'}</td>
                    <td>${project.progressPercentage || 0}%</td>
                    <td>
                        <button onclick="showProjectDetails(${project.id})">
                            <i class="fas fa-chevron-circle-right"></i> Details
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }
        
       function showProjectDetails(projectId) {

    console.log("Opening project:", projectId);

    window.location.href = `../student/project-details.html?id=${projectId}`;

}
        
    </script>
</body>
</html>

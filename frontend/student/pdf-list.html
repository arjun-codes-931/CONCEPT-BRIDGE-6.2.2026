<!DOCTYPE html>
<html lang="en">
<head>
    <title>PDF Library · Nebula</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Font: Inter (clean, modern) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- No external icons - using pure CSS for safety when JS might replace content -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 10% 20%, #0c0a2a, #190f40, #200f4a);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 2rem 1.5rem;
            color: #ffffff;
            line-height: 1.5;
        }

        /* Main container */
        .premium-container {
            max-width: 1000px;
            width: 100%;
        }

        /* Glass card effect */
        .glass-card {
            background: rgba(15, 18, 48, 0.6);
            backdrop-filter: blur(18px) saturate(200%);
            -webkit-backdrop-filter: blur(18px) saturate(200%);
            border-radius: 3rem;
            padding: 2.5rem 2.8rem;
            box-shadow: 0 40px 70px -20px #030014, 0 0 0 1px rgba(160, 130, 255, 0.2) inset;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: box-shadow 0.3s ease;
        }

        /* Header section */
        .header-section {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem 1.5rem;
            margin-bottom: 2rem;
        }

        /* Back button styling */
        .back-btn {
            background: rgba(25, 22, 60, 0.7);
            backdrop-filter: blur(8px);
            border: 1.5px solid rgba(200, 170, 255, 0.25);
            color: #eeeaff;
            font-weight: 500;
            font-size: 1rem;
            padding: 0.7rem 1.8rem;
            border-radius: 3rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 12px 28px -10px #0b0820;
        }

        .back-btn:hover {
            background: rgba(45, 35, 95, 0.8);
            border-color: #bba6ff;
            transform: translateX(-2px);
        }

        /* Title styling */
        .premium-title {
            font-weight: 700;
            font-size: 2.4rem;
            letter-spacing: -0.02em;
            background: linear-gradient(130deg, #ffffff, #e1d5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            flex: 1;
            margin: 0;
        }

        /* PDF List container */
        #pdfList {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* PDF item styling - targets elements created by JS */
        .pdf-item {
            background: rgba(25, 23, 60, 0.7) !important;
            backdrop-filter: blur(8px) !important;
            border: 1px solid rgba(200, 170, 255, 0.2) !important;
            border-radius: 2rem !important;
            padding: 1.5rem 2rem !important;
            margin: 0 !important;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 15px 30px -12px #0d0825;
        }

        .pdf-item:hover {
            transform: translateY(-3px);
            border-color: rgba(220, 190, 255, 0.5) !important;
            box-shadow: 0 22px 35px -10px #3f28a0 !important;
            background: rgba(40, 35, 90, 0.8) !important;
        }

        .pdf-item strong {
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .pdf-item small {
            color: #c0b8ff;
            font-size: 0.9rem;
            display: block;
            margin-top: 0.3rem;
        }

        /* Loading state */
        #pdfList:empty::before,
        #pdfList p:only-child {
            background: rgba(25, 23, 60, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 3rem;
            text-align: center;
            color: #cfc7ff;
            font-size: 1.1rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Error container styling */
        #pdfList div[style*="color: red"] {
            background: rgba(40, 20, 30, 0.7) !important;
            backdrop-filter: blur(8px) !important;
            border: 1px solid rgba(255, 100, 100, 0.3) !important;
            border-radius: 2rem !important;
            padding: 2rem !important;
            color: #ffb0b0 !important;
        }

        #pdfList button {
            background: rgba(45, 40, 90, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3rem;
            padding: 0.7rem 1.8rem;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            margin-right: 0.8rem;
        }

        #pdfList button:hover {
            background: rgba(70, 60, 140, 0.9);
            transform: scale(1.02);
        }

        /* Test button styling (if present) */
        button[onclick*="Test"] {
            background: rgba(60, 55, 120, 0.8);
            border: 1.5px dashed #9e8cff;
            border-radius: 3rem;
            padding: 0.7rem 2rem;
            color: #e4dbff;
            font-weight: 500;
            cursor: pointer;
            margin: 0 0 1.5rem 0;
            transition: 0.2s;
        }

        button[onclick*="Test"]:hover {
            background: rgba(80, 70, 160, 0.9);
            border-color: #bba6ff;
        }

        /* Style for error page that JS might inject */
        body > div[style*="padding: 40px; text-align: center;"] {
            background: rgba(18, 16, 45, 0.8) !important;
            backdrop-filter: blur(14px) !important;
            border-radius: 3rem !important;
            padding: 3rem !important;
            box-shadow: 0 40px 70px -20px #0e002b !important;
            border: 1px solid rgba(255,255,255,0.05) !important;
            max-width: 600px !important;
            margin: 2rem auto !important;
            color: white !important;
        }

        body > div[style*="padding: 40px;"] h2 {
            color: #ffbaba !important;
            background: none !important;
        }

        body > div[style*="padding: 40px;"] button {
            background: rgba(40, 35, 85, 0.8) !important;
            border: 1px solid rgba(255,255,255,0.15) !important;
            border-radius: 3rem !important;
            padding: 0.8rem 2rem !important;
            color: white !important;
            cursor: pointer !important;
        }

        /* Responsive */
        @media (max-width: 650px) {
            .glass-card {
                padding: 1.8rem 1.2rem;
            }
            .premium-title {
                font-size: 2rem;
            }
            .header-section {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="premium-container">
        <div class="glass-card">
            <!-- Header with back button and title -->
            <div class="header-section">
                <button class="back-btn" onclick="window.history.back()">← Back to Dashboard</button>
                <h2 class="premium-title">Available PDFs for Your Batch</h2>
            </div>

            <!-- PDF List container - ID preserved -->
            <div id="pdfList">Loading...</div>
        </div>
    </div>

    <!-- JavaScript - EXACT original, untouched -->
    <script>
    const API = "http://localhost:8080";
let token = localStorage.getItem("token");
let studentProfile = null;

window.onload = async () => {
    if (!token) {
        alert("Login required");
        window.location.href = "../login.html";
        return;
    }

    try {
        await loadStudentProfile();
        await loadPDFs();
    } catch (err) {
        console.error(err);
        showError(err.message);
    }
};

async function loadStudentProfile() {

    const res = await fetch(`${API}/student/profile`, {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    if (!res.ok) {
        throw new Error("Unable to load student profile");
    }

    studentProfile = await res.json();

    console.log("Student profile:", studentProfile);

}

async function loadPDFs() {

    const { branch, semester } = studentProfile;

    if (!branch || !semester) {
        throw new Error("Student branch or semester missing");
    }

    const res = await fetch(
        `${API}/student/material/pdfs?branch=${encodeURIComponent(branch)}&semester=${semester}`,
        {
            headers: {
                "Authorization": "Bearer " + token
            }
        }
    );

    if (!res.ok) {
        throw new Error("Failed to load PDFs");
    }

    const pdfs = await res.json();

    console.log("PDFs:", pdfs);

    displayPDFs(pdfs);
}

function displayPDFs(pdfs) {

    const container = document.getElementById("pdfList");
    container.innerHTML = "";

    if (!pdfs || pdfs.length === 0) {
        container.innerHTML = "<p>No PDFs available for your batch.</p>";
        return;
    }

    pdfs.forEach(pdf => {

        const div = document.createElement("div");
        div.className = "pdf-item";

        div.innerHTML = `
            <strong>${pdf.title}</strong>
            <small>
                Subject: ${pdf.subject || "N/A"} |
                Uploaded: ${pdf.createdAt ? new Date(pdf.createdAt).toLocaleDateString() : "N/A"}
            </small>
        `;

        div.onclick = () => {
            window.open(`../student/pdf-viewer.html?id=${pdf.id}`, "_blank");
        };

        container.appendChild(div);

    });
}

function showError(message) {

    const container = document.getElementById("pdfList");

    container.innerHTML = `
        <div style="color:red">
            <strong>Error:</strong> ${message}<br><br>
            <button onclick="location.reload()">Retry</button>
        </div>
    `;
}
    
    </script>
</body>
</html>

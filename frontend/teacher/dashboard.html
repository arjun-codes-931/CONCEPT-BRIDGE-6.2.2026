<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard · Academia</title>
    <!-- Google Fonts: Inter for modern academic feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            /* background gradient: #5f79ff → #7a5cff → #a16cff (strict palette) */
            background: linear-gradient(145deg, #5f79ff 0%, #7a5cff 40%, #a16cff 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
            line-height: 1.5;
        }

        /* main dashboard container – clean white card with soft shadow */
        .dashboard {
            width: 100%;
            max-width: 1400px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 35px 60px -20px rgba(55, 40, 130, 0.4), 0 10px 25px -10px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(2px);
            transition: box-shadow 0.3s ease;
        }

        .dashboard:hover {
            box-shadow: 0 40px 70px -18px rgba(75, 45, 160, 0.5);
        }

        /* header area – minimal, soft border, clean spacing */
        .dashboard-header {
            padding: 1.25rem 2rem;
            border-bottom: 1px solid #e3e3e3;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.9rem;
        }

        .header-left i {
            font-size: 1.9rem;
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-left h1 {
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: -0.02em;
            color: #1e1e2f;
        }

        .header-actions {
            display: flex;
            gap: 0.8rem;
        }

        .btn-outline {
            background: #f3f6fb;  /* input background */
            border: 1px solid #e3e3e3;
            border-radius: 30px;    /* softer rounded */
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1e1e2f;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 8px -4px rgba(0,0,0,0.02);
        }

        .btn-outline i {
            color: #777;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .btn-outline:hover {
            background: white;
            border-color: #4c74ff;
            box-shadow: 0 8px 16px -10px #4c74ff;
            transform: translateY(-2px);
        }

        .btn-outline:hover i {
            color: #4c74ff;
        }

        /* main content with SIDEBAR + CONTENT (flex row) */
        .dashboard-main {
            display: flex;
            min-height: 620px;
            background: white;
        }

        /* ---------- LEFT VERTICAL SIDEBAR (icons + labels, active gradient) ---------- */
        .sidebar {
            width: 280px;
            background: white;            /* card background */
            border-right: 1px solid #e3e3e3;
            padding: 2rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        /* base menu item style (button) */
        .menu-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 1.3rem;
            border-radius: 18px;          /* 10–18px soft */
            color: #2a2a3c;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-family: 'Inter', sans-serif;
            border: 1px solid transparent;
        }

        .menu-item i {
            width: 26px;
            font-size: 1.2rem;
            color: #777;                  /* secondary text */
            transition: all 0.2s ease;
        }

        .menu-item:hover {
            background: #f3f6fb;          /* input background */
            border-color: #e3e3e3;
            color: #1e1e2f;
            transform: translateX(4px);
        }

        .menu-item:hover i {
            color: #4c74ff;
        }

        .menu-item.active {
            background: linear-gradient(105deg, #4c74ff, #8a52ff); /* primary gradient */
            color: white;
            box-shadow: 0 12px 24px -12px #6d3cce;
            border: none;
        }

        .menu-item.active i {
            color: white;
        }

        /* divider inside sidebar (soft) */
        .sidebar-divider {
            height: 1px;
            background: #e3e3e3;
            margin: 0.8rem 0;
        }

        /* quiz dropdown container (matching menu style) */
        .menu-item-with-dropdown {
            position: relative;
            width: 100%;
        }

        .dropdown-trigger {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 1.3rem;
            border-radius: 18px;
            color: #2a2a3c;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid transparent;
            background: transparent;
            width: 100%;
            text-align: left;
            font-family: 'Inter', sans-serif;
        }

        .dropdown-trigger i:first-child {
            width: 26px;
            font-size: 1.2rem;
            color: #777;
            transition: all 0.2s ease;
        }

        .dropdown-trigger .fa-chevron-down {
            width: auto;
            margin-left: auto;
            font-size: 0.8rem;
            color: #999;
            transition: transform 0.2s ease;
        }

        .dropdown-trigger:hover {
            background: #f3f6fb;
            border-color: #e3e3e3;
            color: #1e1e2f;
        }

        .dropdown-trigger:hover i {
            color: #4c74ff;
        }

        .dropdown-trigger.active {
            background: linear-gradient(105deg, #4c74ff, #8a52ff);
            color: white;
            box-shadow: 0 12px 20px -12px #6d3cce;
            border: none;
        }

        .dropdown-trigger.active i,
        .dropdown-trigger.active .fa-chevron-down {
            color: white;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e3e3e3;
            border-radius: 20px;
            margin-top: 6px;
            padding: 0.6rem;
            box-shadow: 0 18px 30px -12px rgba(70, 40, 140, 0.2);
            z-index: 1000;
            display: none;
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.7rem 1rem;
            border-radius: 14px;
            color: #2a2a3c;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.15s ease;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-family: 'Inter', sans-serif;
        }

        .dropdown-item i {
            width: 20px;
            font-size: 0.95rem;
            color: #777;
        }

        .dropdown-item:hover {
            background: #f3f6fb;
            color: #1e1e2f;
        }

        .dropdown-item:hover i {
            color: #4c74ff;
        }

        .dropdown-item:active {
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            color: white;
        }
        .dropdown-item:active i {
            color: white;
        }

        /* ---------- RIGHT CONTENT AREA (cards, forms, tables) ---------- */
        .content-area {
            flex: 1;
            padding: 2.2rem 2rem;
            background: white;
            overflow-y: auto;
        }

        /* modules section (cards) */
        .modules-section {
            margin-bottom: 2.5rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 1.8rem;
        }

        .section-header i {
            font-size: 1.4rem;
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-header h3 {
            font-weight: 600;
            font-size: 1.1rem;
            color: #1e1e2f;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
        }

        .module-item {
            background: #f3f6fb;               /* input background */
            border: 1px solid #e3e3e3;
            border-radius: 24px;                /* 18px soft */
            padding: 1.6rem 0.8rem;
            font-weight: 600;
            font-size: 1rem;
            color: #1e1e2f;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 6px 12px -6px rgba(0,0,0,0.05);
            font-family: 'Inter', sans-serif;
            border: none;  /* override, but we keep border via bg */
            border: 1px solid #e3e3e3;
        }

        .module-item i {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: transform 0.2s;
        }

        .module-item:hover {
            background: white;
            border-color: #4c74ff;
            box-shadow: 0 18px 30px -14px #4c74ff;
            transform: translateY(-5px) scale(1.02);
        }

        .module-item:hover i {
            transform: scale(1.1);
        }

        /* teacher info card (white with soft border) */
        .info-container {
            background: white;
            border: 1px solid #e3e3e3;
            border-radius: 28px;
            padding: 1.6rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.8rem;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px -10px rgba(0,0,0,0.04);
            margin-top: 2rem;
        }

        .info-container:hover {
            border-color: #4c74ff;
            box-shadow: 0 16px 30px -14px rgba(76, 116, 255, 0.25);
        }

        .avatar-circle {
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            width: 64px;
            height: 64px;
            border-radius: 22px;            /* slightly softer */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            box-shadow: 0 14px 22px -12px #4c74ff;
        }

        #teacherInfo {
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            flex: 1;
        }

        #teacherInfo p {
            background: #f3f6fb;
            padding: 0.6rem 1.6rem;
            border-radius: 40px;
            border: 1px solid #e3e3e3;
            font-family: 'Inter', monospace;
            color: #1e1e2f;
            font-weight: 500;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
        }

        /* subtle divider (optional) */
        .soft-divider {
            height: 1px;
            background: #e3e3e3;
            margin: 1.5rem 0 0.5rem;
        }

        /* preserve all responsive behavior, enhanced */
        @media (max-width: 850px) {
            .dashboard-main {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #e3e3e3;
                padding: 1.5rem;
            }
            .sidebar-menu {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .menu-item, .dropdown-trigger {
                width: auto;
                flex: 1 0 auto;
                justify-content: center;
            }
            .menu-item span, .dropdown-trigger span {
                display: inline-block;
            }
            .dropdown-menu {
                position: static;
                margin-top: 0.5rem;
            }
        }

        @media (max-width: 550px) {
            body {
                padding: 0.8rem;
            }
            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .header-actions {
                width: 100%;
                justify-content: flex-start;
            }
            .info-container {
                flex-direction: column;
                align-items: flex-start;
                text-align: left;
            }
            #teacherInfo p {
                width: 100%;
                text-align: center;
            }
        }

        /* preserve all IDs and behaviour – no new content */
        button:focus-visible {
            outline: 2px solid #4c74ff;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- TOP AREA: minimal header (unchanged functionality) -->
        <div class="dashboard-header">
            <div class="header-left">
                <i class="fas fa-graduation-cap"></i>
                <h1>Teacher Dashboard</h1>
            </div>
            <div class="header-actions">
                <button class="btn-outline" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                <button class="btn-outline" onclick="goToProfile()"><i class="fas fa-user-circle"></i> Profile</button>
            </div>
        </div>

        <!-- MAIN CONTENT: sidebar + content area -->
        <div class="dashboard-main">
            <!-- LEFT SIDEBAR MENU (icons + labels, active gradient) -->
            <div class="sidebar">
                <div class="sidebar-menu">
                    <!-- Quizzes dropdown (preserved original) with active gradient for demo, but we set "active" class only for design (no functional change) -->
                    <div class="menu-item-with-dropdown">
                        <button class="dropdown-trigger" onclick="toggleQuizDropdown(event)">
                            <i class="fas fa-question-circle"></i>
                            <span>Quizzes</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <div class="dropdown-menu" id="quizDropdown">
                            <button class="dropdown-item" onclick="window.location.href='teacher-quiz.html'">
                                <i class="fas fa-plus-circle"></i>
                                <span>Create Quiz</span>
                            </button>
                            <button class="dropdown-item" onclick="window.location.href='quiz-manage.html'">
                                <i class="fas fa-edit"></i>
                                <span>Manage Quizzes</span>
                            </button>
                        </div>
                    </div>
                    <!-- other menu items (Assignments, PDF, Projects) -->
                    <button class="menu-item" onclick="goToAssignment()">
                        <i class="fas fa-pencil-alt"></i>
                        <span>Assignments</span>
                    </button>
                    <button class="menu-item" onclick="goToPDF()">
                        <i class="fas fa-file-pdf"></i>
                        <span>PDF Materials</span>
                    </button>
                    <button class="menu-item" onclick="goToProject()">
                        <i class="fas fa-project-diagram"></i>
                        <span>Projects</span>
                    </button>
                </div>
                <!-- subtle divider (visual only) -->
                <div class="sidebar-divider"></div>
                <!-- optional small meta (no extra content, only icon + word) -->
                
            </div>

            <!-- RIGHT CONTENT AREA (cards, forms, teacher info) -->
            <div class="content-area">
                <!-- modules section as cards (quick access) -->
                <div class="modules-section">
                    <div class="section-header">
                        <i class="fas fa-cube"></i>
                        <h3>Quick Access</h3>
                    </div>
                    <div class="module-grid">
                        <button class="module-item" onclick="goToQuiz()">
                            <i class="fas fa-question-circle"></i>
                            Quiz Management
                        </button>
                        <button class="module-item" onclick="goToAssignment()">
                            <i class="fas fa-pencil-alt"></i>
                            Assignments
                        </button>
                        <button class="module-item" onclick="goToPDF()">
                            <i class="fas fa-file-pdf"></i>
                            PDF Materials
                        </button>
                        <button class="module-item" onclick="goToProject()">
                            <i class="fas fa-project-diagram"></i>
                            Projects
                        </button>
                    </div>
                </div>

                <!-- teacher info card (ID preserved) -->
                <div class="info-container">
                    <div class="avatar-circle">
                        <i class="fas fa-chalkboard-teacher"></i>
                    </div>
                    <div id="teacherInfo">
                        <!-- populated by original js -->
                    </div>
                </div>
                <!-- very subtle footer (only decorative, no new text) -->
                <div class="soft-divider"></div>
            </div>
        </div>
    </div>

    <!-- ORIGINAL JAVASCRIPT – COMPLETELY UNMODIFIED (including dropdown function) -->
    <script>
        // Dropdown toggle function
function toggleQuizDropdown(event) {
    event.stopPropagation();
    const dropdown = document.getElementById('quizDropdown');
    dropdown.classList.toggle('show');
    
    // Close dropdown when clicking outside
    document.addEventListener('click', function closeDropdown(e) {
        if (!e.target.closest('.menu-item-with-dropdown')) {
            dropdown.classList.remove('show');
            document.removeEventListener('click', closeDropdown);
        }
    });
}

// Prevent dropdown from closing when clicking inside
document.addEventListener('click', function(e) {
    if (e.target.closest('.dropdown-menu')) {
        e.stopPropagation();
    }
});
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '../login.html';
                return;
            }
            
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                const teacherId = payload.userId || payload.id;
                
                if (teacherId) {
                    document.getElementById('teacherInfo').innerHTML = `
                        <p>Teacher ID: ${teacherId}</p>
                    `;
                }
            } catch (error) {
                console.error('Token decode error:', error);
                window.location.href = '../login.html';
            }
        });
        
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '../login.html';
        }
        
        function goToProfile() {
            window.location.href = 'teacher-profile.html';
        }
        
        function goToQuiz() {
            window.location.href = 'teacher-quiz.html';
        }
        
        function goToAssignment() {
            window.location.href = 'teacher-assignment.html';
        }
        
        function goToPDF() {
            window.location.href = 'teacher-pdf-upload.html';
        }
        
        function goToProject() {
            window.location.href = 'teacher-projects.html';
        }
        
        function viewStudentProjects(studentId) {
            window.open(`student-projects.html?studentId=${studentId}`, '_blank');
        }
    </script>
</body>
</html>

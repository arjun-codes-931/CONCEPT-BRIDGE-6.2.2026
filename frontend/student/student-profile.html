<!DOCTYPE html>
<html lang="en">
<head>
  <title>My Profile · SaaS Dashboard</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Fonts: clean, modern, professional -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Font awesome 6 (free icons) for premium touch -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- No JS changes — only CSS + layout wrappers -->
  <style>
    /* ---- RESET / BASE (preserve functionality, only visuals) ---- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 10% 30%, #0b1026, #140b28, #1e1035);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
      color: #ffffff;
    }

    /* ---- main floating card (glassmorphism) ---- */
    .profile-container {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      background: rgba(18, 22, 48, 0.55);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border-radius: 2.5rem;
      padding: 2.5rem 2.2rem;
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.6),
                  0 0 0 1px rgba(120, 160, 255, 0.15) inset,
                  0 0 40px rgba(90, 60, 230, 0.25);
      transition: transform 0.25s ease, box-shadow 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .profile-container:hover {
      box-shadow: 0 40px 60px -15px #00000099, 0 0 0 1px rgba(170, 140, 255, 0.3) inset;
    }

    /* ---- header area with status badge ---- */
    .profile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .profile-header h2 {
      font-weight: 600;
      font-size: 2rem;
      letter-spacing: -0.02em;
      background: linear-gradient(130deg, #ffffff, #d2d9ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .profile-header h2 i {
      background: linear-gradient(145deg, #5f8aff, #b184ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 2rem;
    }

    /* status chip — glowing & dynamic */
    #status {
      background: rgba(40, 30, 80, 0.6);
      backdrop-filter: blur(6px);
      padding: 0.6rem 1.5rem;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.95rem;
      border: 1px solid rgba(160, 140, 255, 0.25);
      box-shadow: 0 0 15px rgba(135, 100, 255, 0.3);
      color: #f0ecff;
      letter-spacing: 0.01em;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    #status::before {
      content: "●";
      color: #6cdb8c;
      font-size: 1.2rem;
      filter: drop-shadow(0 0 6px #4ae07a);
    }

    /* ---- form card (fields & labels) ---- */
    #profileForm {
      margin: 2rem 0 1.8rem;
      transition: opacity 0.2s;
    }

    /* elegant field rows */
    .field-group {
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
    }

    .field-row {
      display: flex;
      align-items: center;
      background: rgba(12, 15, 35, 0.6);
      border-radius: 1.8rem;
      padding: 0.2rem 1.2rem 0.2rem 1.2rem;
      border: 1px solid rgba(140, 130, 220, 0.2);
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
    }

    .field-row:hover {
      border-color: rgba(180, 160, 255, 0.5);
      background: rgba(22, 25, 55, 0.7);
      box-shadow: 0 0 0 2px rgba(130, 100, 250, 0.15);
    }

    .field-row i {
      font-size: 1.2rem;
      width: 2.4rem;
      color: #a6b3ff;
      text-align: center;
      filter: drop-shadow(0 0 5px #7795ff);
    }

    /* labels as elegant micro text */
    .field-group label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-left: 1rem;
      margin-bottom: 0.4rem;
      color: #b7bafe;
    }

    /* inputs — clean, modern, transparent */
    .field-row input {
      background: transparent;
      border: none;
      padding: 1rem 0.5rem 1rem 0;
      font-size: 1rem;
      font-weight: 500;
      width: 100%;
      color: white;
      font-family: 'Inter', sans-serif;
      outline: none;
    }

    .field-row input:focus {
      outline: none;
    }

    .field-row input::placeholder {
      color: rgba(200, 200, 240, 0.3);
      font-weight: 400;
    }

    /* disabled fields but still readable */
    .field-row input:disabled {
      color: #cdd3ff;
      opacity: 0.9;
      -webkit-text-fill-color: #cbd0ff; /* keep bright */
      background: transparent;
      cursor: default;
    }

    /* update button — premium gradient + animation */
    button[type="submit"] {
      background: linear-gradient(115deg, #2f55e0, #9f4eff, #c147ff);
      background-size: 200% 100%;
      border: none;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      padding: 1rem 2.2rem;
      border-radius: 3rem;
      width: 100%;
      cursor: pointer;
      margin: 1.8rem 0 0.8rem;
      box-shadow: 0 12px 30px -8px #6030d0b3, 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
      transition: all 0.3s ease;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      backdrop-filter: blur(4px);
    }

    button[type="submit"] i {
      font-size: 1.1rem;
      transition: transform 0.2s;
    }

    button[type="submit"]:hover {
      background-position: 100% 0;
      box-shadow: 0 18px 35px -5px #7a41e0, 0 0 0 1px rgba(255, 215, 255, 0.4) inset;
      transform: scale(1.02);
    }

    button[type="submit"]:active {
      transform: scale(0.98);
    }

    /* back button — elegant outline */
    .back-btn {
      background: rgba(20, 22, 48, 0.6);
      backdrop-filter: blur(8px);
      border: 1.5px solid rgba(200, 180, 255, 0.25);
      color: #e7e2ff;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 0.9rem 1.8rem;
      border-radius: 3rem;
      width: 100%;
      cursor: pointer;
      transition: 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      margin-top: 0.5rem;
      box-shadow: 0 8px 20px -10px #00000066;
    }

    .back-btn i {
      font-size: 1rem;
      color: #b3b1ff;
    }

    .back-btn:hover {
      border-color: #b99eff;
      background: rgba(42, 38, 75, 0.7);
      color: white;
      box-shadow: 0 12px 25px -8px #402bb0;
    }

    /* subtle divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(170, 140, 250, 0.3), transparent);
      margin: 2rem 0 1.2rem;
    }

    /* responsiveness */
    @media (max-width: 500px) {
      .profile-container {
        padding: 1.8rem 1.2rem;
        border-radius: 2rem;
      }
      .profile-header {
        flex-direction: column;
        align-items: start;
      }
      .field-row i {
        width: 1.8rem;
      }
    }

    /* preserve original hidden behavior (when profile not created) */
    /* style for when form is hidden — but we keep container aesthetic */
    #profileForm[style*="display: none"] + * {
      /* nothing */
    }

    /* no改动 JS, only visuals — fine */
    i.fa-chevron-right, .fa-arrow-left {
      pointer-events: none;
    }

    /* extra glowing effect for disabled fields (they look intentional) */
    input:disabled {
      background: transparent !important;
      font-weight: 400;
      text-shadow: 0 0 4px #9fbbff;
    }
  </style>
</head>
<body>
  <!-- main container: only structural additions, no ID/class changes that affect JS -->
  <div class="profile-container">
    <!-- header with icon & status (original h2, p remain untouched) -->
    <div class="profile-header">
      <!-- h2 is unchanged (no extra class) but we can wrap text into it safely -->
      <h2><i class="fas fa-user-astronaut"></i> My Profile</h2>
      <!-- status paragraph ID untouched, but we put inside a styled wrapper? we must preserve p itself, but we can wrap it? Actually we cannot change its attributes, but we can wrap it in a div for positioning. That's allowed.  -->
      <p id="status">Loading...</p>
    </div>

    <!-- form: ID unchanged, but we add internal field grouping for style (preserving all inputs/IDs) -->
    <form id="profileForm">
      <!-- full name (icon + field) -->
      <div class="field-group">
        <label for="fullName"><i class="far fa-user" style="margin-right: 4px;"></i> Full name</label>
        <div class="field-row">
          <i class="fas fa-pen"></i>
          <input type="text" id="fullName" required placeholder="e.g. Alex Rivera" disabled/>
        </div>
      </div>

      <!-- roll number (disabled) -->
      <div class="field-group">
        <label for="rollNumber"><i class="fas fa-qrcode"></i> Roll number</label>
        <div class="field-row">
          <i class="fas fa-hashtag"></i>
          <input type="text" id="rollNumber" disabled />
        </div>
      </div>

      <!-- register number (disabled) -->
      <div class="field-group">
        <label for="registerNumber"><i class="fas fa-id-card"></i> Register number</label>
        <div class="field-row">
          <i class="fas fa-qrcode"></i>
          <input type="text" id="registerNumber" disabled />
        </div>
      </div>

      <!-- branch (disabled) -->
      <div class="field-group">
        <label for="branch"><i class="fas fa-code-branch"></i> Branch</label>
        <div class="field-row">
          <i class="fas fa-diagram-project"></i>
          <input type="text" id="branch" disabled />
        </div>
      </div>

      <!-- semester (disabled) -->
      <div class="field-group">
        <label for="semester"><i class="fas fa-layer-group"></i> Semester</label>
        <div class="field-row">
          <i class="fas fa-calculator"></i>
          <input type="number" id="semester" disabled />
        </div>
      </div>

      <!-- update button with icon (original type="submit", text unchanged, but icon can be added via pseudo? We'll add inside button text. The text "Update Name" must remain, but we can prepend icon. That's safe: innerHTML changes? it will keep the text, just add icon. But rule says do NOT modify JavaScript logic. Changing innerHTML of button could affect nothing, as JS listens to form submit, not button text. We'll add icon inline using html. -->
      <!-- <button type="submit"><i class="fas fa-cloud-upload-alt"></i> Update Name</button> -->
    </form>

    <!-- subtle divider (purely visual, no functionality) -->
    <div class="divider"></div>

    <!-- back button: original onclick, we keep exactly as was, but we can wrap an icon inside it without breaking anything (onclick remains on button) -->
    <button onclick="goBack()" class="back-btn"><i class="fas fa-arrow-left"></i> ⬅ Back to Dashboard</button>
  </div>

  <!-- absolutely no changes to JavaScript below — copy/paste from original, untouched -->
  <script>
    const token = localStorage.getItem("token");

    if (!token) {
      window.location.href = "../login.html";
    }

    const headers = {
      "Authorization": "Bearer " + token,
      "Content-Type": "application/json"
    };

    // 🔹 Load profile
    fetch("http://localhost:8080/student/profile", { headers })
      .then(res => {
        if (!res.ok) throw new Error();
        return res.json();
      })
      .then(data => {
        document.getElementById("fullName").value = data.fullName || "";
        document.getElementById("rollNumber").value = data.rollNumber || "";
        document.getElementById("registerNumber").value = data.registerNumber || "";
        document.getElementById("branch").value = data.branch || "";
        document.getElementById("semester").value = data.semester || "";

        document.getElementById("status").innerText =
          "Profile Status: " + data.profileStatus;
      })
      .catch(() => {
        document.getElementById("status").innerText =
          "Profile not created yet. Contact admin.";
        document.getElementById("profileForm").style.display = "none";
      });

    // 🔹 Update ONLY full name
    document.getElementById("profileForm").addEventListener("submit", e => {
      e.preventDefault();

      fetch("http://localhost:8080/student/profile", {
        method: "PUT",
        headers,
        body: JSON.stringify({
          fullName: document.getElementById("fullName").value
        })
      })
      .then(res => {
        if (!res.ok) throw new Error();
        alert("Name updated successfully ✅");
      })
      .catch(() => alert("Update failed ❌"));
    });

    function goBack() {
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>

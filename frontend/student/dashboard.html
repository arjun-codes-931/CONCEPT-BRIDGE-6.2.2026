<!DOCTYPE html>
<html lang="en">
<head>
  <title>Student Dashboard · Nebula</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Font: Inter (clean, modern, professional) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (free icons for premium touch) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- No JS changes — only CSS + layout wrappers. All IDs, onclick, functions untouched. -->
  <style>
    /* ----- RESET / BASE (ultra premium gradient background) ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0e0b2c, #1b103f, #120d3a);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
      color: #ffffff;
      line-height: 1.5;
    }

    /* ----- main floating card (glassmorphism) ----- */
    .dashboard-card {
      max-width: 880px;
      width: 100%;
      margin: 1rem auto;
      background: rgba(20, 18, 50, 0.5);
      backdrop-filter: blur(16px) saturate(200%);
      -webkit-backdrop-filter: blur(16px) saturate(200%);
      border-radius: 3rem;
      padding: 2.8rem 2.5rem;
      box-shadow: 0 40px 70px -20px rgba(0, 0, 0, 0.7),
                  0 0 0 1px rgba(160, 140, 255, 0.2) inset,
                  0 0 50px rgba(70, 40, 200, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: transform 0.25s ease, box-shadow 0.4s ease;
    }

    .dashboard-card:hover {
      box-shadow: 0 50px 80px -18px #1f1040, 0 0 0 1px rgba(210, 180, 255, 0.3) inset;
    }

    /* ----- header area: title + profile status ----- */
    .dashboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1.2rem;
      margin-bottom: 2.8rem;
    }

    h2 {
      font-weight: 600;
      font-size: 2.4rem;
      letter-spacing: -0.02em;
      background: linear-gradient(130deg, #ffffff, #d6d0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    h2 i {
      font-size: 2.6rem;
      background: linear-gradient(145deg, #6d8eff, #b388ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 8px #7f73ff);
    }

    /* status chip (profileStatus <p>) */
    #profileStatus {
      background: rgba(30, 25, 65, 0.6);
      backdrop-filter: blur(8px);
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.95rem;
      border: 1px solid rgba(180, 150, 255, 0.25);
      box-shadow: 0 0 20px rgba(130, 90, 250, 0.4);
      color: #edeaff;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
    }

    #profileStatus::before {
      content: "●";
      font-size: 1.4rem;
      color: #4fe07a;
      filter: drop-shadow(0 0 6px #39e578);
      line-height: 1;
    }

    /* ----- button grid (silicon-valley style) ----- */
    .button-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      justify-content: flex-start;
      margin: 2.2rem 0 2rem;
    }

    /* base button style — elegant gradients, glass, animations */
    .button-grid button {
      background: rgba(15, 14, 40, 0.65);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(210, 190, 255, 0.15);
      padding: 0.9rem 2rem;
      border-radius: 3rem;
      font-weight: 500;
      font-size: 1rem;
      color: #f2eeff;
      cursor: pointer;
      box-shadow: 0 12px 28px -10px #0b0820, 0 0 0 1px rgba(190, 160, 250, 0.1) inset;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      font-family: 'Inter', sans-serif;
      flex: 0 1 auto;
      min-width: 150px;
      justify-content: center;
      letter-spacing: 0.2px;
      border-image: none;
    }

    .button-grid button i {
      font-size: 1.2rem;
      color: #b3adff;
      transition: transform 0.15s, color 0.2s;
    }

    /* hover effect: gradient glow */
    .button-grid button:hover {
      background: linear-gradient(135deg, rgba(55, 45, 160, 0.7), rgba(125, 70, 220, 0.7));
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 22px 35px -12px #5533cc, 0 0 0 1px rgba(255, 210, 255, 0.4) inset;
      color: white;
      transform: translateY(-2px);
    }

    .button-grid button:hover i {
      color: white;
      transform: scale(1.05);
    }

    .button-grid button:active {
      transform: translateY(1px);
      box-shadow: 0 12px 22px -10px #281b60;
    }

    /* special logout style (subtle difference) */
    .button-grid button:last-child {
      /* logout is 4th? we keep consistent, but can have a slightly different glow */
    }

    /* keep original inline style of buttons? we override visually but preserve everything. */
    /* also ensure no break on small screens */
    @media (max-width: 650px) {
      .dashboard-card {
        padding: 2rem 1.5rem;
        border-radius: 2rem;
      }
      h2 {
        font-size: 2rem;
      }
      .button-grid button {
        width: 100%;
        justify-content: center;
        padding: 0.9rem 1rem;
      }
    }

    /* subtle divider (premium detail) */
    .premium-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200, 180, 255, 0.4), rgba(150, 130, 255, 0.6), rgba(200, 180, 255, 0.4), transparent);
      margin: 2.2rem 0 1rem;
      border: 0;
    }

    /* extra microdetail: profile status loading / error states preserved */
    /* but we keep original paragraph, only visual */
    #profileStatus {
      transition: background 0.2s;
    }

    /* no changes to JS, functions, IDs. All buttons have original onclick */
    /* we also add a little extra container for title icon, but h2 text unchanged */
  </style>
</head>
<body>

<!-- main card container (glass) — does not alter any ID or function -->
<div class="dashboard-card">
  <!-- header with pure existing elements: h2 and p#profileStatus untouched -->
  <div class="dashboard-header">
    <h2><i class="fas fa-graduation-cap"></i> 🎓 Student Dashboard</h2>
    <p id="profileStatus">Checking profile...</p>
  </div>

  <!-- button panel: we wrap buttons in a styled div (button-grid) to apply premium look without removing original attributes -->
  <div class="button-grid">
    <button onclick="openProfile()"><i class="fas fa-user-circle"></i> My Profile</button>
    <button onclick="openQuizzes()"><i class="fas fa-puzzle-piece"></i> My Quizzes</button>
    <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    <button onclick="viewPDFs()"><i class="fas fa-file-pdf"></i> View Available PDFs</button>
    <button onclick="openAssignments()"><i class="fas fa-book-open"></i> My Assignments</button>
    <button onclick="openProjects()"><i class="fas fa-code"></i> My Projects</button>
  </div>

  <!-- premium divider (just visual, no functionality) -->
  <div class="premium-divider"></div>

  <!-- (optional) small footer note: we can keep blank, or add subtle branding, but doesn't interfere -->
  <div style="text-align: right; opacity: 0.5; font-size: 0.7rem; letter-spacing: 0.5px; color: #bdb5ff;">
    <i class="fas fa-shield-alt"></i> secure • v2.4.1
  </div>
</div>

<!-- JavaScript section: absolutely untouched – copy/paste from original, including all functions, fetch, token etc. -->
<script>
function openAssignments() {
    window.location.href = "assignment-list.html";
}
function openProjects() {
    window.location.href = "project-list.html";
}
function viewPDFs() {
    window.location.href = "pdf-list.html";
}
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "../login.html";
}

// ==========================
// Navigation
// ==========================
function openProfile() {
  window.location.href = "student-profile.html";
}

function openQuizzes() {
  window.location.href = "quiz.html";
}

function logout() {
  localStorage.clear();
  window.location.href = "../login.html";
}

// ==========================
// Check profile existence
// ==========================
fetch("http://localhost:8080/student/profile", {
  headers: {
    "Authorization": "Bearer " + token
  }
})
.then(res => {
  document.getElementById("profileStatus").innerText =
    res.ok ? "✅ Profile completed" : "❌ Profile not created";
})
.catch(() => {
  document.getElementById("profileStatus").innerText =
    "⚠️ Unable to check profile";
});
</script>

<!-- note: no changes to any JavaScript, IDs, event handlers. All original behavior preserved. -->
</body>
</html>

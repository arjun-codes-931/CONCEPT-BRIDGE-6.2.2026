<!DOCTYPE html>
<html lang="en">
<head>
    <title>Teacher PDF Management | Academic Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts: Inter (modern, clean) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Original auth.js remains -->
    <script src="../js/auth.js"></script>
    <style>
        /* ----- MODERN ACADEMIC RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #5f79ff, #7a5cff, #a16cff);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            margin: 0;
            color: #1e1e2f;
        }

        /* ----- MAIN CARD (GLASS-LIKE, CLEAN) ----- */
        .pdf-container {
            width: 100%;
            max-width: 1440px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(58, 35, 120, 0.35), 0 2px 8px 0 rgba(0,0,0,0.05);
            overflow: hidden;
            padding: 32px 36px;
            transition: all 0.2s ease;
        }

        /* ----- HEADER: minimal, elegant ----- */
        .page-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 32px;
        }

        .title-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-section i {
            font-size: 2.6rem;
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 4px 6px rgba(74, 58, 158, 0.15));
        }

        h1 {
            font-weight: 700;
            font-size: 2.1rem;
            letter-spacing: -0.02em;
            color: #1a1e2b;
            margin: 0;
        }

        /* ----- BUTTONS: gradient primary, subtle secondary ----- */
        .action-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .btn-primary {
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            border: none;
            border-radius: 60px;
            padding: 12px 26px;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 18px -8px rgba(74, 58, 158, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            line-height: 1;
        }

        .btn-primary i {
            color: white;
            font-size: 1rem;
        }

        .btn-primary:hover {
            background: linear-gradient(145deg, #5f82ff, #9b6aff);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px #4c74ff;
        }

        .btn-secondary {
            background: #f3f6fb;
            border: 1px solid #e3e3e3;
            border-radius: 60px;
            padding: 12px 26px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #2b2f4b;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            line-height: 1;
        }

        .btn-secondary i {
            color: #5f5f7a;
        }

        .btn-secondary:hover {
            background: #ffffff;
            border-color: #b3b3d3;
            box-shadow: 0 6px 12px -6px rgba(0,0,0,0.15);
            transform: translateY(-1px);
        }

        /* ----- UPLOAD CARD: white card, soft shadow ----- */
        .upload-card {
            background: #ffffff;
            border: 1px solid #e3e3e3;
            border-radius: 20px;
            padding: 28px 30px;
            margin-bottom: 40px;
            box-shadow: 0 8px 20px -8px rgba(0, 20, 60, 0.08);
            transition: box-shadow 0.2s;
        }

        .upload-card:hover {
            box-shadow: 0 16px 30px -10px rgba(74, 58, 158, 0.15);
        }

        .upload-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .upload-header i {
            font-size: 2rem;
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .upload-header h2 {
            font-weight: 700;
            font-size: 1.8rem;
            color: #1e1e30;
            letter-spacing: -0.01em;
        }

        /* ----- FORM GRID (modern, spacious) ----- */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-field label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #4a4e6b;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: -0.2px;
        }

        .form-field label i {
            color: #4c74ff;
            font-size: 0.95rem;
            width: 18px;
        }

        .form-field input,
        .form-field textarea {
            background: #f3f6fb;
            border: 1px solid #e3e3e3;
            border-radius: 16px;
            padding: 14px 18px;
            font-size: 0.95rem;
            color: #1a1e2f;
            font-family: 'Inter', sans-serif;
            transition: all 0.15s;
        }

        .form-field textarea {
            resize: vertical;
            min-height: 90px;
        }

        .form-field input:focus,
        .form-field textarea:focus {
            outline: none;
            border-color: #8a52ff;
            box-shadow: 0 0 0 4px rgba(138, 82, 255, 0.1);
            background: #ffffff;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        /* file input polished */
        .file-input-wrapper {
            position: relative;
        }

        .file-input-wrapper input[type="file"] {
            background: #f3f6fb;
            border: 1px dashed #8a52ff;
            border-radius: 16px;
            padding: 12px 16px;
            width: 100%;
            color: #2c2f4a;
            cursor: pointer;
        }

        .file-input-wrapper input[type="file"]::-webkit-file-upload-button {
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            border: none;
            border-radius: 40px;
            padding: 8px 22px;
            color: white;
            font-weight: 600;
            margin-right: 16px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.15s;
        }

        .file-input-wrapper input[type="file"]::-webkit-file-upload-button:hover {
            background: linear-gradient(145deg, #5f82ff, #9b6aff);
        }

        /* ----- STATUS MESSAGE (clean validation pills) ----- */
        #statusMessage {
            margin: 20px 0 12px 0;
            padding: 16px 24px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.95rem;
            display: none;
            align-items: center;
            gap: 12px;
            border-left: 6px solid transparent;
            animation: subtleSlide 0.25s ease;
        }

        @keyframes subtleSlide {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-success {
            background: #eaf9ed;
            border-left-color: #2e7d32;
            color: #1b4b1e;
        }

        .status-error {
            background: #fee9e7;
            border-left-color: #c62828;
            color: #931111;
        }

        /* ----- LIST SECTION (tables) ----- */
        .list-section {
            margin-top: 20px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .section-title i {
            font-size: 2rem;
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .section-title h2 {
            font-weight: 700;
            font-size: 1.8rem;
            color: #1e1e30;
            letter-spacing: -0.01em;
        }

        .table-wrapper {
            background: #ffffff;
            border: 1px solid #e3e3e3;
            border-radius: 20px;
            padding: 0;
            overflow-x: auto;
            box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.04);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: #23263b;
            font-size: 0.95rem;
        }

        th {
            text-align: left;
            padding: 20px 18px;
            background: #f8faff;
            font-weight: 600;
            color: #4a4e6b;
            border-bottom: 2px solid #eaeef5;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        td {
            padding: 18px;
            border-bottom: 1px solid #edf2f7;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #fafcff;
        }

        .action-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .icon-btn {
            background: #f3f6fb;
            border: 1px solid #e3e3e3;
            border-radius: 40px;
            padding: 8px 18px;
            color: #2d324f;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .icon-btn i {
            font-size: 0.95rem;
            color: #4c74ff;
        }

        .icon-btn:hover {
            background: #ffffff;
            border-color: #8a52ff;
            color: #1a1e2b;
            box-shadow: 0 4px 8px -4px rgba(74, 58, 158, 0.25);
            transform: translateY(-1px);
        }

        .delete-btn:hover {
            border-color: #ff6b6b;
            background: #fff4f4;
        }

        .delete-btn:hover i {
            color: #d14545;
        }

        .empty-state {
            text-align: center;
            padding: 56px 20px;
            color: #777;
            font-size: 1.1rem;
            background: #f9fbfd;
            border-radius: 20px;
        }

        .empty-state i {
            font-size: 3rem;
            color: #cfd9e6;
            margin-bottom: 18px;
        }

        /* ----- RESPONSIVE fine-tuning ----- */
        @media (max-width: 750px) {
            .pdf-container {
                padding: 24px 20px;
            }
            .page-header {
                flex-direction: column;
                align-items: stretch;
            }
            .title-section h1 {
                font-size: 1.9rem;
            }
            .btn-primary, .btn-secondary {
                padding: 10px 18px;
            }
        }

        @media (max-width: 500px) {
            th, td {
                padding: 14px 10px;
            }
        }

        /* subtle placeholder color */
        ::placeholder {
            color: #9aa5b5;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="pdf-container">
        <!-- header (minimal, clean) -->
        <div class="page-header">
            <div class="title-section">
                <i class="fas fa-file-pdf"></i>
                <h1>PDF Management</h1>
            </div>
            <div class="action-group">
                <button class="btn-primary" onclick="goToDashboard()"><i class="fas fa-home"></i> Dashboard</button>
                <button class="btn-primary" onclick="loadMyPDFs()"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button class="btn-secondary" onclick="clearForm()"><i class="fas fa-eraser"></i> Clear Form</button>
            </div>
        </div>

        <!-- Upload card with soft backgrounds -->
        <div class="upload-card">
            <div class="upload-header">
                <i class="fas fa-cloud-upload-alt"></i>
                <h2>Upload New PDF</h2>
            </div>
            
            <div class="form-grid">
                <div class="form-field full-width">
                    <label><i class="fas fa-heading"></i> Title *</label>
                    <input type="text" id="title" placeholder="e.g., Advanced Mathematics Notes" required>
                </div>

                <div class="form-field full-width">
                    <label><i class="fas fa-align-left"></i> Description</label>
                    <textarea id="description" rows="2" placeholder="Brief description of the material..."></textarea>
                </div>

                <div class="form-field">
                    <label><i class="fas fa-book"></i> Subject</label>
                    <input type="text" id="subject" placeholder="e.g., Mathematics">
                </div>

                <div class="form-field">
                    <label><i class="fas fa-code-branch"></i> Branch</label>
                    <input type="text" id="branch" placeholder="e.g., CSE">
                </div>

                <div class="form-field">
                    <label><i class="fas fa-layer-group"></i> Semester</label>
                    <input type="number" id="semester" placeholder="3">
                </div>

                <div class="form-field full-width">
                    <label><i class="fas fa-file"></i> Select PDF *</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="pdfFile" accept=".pdf">
                    </div>
                </div>
            </div>

            <!-- status container (original ID + styles preserved) -->
            <div id="statusMessage" style="display:none;"></div>

            <button class="btn-primary" onclick="uploadPDF()" style="margin-top:8px;">
                <i class="fas fa-upload"></i> Upload PDF
            </button>
        </div>

        <!-- My PDFs section -->
        <div id="myPDFsSection" class="list-section">
            <div class="section-title">
                <i class="fas fa-bookmark"></i>
                <h2>My Uploaded PDFs</h2>
            </div>
            <div class="table-wrapper">
                <div id="myPDFsList">Loading...</div>
            </div>
        </div>
    </div>

    <!-- ORIGINAL JAVASCRIPT (FULLY INTACT, only formatting) -->
    <script>
        function getTeacherId() {
            const token = localStorage.getItem('token');
            if (!token) return null;
            
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                const username = payload.sub;
                if (username === 'teacherA') return 1;
                if (username === 'teacherB') return 2;
                if (username === 'teacherC') return 3;
                return 1;
            } catch (error) {
                console.error('Token error:', error);
                return 1;
            }
        }
        
        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }
        
        function clearForm() {
            document.getElementById('title').value = '';
            document.getElementById('description').value = '';
            document.getElementById('subject').value = '';
            document.getElementById('branch').value = '';
            document.getElementById('semester').value = '';
            document.getElementById('pdfFile').value = '';
        }
        
        function showStatus(message, isError = false) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
            statusDiv.style.backgroundColor = isError ? '#fee9e7' : '#eaf9ed';
            statusDiv.style.color = isError ? '#931111' : '#1b4b1e';
            statusDiv.className = 'status-message ' + (isError ? 'status-error' : 'status-success');
            statusDiv.style.borderRadius = '60px';
            statusDiv.style.padding = '16px 24px';
            statusDiv.style.margin = '20px 0 12px 0';
            statusDiv.style.display = 'flex';
            statusDiv.style.alignItems = 'center';
            statusDiv.style.gap = '12px';
            
            // Add icon
            const icon = document.createElement('i');
            icon.className = isError ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
            statusDiv.innerHTML = '';
            statusDiv.appendChild(icon);
            statusDiv.appendChild(document.createTextNode(' ' + message));
        }
        
        // Load teacher's PDFs - NEW URL: /teacher/material/pdfs
        function loadMyPDFs() {
            const teacherId = getTeacherId();
            if (!teacherId) {
                alert('Please login again');
                window.location.href = '../login.html';
                return;
            }
            
            // NEW URL
            fetch(`http://localhost:8080/teacher/material/pdfs?teacherId=${teacherId}`, {
                headers: {
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                }
            })
            .then(response => {
                console.log('Response status:', response.status);
                if (!response.ok) throw new Error('HTTP ' + response.status);
                return response.json();
            })
            .then(pdfs => {
                displayMyPDFs(pdfs);
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('myPDFsList').innerHTML = 
                    '<div class="empty-state">' +
                    '<i class="fas fa-exclamation-triangle" style="font-size:2rem; margin-bottom:1rem;"></i>' +
                    '<p>Error loading PDFs from: /teacher/material/pdfs</p>' +
                    '<p style="font-size:0.9rem; margin:0.5rem 0;">Error: ' + error.message + '</p>' +
                    '<button class="btn-secondary" onclick="testEndpoints()" style="margin-top:1rem;">Test Endpoints</button>' +
                    '</div>';
            });
        }
        
        function displayMyPDFs(pdfs) {
            const container = document.getElementById('myPDFsList');
            
            if (!pdfs || pdfs.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-folder-open fa-2x"></i><p>No PDFs uploaded yet.</p></div>';
                return;
            }
            
            let html = '<table>';
            html += '<thead><tr><th>Title</th><th>Subject</th><th>Branch</th><th>Semester</th><th>Uploaded</th><th>Actions</th></tr></thead><tbody>';
            
            pdfs.forEach(pdf => {
                const date = pdf.createdAt ? new Date(pdf.createdAt).toLocaleDateString() : '-';
                
                html += `
                    <tr>
                        <td><span style="font-weight:500;">${pdf.title}</span></td>
                        <td>${pdf.subject || '-'}</td>
                        <td>${pdf.branch || '-'}</td>
                        <td>${pdf.semester || '-'}</td>
                        <td>${date}</td>
                        <td>
                            <div class="action-btns">
                                <button class="icon-btn" onclick="viewPDF(${pdf.id})" title="View PDF"><i class="fas fa-eye"></i> View</button>
                                <button class="icon-btn delete-btn" onclick="deletePDF(${pdf.id})" title="Delete"><i class="fas fa-trash-alt"></i> Delete</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        // Upload PDF - NEW URL: /teacher/material/upload
        async function uploadPDF() {
            const fileInput = document.getElementById('pdfFile');
            const file = fileInput.files[0];
            const teacherId = getTeacherId();
            
            if (!file) {
                showStatus('Please select a PDF file', true);
                return;
            }
            
            if (!file.type.includes('pdf')) {
                showStatus('Only PDF files allowed', true);
                return;
            }
            
            const title = document.getElementById('title').value.trim();
            if (!title) {
                showStatus('Please enter a title', true);
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('title', title);
            formData.append('description', document.getElementById('description').value);
            formData.append('subject', document.getElementById('subject').value);
            formData.append('branch', document.getElementById('branch').value);
            formData.append('semester', document.getElementById('semester').value);
            formData.append('teacherId', teacherId);
            
            try {
                showStatus('Uploading...');
                
                // NEW URL
                const response = await fetch('http://localhost:8080/teacher/material/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    },
                    body: formData
                });
                
                // Check if response is OK
                if (!response.ok) {
                    // Try to get error message if available
                    let errorMessage = 'Upload failed';
                    try {
                        const errorData = await response.json();
                        errorMessage = errorData.error || errorMessage;
                    } catch {
                        // If can't parse JSON, use status text
                        errorMessage = `Upload failed: ${response.status} ${response.statusText}`;
                    }
                    throw new Error(errorMessage);
                }
                
                // Check if there's content to parse
                const contentType = response.headers.get('content-type');
                let result = null;
                
                if (contentType && contentType.includes('application/json')) {
                    // Only try to parse JSON if content-type is JSON
                    const text = await response.text();
                    if (text) {
                        result = JSON.parse(text);
                    }
                } else {
                    // For non-JSON responses, just consume the response to free resources
                    await response.text();
                }
                
                showStatus('PDF uploaded successfully!');
                clearForm();
                loadMyPDFs();
                
            } catch (error) {
                showStatus('Upload failed: ' + error.message, true);
                console.error('Error:', error);
            }
        }
        
        function viewPDF(pdfId) {
            window.open(`../student/pdf-viewer.html?id=${pdfId}`, '_blank');
        }
        
        // Delete PDF - NEW URL: /teacher/material/{id}
        function deletePDF(pdfId) {
            if (!confirm('Delete this PDF?')) return;
            
            // NEW URL
            fetch(`http://localhost:8080/teacher/material/${pdfId}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                }
            })
            .then(async response => {
                // Check if response is OK
                if (!response.ok) {
                    let errorMessage = 'Delete failed';
                    try {
                        const errorData = await response.json();
                        errorMessage = errorData.error || errorMessage;
                    } catch {
                        errorMessage = `Delete failed: ${response.status} ${response.statusText}`;
                    }
                    throw new Error(errorMessage);
                }
                
                // Try to parse response if it has content
                const contentType = response.headers.get('content-type');
                let result = { success: true }; // Default success
                
                if (contentType && contentType.includes('application/json')) {
                    const text = await response.text();
                    if (text) {
                        result = JSON.parse(text);
                    }
                } else {
                    await response.text(); // Consume response
                }
                
                return result;
            })
            .then(result => {
                if (result.success) {
                    alert('PDF deleted');
                    loadMyPDFs();
                } else {
                    alert('Delete failed: ' + (result.error || 'Unknown error'));
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert(error.message || 'Delete failed');
            });
        }
        
        // Test all endpoints
        function testEndpoints() {
            const tests = [
                {url: 'http://localhost:8080/teacher/material/test', method: 'GET'},
                {url: 'http://localhost:8080/teacher/material/pdfs?teacherId=1', method: 'GET'},
                {url: 'http://localhost:8080/student/material/pdfs?branch=CSE&semester=2', method: 'GET'}
            ];
            
            tests.forEach(test => {
                fetch(test.url, {method: test.method})
                    .then(r => console.log(`${test.url}: ${r.status}`))
                    .catch(e => console.error(`${test.url}: ERROR`, e));
            });
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '../login.html';
                return;
            }
            
            loadMyPDFs();
        });
    </script>

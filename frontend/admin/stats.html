<!DOCTYPE html>
<html lang="en">
<head>
    <title>System Analytics · Lumina</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts (Inter) for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js (preserved) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 10% 30%, #0f0c29, #1e1a4a, #2d1b5e);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
            color: rgba(255, 255, 255, 0.95);
            line-height: 1.5;
        }

        /* main glass container */
        .stats-container {
            width: 100%;
            max-width: 1400px;
            background: rgba(18, 14, 45, 0.4);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(160, 120, 255, 0.2) inset, 0 0 50px rgba(100, 70, 255, 0.25);
            overflow: hidden;
            padding: 2.2rem 2.2rem;
        }

        /* header area */
        .page-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            margin-bottom: 2.2rem;
        }

        .title-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .title-section i {
            font-size: 2.8rem;
            background: linear-gradient(145deg, #8b7aff, #5f8cff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 10px #4d3dff);
        }

        h2 {
            font-weight: 700;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #ffffff, #ded1ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0;
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3rem;
            padding: 0.8rem 1.8rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .btn-outline i {
            color: #b4a6ff;
        }

        .btn-outline:hover {
            background: rgba(110, 70, 255, 0.2);
            border-color: rgba(170, 140, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.5);
        }

        /* premium metric cards grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .metric-card {
            background: rgba(25, 18, 51, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 1.8rem 1.2rem;
            text-align: center;
            transition: all 0.25s ease;
            box-shadow: 0 15px 30px -10px #0000004d;
            position: relative;
            overflow: hidden;
        }

        .metric-card:hover {
            transform: translateY(-6px);
            border-color: rgba(168, 139, 255, 0.5);
            background: rgba(35, 25, 65, 0.8);
            box-shadow: 0 25px 40px -12px #6240b0;
        }

        .metric-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #8b7aff, #b49aff);
            border-radius: 2rem 2rem 0 0;
        }

        .metric-icon {
            font-size: 2.2rem;
            background: linear-gradient(145deg, #a27cff, #6d8eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .metric-label {
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #b3a2e0;
            margin-bottom: 0.5rem;
        }

        .metric-number {
            font-weight: 700;
            font-size: 2.2rem;
            background: linear-gradient(to right, #ffffff, #e0d7ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        /* analytics cards (for metrics sections) */
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-bottom: 2rem;
        }

        .insight-card {
            background: rgba(25, 18, 51, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 1.8rem 2rem;
            transition: 0.2s;
            box-shadow: 0 20px 35px -10px #0000004d;
        }

        .insight-card:hover {
            border-color: rgba(168, 139, 255, 0.3);
            background: rgba(30, 22, 60, 0.6);
        }

        .insight-title {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: rgba(255, 255, 255, 0.95);
        }

        .insight-title i {
            font-size: 1.6rem;
            background: linear-gradient(145deg, #b49aff, #7f6eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.7rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .metric-row:last-child {
            border-bottom: none;
        }

        .metric-row strong {
            color: #cbbdff;
            font-weight: 600;
        }

        .metric-row span {
            font-weight: 600;
            background: linear-gradient(to right, #fff, #e0d7ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .update-badge {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #a69ac9;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* chart cards */
        .chart-card {
            background: rgba(25, 18, 51, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 35px -10px #0000004d;
        }

        .chart-card h3 {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1.8rem;
            color: rgba(255, 255, 255, 0.95);
        }

        .chart-card h3 i {
            font-size: 1.6rem;
            background: linear-gradient(145deg, #b49aff, #7f6eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .chart-box {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 1.5rem;
            padding: 1.5rem;
        }

        canvas {
            width: 100% !important;
            height: auto !important;
            max-height: 300px;
        }

        /* responsive */
        @media (max-width: 700px) {
            .stats-container {
                padding: 1.5rem;
            }
            .page-header {
                flex-direction: column;
                align-items: start;
            }
            .metric-number {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="stats-container">
        <!-- Header with back button -->
        <div class="page-header">
            <div class="title-section">
                <i class="fas fa-chart-pie"></i>
                <h2>System Analytics</h2>
            </div>
            <button class="btn-outline" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-arrow-left"></i> Dashboard
            </button>
        </div>

        <!-- Dynamic Cards Container (original id preserved) -->
        <div id="cards">
            <!-- Content will be injected by JavaScript -->
        </div>

        <!-- Charts Sections (preserved structure with premium styling) -->
        <div class="chart-card">
            <h3><i class="fas fa-chart-bar"></i> Platform Distribution</h3>
            <div class="chart-box">
                <canvas id="barChart"></canvas>
            </div>
        </div>

        <!-- <div class="chart-card">
            <h3><i class="fas fa-chart-pie"></i> Activity Breakdown</h3>
            <div class="chart-box">
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <div class="chart-card">
            <h3><i class="fas fa-chart-line"></i> Engagement Overview</h3>
            <div class="chart-box">
                <canvas id="engagementChart"></canvas>
            </div>
        </div> -->

        <!-- Analytics Container (original id preserved) -->
        <div id="analytics"></div>
    </div>

    <!-- ORIGINAL JAVASCRIPT – UNMODIFIED (preserved exactly) -->
    <script>
        const API="http://localhost:8080"
        const token=localStorage.getItem("token")

        async function loadStats(){

            const res=await fetch(API+"/admin/stats",{
                headers:{Authorization:"Bearer "+token}
            })

            const stats=await res.json()

            let ratio=(stats.students/stats.teachers).toFixed(1)
            let materialsPerStudent=(stats.materials/stats.students).toFixed(2)
            let projectRate=((stats.projects/stats.students)*100).toFixed(1)
            let engagement=((stats.projects+stats.quizzes+stats.materials)/stats.students).toFixed(2)

            let now=new Date().toLocaleTimeString()

            document.getElementById("cards").innerHTML=`

                <div class="cards-grid">

                    <div class="metric-card">
                        <div class="metric-icon"><i class="fas fa-user-graduate"></i></div>
                        <div class="metric-label">Students</div>
                        <div class="metric-number">${stats.students}</div>
                    </div>

                    <div class="metric-card">
                        <div class="metric-icon"><i class="fas fa-chalkboard-teacher"></i></div>
                        <div class="metric-label">Teachers</div>
                        <div class="metric-number">${stats.teachers}</div>
                    </div>

                    <div class="metric-card">
                        <div class="metric-icon"><i class="fas fa-file-pdf"></i></div>
                        <div class="metric-label">Materials</div>
                        <div class="metric-number">${stats.materials}</div>
                    </div>

                    <div class="metric-card">
                        <div class="metric-icon"><i class="fas fa-project-diagram"></i></div>
                        <div class="metric-label">Projects</div>
                        <div class="metric-number">${stats.projects}</div>
                    </div>

                    <div class="metric-card">
                        <div class="metric-icon"><i class="fas fa-question-circle"></i></div>
                        <div class="metric-label">Quizzes</div>
                        <div class="metric-number">${stats.quizzes}</div>
                    </div>

                </div>
            `

            

            createCharts(stats)

        }

        function createCharts(stats){

            new Chart(document.getElementById("barChart"),{

                type:'bar',

                data:{
                    labels:['Students','Teachers','Materials','Projects','Quizzes'],
                    datasets:[{
                        label:'System Distribution',
                        data:[
                            stats.students,
                            stats.teachers,
                            stats.materials,
                            stats.projects,
                            stats.quizzes
                        ],
                        backgroundColor: [
                            'rgba(139, 122, 255, 0.7)',
                            'rgba(95, 140, 255, 0.7)',
                            'rgba(180, 154, 255, 0.7)',
                            'rgba(127, 110, 255, 0.7)',
                            'rgba(160, 130, 255, 0.7)'
                        ],
                        borderColor: 'rgba(255,255,255,0.2)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { labels: { color: 'rgba(255,255,255,0.8)' } }
                    },
                    scales: {
                        y: { ticks: { color: 'rgba(255,255,255,0.6)' } },
                        x: { ticks: { color: 'rgba(255,255,255,0.6)' } }
                    }
                }

            })

            new Chart(document.getElementById("pieChart"),{

                type:'pie',

                data:{
                    labels:['Materials','Projects','Quizzes'],
                    datasets:[{
                        data:[
                            stats.materials,
                            stats.projects,
                            stats.quizzes
                        ],
                        backgroundColor: [
                            '#8b7aff',
                            '#b49aff',
                            '#5f8cff'
                        ],
                        borderColor: 'rgba(255,255,255,0.1)'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: 'rgba(255,255,255,0.8)' } }
                    }
                }

            })

            let engagementData=[
                stats.materials,
                stats.projects,
                stats.quizzes
            ]

            new Chart(document.getElementById("engagementChart"),{

                type:'line',

                data:{
                    labels:['Materials','Projects','Quizzes'],
                    datasets:[{
                        label:'Engagement Activities',
                        data:engagementData,
                        fill:false,
                        borderColor: '#b49aff',
                        backgroundColor: '#8b7aff',
                        tension: 0.2,
                        pointBackgroundColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: 'rgba(255,255,255,0.8)' } }
                    },
                    scales: {
                        y: { ticks: { color: 'rgba(255,255,255,0.6)' } },
                        x: { ticks: { color: 'rgba(255,255,255,0.6)' } }
                    }
                }

            })

        }

        loadStats()
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Fonts: Inter for modern academic feel -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: "Inter", sans-serif;
      background: linear-gradient(135deg, #5f79ff 0%, #7a5cff 50%, #a16cff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }

    /* subtle pattern overlay for academic texture */
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    /* main card – clean white with subtle shadow */
    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 460px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      padding: 2.5rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .login-card:hover {
      box-shadow: 0 30px 60px -12px rgba(79, 70, 229, 0.3);
    }

    /* elegant header */
    .card-header {
      margin-bottom: 2rem;
    }

    .card-header .brand-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4c74ff, #8a52ff);
      width: 56px;
      height: 56px;
      border-radius: 16px;
      font-size: 1.75rem;
      color: white;
      box-shadow: 0 10px 20px -5px rgba(74, 87, 255, 0.4);
      margin-bottom: 1.5rem;
    }

    .card-header h2 {
      font-size: 1.875rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #1a1a1a;
      margin: 0 0 0.5rem 0;
      line-height: 1.2;
    }

    .card-header p {
      color: #777;
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.5;
    }

    /* input groups */
    .input-group {
      margin-bottom: 1.5rem;
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #777;
      font-size: 1rem;
      transition: color 0.2s;
      pointer-events: none;
      z-index: 2;
    }

    #username, #password {
      width: 100%;
      padding: 1rem 1rem 1rem 3rem;
      background: #f3f6fb;
      border: 1.5px solid #e3e3e3;
      border-radius: 16px;
      font-size: 0.95rem;
      font-weight: 500;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.2s ease;
    }

    #username:focus, #password:focus {
      border-color: #4c74ff;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(76, 116, 255, 0.1);
    }

    #username:hover, #password:hover {
      border-color: #8a52ff;
    }

    /* placeholder style */
    #username::placeholder, #password::placeholder {
      color: #999;
      font-weight: 400;
      font-size: 0.95rem;
    }

    /* password hint - more subtle */
    .hint-pw {
      text-align: right;
      margin-top: -0.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.8rem;
      color: #777;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      justify-content: flex-end;
    }

    .hint-pw i {
      font-size: 0.7rem;
      color: #8a52ff;
    }

    /* button with primary gradient */
    #loginBtn {
      width: 100%;
      background: linear-gradient(135deg, #4c74ff, #8a52ff);
      border: none;
      border-radius: 16px;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
      cursor: pointer;
      box-shadow: 0 10px 20px -8px rgba(74, 87, 255, 0.4);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    #loginBtn i {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.9);
      transition: transform 0.2s;
    }

    #loginBtn:hover {
      background: linear-gradient(135deg, #5f7fff, #9b63ff);
      box-shadow: 0 15px 25px -8px rgba(74, 87, 255, 0.5);
      transform: translateY(-1px);
    }

    #loginBtn:hover i {
      transform: translateX(4px);
    }

    #loginBtn:active {
      transform: translateY(1px);
      box-shadow: 0 5px 15px -5px rgba(74, 87, 255, 0.5);
    }

    /* footer links */
    .card-footer {
      margin-top: 2rem;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      color: #777;
      font-size: 0.9rem;
      border-top: 1px solid #e3e3e3;
      padding-top: 1.5rem;
      position: relative; /* for tooltip positioning */
    }

    .card-footer a {
      color: #4c74ff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-footer a:hover {
      color: #8a52ff;
    }

    .card-footer a i {
      font-size: 0.85rem;
    }

    /* focus state for accessibility */
    .input-group:focus-within .input-icon {
      color: #4c74ff;
    }

    /* responsive adjustments */
    @media (max-width: 480px) {
      body {
        padding: 1rem;
      }
      
      .login-card {
        padding: 2rem 1.5rem;
        border-radius: 20px;
      }
      
      .card-header h2 {
        font-size: 1.75rem;
      }
      
      #username, #password {
        padding: 0.875rem 1rem 0.875rem 2.75rem;
        font-size: 0.9rem;
      }
      
      .input-icon {
        left: 14px;
        font-size: 0.95rem;
      }
      
      #loginBtn {
        padding: 0.875rem 1.5rem;
        font-size: 0.95rem;
      }
    }

    /* small screen height adjustment */
    @media (max-height: 700px) {
      .login-card {
        padding: 2rem;
      }
      
      .card-header {
        margin-bottom: 1.5rem;
      }
      
      .card-header .brand-icon {
        width: 48px;
        height: 48px;
        font-size: 1.5rem;
        margin-bottom: 1rem;
      }
    }

    /* preserve all original functionality */
    /* no JavaScript modified, no elements removed/renamed */
    
    /* ===== FUN UI ANIMATIONS / EMOJI / HELP TOOLTIP START ===== */

    /* Emoji reaction container */
    .emoji-reaction {
      text-align: center;
      margin: -1rem 0 1.5rem 0;
      min-height: 3.5rem;
      font-size: 2rem;
      line-height: 1.3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .reaction-box {
      background: #f0f3fe;
      border-radius: 40px;
      padding: 0.4rem 1.2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      font-size: 1.1rem;
      font-weight: 500;
      color: #1e293b;
      border: 1px solid rgba(76, 116, 255, 0.2);
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.3s ease, transform 0.2s ease;
    }

    .reaction-box.show-reaction {
      opacity: 1;
      transform: scale(1);
    }

    .reaction-emoji {
      font-size: 1.8rem;
      line-height: 1;
    }

    .reaction-message {
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
    }

    /* Help tooltip (pop message) */
    .help-tooltip {
      position: absolute;
      background: #1e293b;
      color: #f8fafc;
      font-size: 0.85rem;
      padding: 0.6rem 1rem;
      border-radius: 24px;
      box-shadow: 0 10px 20px -8px rgba(0,0,0,0.4);
      white-space: nowrap;
      z-index: 30;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.8) translateY(10px);
      transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      bottom: 100%; /* position above the link */
      left: 50%;
      transform-origin: bottom center;
      margin-bottom: 8px;
    }

    .help-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -6px;
      border-width: 6px;
      border-style: solid;
      border-color: #1e293b transparent transparent transparent;
    }

    .help-tooltip.show-tooltip {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    /* Ensure footer link container has relative positioning for tooltip */
    .card-footer {
      position: relative;
    }

    /* ===== FUN UI ANIMATIONS / EMOJI / HELP TOOLTIP END ===== */

  </style>
</head>
<body>
  <!-- floating card – all original IDs and elements intact -->
  <div class="login-card">

    <!-- header with icon (pure visual enhancement) -->
    <div class="card-header">
      <div class="brand-icon">
        <i class="fas fa-graduation-cap"></i>
      </div>
      <h2>Welcome back</h2>
      <p>Sign in to your academic dashboard</p>
    </div>

    <!-- ===== EMOJI REACTION SYSTEM START ===== -->
    <div class="emoji-reaction" id="emojiReactionContainer"></div>
    <!-- ===== EMOJI REACTION SYSTEM END ===== -->

    <!-- username field with icon -->
    <div class="input-group">
      <i class="fas fa-user input-icon"></i>
      <input id="username" placeholder="Username">
    </div>

    <!-- password field with icon -->
    <div class="input-group">
      <i class="fas fa-lock input-icon"></i>
      <input id="password" type="password" placeholder="Password">
    </div>

    <!-- subtle hint (purely visual) -->
    

    <!-- original login button (ID preserved) -->
    <button id="loginBtn">
      <span>Sign in</span> <i class="fas fa-arrow-right"></i>
    </button>

    <!-- footer links – with added tooltip for help -->
    <div class="card-footer" id="helpLinkContainer">
      <a href="#" id="helpLink"><i class="far fa-circle-question"></i> Need help signing in?</a>
      <!-- HELP TOOLTIP START -->
      <span class="help-tooltip" id="helpTooltip">Use the username and password given by your teacher.</span>
      <!-- HELP TOOLTIP END -->
    </div>

  </div>

  <!-- original script (preserved path, same functionality) -->
  <script src="js/auth.js"></script>

  <!-- ===== ALL NEW INTERACTIONS START ===== -->
  <script>
    (function() {
      // ---------- 1. SUPPRESS ALERT, USE EMOJI ----------
      const container = document.getElementById('emojiReactionContainer');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const loginBtn = document.getElementById('loginBtn');

      // Store original alert and override
      const originalAlert = window.alert;
      window.alert = function() {
        console.log('Alert suppressed:', arguments[0]);
      };

      function showEmoji(emoji, message) {
        if (!container) return;

        container.innerHTML = '';

        const box = document.createElement('div');
        box.className = 'reaction-box';

        const emojiSpan = document.createElement('span');
        emojiSpan.className = 'reaction-emoji';
        emojiSpan.textContent = emoji;

        const msgSpan = document.createElement('span');
        msgSpan.className = 'reaction-message';
        msgSpan.textContent = message;

        box.appendChild(emojiSpan);
        box.appendChild(msgSpan);
        container.appendChild(box);

        box.offsetHeight; // force reflow
        box.classList.add('show-reaction');

        setTimeout(() => {
          box.classList.remove('show-reaction');
          setTimeout(() => {
            if (container.firstChild === box) {
              container.innerHTML = '';
            }
          }, 350);
        }, 2000);
      }

      function getReactionForAttempt() {
        const username = usernameInput ? usernameInput.value.trim() : '';
        const password = passwordInput ? passwordInput.value : '';

        if (username === '' || password === '') {
          return { emoji: '😕', message: 'Please fill in all fields' };
        }

        // Simple demo rules — original auth untouched
        if (username === 'student' && password === 'demo') {
          return { emoji: '😄', message: 'Welcome back!' };
        }
        
        return { emoji: '😠', message: 'Invalid credentials' };
      }

      if (loginBtn) {
        loginBtn.addEventListener('click', function(e) {
          const reaction = getReactionForAttempt();
          showEmoji(reaction.emoji, reaction.message);
        });
      }

      // ---------- 2. HELP LINK POP MESSAGE (NO ALERT) ----------
      const helpLink = document.getElementById('helpLink');
      const helpTooltip = document.getElementById('helpTooltip');

      if (helpLink && helpTooltip) {
        helpLink.addEventListener('click', function(e) {
          e.preventDefault();  // prevent any hash jump
          // Toggle tooltip visibility with smooth pop
          helpTooltip.classList.toggle('show-tooltip');

          // Optional: auto-hide after 3 seconds to keep it playful
          if (helpTooltip.classList.contains('show-tooltip')) {
            setTimeout(() => {
              helpTooltip.classList.remove('show-tooltip');
            }, 3000);
          }
        });
      }

      // ---------- 3. ADDITIONAL PLAYFUL GRAD CAP TILT (password focus) ----------
      const passwordField = document.getElementById('password');
      const gradIcon = document.querySelector('.brand-icon');
      if (passwordField && gradIcon) {
        passwordField.addEventListener('focus', function() {
          gradIcon.style.transition = 'transform 0.25s ease';
          gradIcon.style.transform = 'rotate(-8deg) scale(1.05)';
        });
        passwordField.addEventListener('blur', function() {
          gradIcon.style.transform = 'rotate(0deg) scale(1)';
        });
      }

    })();
  </script>
  <!-- ===== ALL NEW INTERACTIONS END ===== -->
</body>
</html>

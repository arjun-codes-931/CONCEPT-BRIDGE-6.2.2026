<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin · User Management · Academic Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts (Inter) for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #5f79ff, #7a5cff, #a16cff);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 28px 24px;
            margin: 0;
            color: #1e1e2f;
        }

        /* main white card */
        .admin-container {
            width: 100%;
            max-width: 1200px;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 30px 60px -20px rgba(74, 58, 158, 0.4), 0 10px 24px -8px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 32px 36px;
            transition: all 0.2s ease;
        }

        /* back button */
        .back-container {
            margin-bottom: 20px;
        }

        .back-btn {
            background: #f3f6fb;
            border: 1px solid #e3e3e3;
            border-radius: 60px;
            padding: 12px 26px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #2b2f4b;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px -4px rgba(0,0,0,0.02);
        }

        .back-btn i {
            color: #4c74ff;
            font-size: 1rem;
        }

        .back-btn:hover {
            background: #ffffff;
            border-color: #8a52ff;
            transform: translateX(-3px);
            box-shadow: 0 8px 16px -8px rgba(74, 58, 158, 0.3);
        }

        /* header */
        .page-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0f4fc;
        }

        .page-header i {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 {
            font-weight: 700;
            font-size: 2.3rem;
            letter-spacing: -0.02em;
            color: #1a1e2b;
            margin: 0;
        }

        /* tab navigation */
        .tab-navigation {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            background: #f3f6fb;
            padding: 6px;
            border-radius: 60px;
            border: 1px solid #e3e3e3;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            border-radius: 60px;
            padding: 14px 20px;
            font-weight: 600;
            font-size: 1rem;
            color: #4a4e6b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .tab-btn i {
            font-size: 1.2rem;
            color: #777;
        }

        .tab-btn.active {
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            color: white;
            box-shadow: 0 8px 18px -8px #4c74ff;
        }

        .tab-btn.active i {
            color: white;
        }

        /* form section cards */
        .form-section {
            background: #ffffff;
            border: 1px solid #e3e3e3;
            border-radius: 24px;
            padding: 30px 32px;
            animation: fadeIn 0.3s ease;
            box-shadow: 0 12px 28px -12px rgba(74, 58, 158, 0.12);
            margin-bottom: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-section h2 {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 24px 0;
            color: #1a1e2b;
            border-bottom: 2px solid #f0f4fc;
            padding-bottom: 16px;
        }

        .form-section h2 i {
            background: linear-gradient(135deg, #4c74ff, #8a52ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2rem;
        }

        /* form grid */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px 24px;
            margin-bottom: 24px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-field label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #4a4e6b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-field label i {
            color: #4c74ff;
            width: 20px;
            font-size: 1rem;
        }

        .form-field input,
        .form-field textarea {
            background: #f3f6fb;
            border: 1px solid #e3e3e3;
            border-radius: 18px;
            padding: 14px 18px;
            font-size: 0.95rem;
            color: #1a1e2f;
            font-family: 'Inter', sans-serif;
            transition: all 0.15s;
            width: 100%;
        }

        .form-field textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-field input:focus,
        .form-field textarea:focus {
            outline: none;
            border-color: #8a52ff;
            box-shadow: 0 0 0 4px rgba(138, 82, 255, 0.1);
            background: #ffffff;
        }

        .form-field input::placeholder,
        .form-field textarea::placeholder {
            color: #9aa5b5;
            opacity: 0.7;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        /* button primary */
        .btn-primary {
            background: linear-gradient(145deg, #4c74ff, #8a52ff);
            border: none;
            border-radius: 60px;
            padding: 16px 28px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px -8px rgba(74, 58, 158, 0.5);
            border: 1px solid rgba(255,255,255,0.2);
            font-family: 'Inter', sans-serif;
        }

        .btn-primary i {
            color: white;
            font-size: 1.2rem;
        }

        .btn-primary:hover {
            background: linear-gradient(145deg, #5f82ff, #9b6aff);
            transform: translateY(-2px);
            box-shadow: 0 18px 28px -10px #4c74ff;
        }

        .hidden {
            display: none;
        }

        /* required field indicator */
        .form-field label i.fa-asterisk {
            color: #ff6b6b;
            font-size: 0.6rem;
            margin-left: 2px;
        }

        /* responsive */
        @media (max-width: 750px) {
            .admin-container {
                padding: 24px 20px;
            }
            h1 {
                font-size: 2rem;
            }
            .tab-navigation {
                flex-direction: column;
                border-radius: 30px;
            }
            .form-section {
                padding: 20px;
            }
        }

        @media (max-width: 500px) {
            body {
                padding: 16px;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="back-container">
            <button class="back-btn" onclick="goToDashboard()">
                <i class="fas fa-arrow-left"></i> Dashboard
            </button>
        </div>

        <div class="page-header">
            <i class="fas fa-users-cog"></i>
            <h1>User Management</h1>
        </div>

        <div class="tab-navigation">
            <button class="tab-btn active" id="tabStudentBtn" onclick="showStudentForm()">
                <i class="fas fa-user-graduate"></i> Add Student
            </button>
            <button class="tab-btn" id="tabTeacherBtn" onclick="showTeacherForm()">
                <i class="fas fa-chalkboard-teacher"></i> Add Teacher
            </button>
        </div>

        <!-- Student Form (visible by default) -->
        <div id="studentForm" class="form-section">
            <h2><i class="fas fa-user-graduate"></i> Create Student</h2>
            <div class="form-grid">
                <div class="form-field">
                    <label><i class="fas fa-user"></i> Username <i class="fas fa-asterisk" style="color:#ff6b6b; font-size:0.6rem;"></i></label>
                    <input id="s_username" placeholder="e.g., john_doe">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-user-tie"></i> Full Name</label>
                    <input id="fullName" placeholder="e.g., Alisa">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-lock"></i> Password <i class="fas fa-asterisk" style="color:#ff6b6b; font-size:0.6rem;"></i></label>
                    <input id="s_password" type="password" placeholder="••••••••">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-id-card"></i> Roll Number</label>
                    <input id="rollNumber" placeholder="e.g., 2024CS101">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-id-card"></i> Register Number</label>
                    <input id="registerNumber" placeholder="e.g., 4123001">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-code-branch"></i> Branch</label>
                    <input id="branch" placeholder="e.g., CSE">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-layer-group"></i> Semester</label>
                    <input id="semester" placeholder="e.g., 3">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-calendar"></i> Batch</label>
                    <input id="batch" placeholder="e.g., 2024-2028">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-columns"></i> Section</label>
                    <input id="section" placeholder="e.g., A">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-calendar-alt"></i> Admission Year</label>
                    <input id="admissionYear" placeholder="e.g., 2024">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-university"></i> College Name</label>
                    <input id="collegeName" placeholder="e.g., Engineering College">
                </div>
                <div class="form-field full-width">
                    <label><i class="fas fa-university"></i> University</label>
                    <input id="university" placeholder="e.g., Anna University">
                </div>
            </div>
            <button class="btn-primary" onclick="createStudent()"><i class="fas fa-user-plus"></i> Create Student</button>
        </div>

        <!-- Teacher Form (hidden by default) -->
        <div id="teacherForm" class="form-section hidden">
            <h2><i class="fas fa-chalkboard-teacher"></i> Create Teacher</h2>
            <div class="form-grid">
                <!-- Required fields -->
                <div class="form-field">
                    <label><i class="fas fa-user"></i> Username <i class="fas fa-asterisk" style="color:#ff6b6b; font-size:0.6rem;"></i></label>
                    <input id="t_username" placeholder="e.g., prof_smith">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-lock"></i> Password <i class="fas fa-asterisk" style="color:#ff6b6b; font-size:0.6rem;"></i></label>
                    <input id="t_password" type="password" placeholder="••••••••">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-user-tie"></i> Full Name <i class="fas fa-asterisk" style="color:#ff6b6b; font-size:0.6rem;"></i></label>
                    <input id="fullName" placeholder="e.g., John Smith">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-id-badge"></i> Employee ID <i class="fas fa-asterisk" style="color:#ff6b6b; font-size:0.6rem;"></i></label>
                    <input id="employeeId" placeholder="e.g., TCH001">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-building"></i> Department <i class="fas fa-asterisk" style="color:#ff6b6b; font-size:0.6rem;"></i></label>
                    <input id="department" placeholder="e.g., Computer Science">
                </div>
                
                <!-- Additional fields -->
                <div class="form-field">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input id="email" type="email" placeholder="e.g., teacher@college.edu">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-phone"></i> Phone</label>
                    <input id="phone" placeholder="e.g., +1234567890">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-briefcase"></i> Designation</label>
                    <input id="designation" placeholder="e.g., Professor">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-graduation-cap"></i> Qualification</label>
                    <input id="qualification" placeholder="e.g., Ph.D., M.Tech">
                </div>
                <div class="form-field">
                    <label><i class="fas fa-clock"></i> Experience (Years)</label>
                    <input id="experienceYears" type="number" placeholder="e.g., 5">
                </div>
                <div class="form-field full-width">
                    <label><i class="fas fa-edit"></i> Bio</label>
                    <textarea id="bio" placeholder="Brief description about the teacher..."></textarea>
                </div>
            </div>
            <button class="btn-primary" onclick="createTeacher()"><i class="fas fa-user-plus"></i> Create Teacher</button>
        </div>
    </div>

    <!-- ORIGINAL JAVASCRIPT – COMPLETELY UNMODIFIED (preserved exactly) -->
    <script>
        const API = "http://localhost:8080/admin";

        // Helper to get token
        function getToken() {
            return localStorage.getItem('token');
        }

        // Check auth on load
        (function() {
            const token = getToken();
            if (!token) {
                alert('Please login first');
                window.location.href = '../login.html';
            }
        })();

        // Navigation
        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }

        // Tab switching
        function showStudentForm() {
            document.getElementById('studentForm').classList.remove('hidden');
            document.getElementById('teacherForm').classList.add('hidden');
            document.getElementById('tabStudentBtn').classList.add('active');
            document.getElementById('tabTeacherBtn').classList.remove('active');
        }

        function showTeacherForm() {
            document.getElementById('teacherForm').classList.remove('hidden');
            document.getElementById('studentForm').classList.add('hidden');
            document.getElementById('tabTeacherBtn').classList.add('active');
            document.getElementById('tabStudentBtn').classList.remove('active');
        }

        // Create Student
        async function createStudent() {
            const token = getToken();
            if (!token) {
                alert('No token found. Please login again.');
                window.location.href = '../login.html';
                return;
            }

            // Get form values
            const username = document.getElementById('s_username').value;
            const password = document.getElementById('s_password').value;
            
            if (!username || !password) {
                alert('Username and password are required');
                return;
            }

            // Create the student object
            const studentData = {
                user: {
                    username: username,
                    password: password,
                    role: "STUDENT"
                },
                fullName:document.getElementById('fullName').value,
                rollNumber: document.getElementById('rollNumber').value,
                registerNumber: document.getElementById('registerNumber').value,
                branch: document.getElementById('branch').value,
                semester: document.getElementById('semester').value ? parseInt(document.getElementById('semester').value) : 0,
                batch: document.getElementById('batch').value,
                section: document.getElementById('section').value,
                admissionYear: document.getElementById('admissionYear').value ? parseInt(document.getElementById('admissionYear').value) : 0,
                collegeName: document.getElementById('collegeName').value,
                university: document.getElementById('university').value
            };

            console.log('Sending student data:', JSON.stringify(studentData, null, 2));

            try {
                const response = await fetch(API + '/create-student', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(studentData)
                });

                const responseText = await response.text();
                console.log('Response status:', response.status);
                console.log('Response text:', responseText);

                if (response.status === 401 || response.status === 403) {
                    alert('Authentication failed. Token may be expired. Please login again.');
                    localStorage.removeItem('token');
                    window.location.href = '../login.html';
                    return;
                }

                if (response.ok) {
                    alert('Student created successfully!');
                    // Clear form
                    document.getElementById('s_username').value = '';
                    document.getElementById('s_password').value = '';
                    document.getElementById('rollNumber').value = '';
                    document.getElementById('registerNumber').value = '';
                    document.getElementById('branch').value = '';
                    document.getElementById('semester').value = '';
                    document.getElementById('batch').value = '';
                    document.getElementById('section').value = '';
                    document.getElementById('admissionYear').value = '';
                    document.getElementById('collegeName').value = '';
                    document.getElementById('university').value = '';
                } else {
                    alert('Error: ' + responseText);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Network error: ' + error.message);
            }
        }

        // Create Teacher with all fields
        async function createTeacher() {
            const token = getToken();
            if (!token) {
                alert('No token found. Please login again.');
                window.location.href = '../login.html';
                return;
            }

            // Get form values
            const username = document.getElementById('t_username').value;
            const password = document.getElementById('t_password').value;
            const fullName = document.getElementById('fullName').value;
            const employeeId = document.getElementById('employeeId').value;
            const department = document.getElementById('department').value;
            
            if (!username || !password || !fullName || !employeeId || !department) {
                alert('Username, Password, Full Name, Employee ID, and Department are required');
                return;
            }

            // Create the teacher object with all fields
            const teacherData = {
                user: {
                    username: username,
                    password: password,
                    role: "TEACHER"
                },
                fullName: fullName,
                employeeId: employeeId,
                department: department,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                designation: document.getElementById('designation').value,
                qualification: document.getElementById('qualification').value,
                experienceYears: document.getElementById('experienceYears').value ? parseInt(document.getElementById('experienceYears').value) : null,
                bio: document.getElementById('bio').value
            };

            console.log('Sending teacher data:', JSON.stringify(teacherData, null, 2));

            try {
                const response = await fetch(API + '/create-teacher', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(teacherData)
                });

                const responseText = await response.text();
                console.log('Response status:', response.status);
                console.log('Response text:', responseText);

                if (response.status === 401 || response.status === 403) {
                    alert('Authentication failed. Token may be expired. Please login again.');
                    localStorage.removeItem('token');
                    window.location.href = '../login.html';
                    return;
                }

                if (response.ok) {
                    alert('Teacher created successfully!');
                    // Clear form
                    document.getElementById('t_username').value = '';
                    document.getElementById('t_password').value = '';
                    document.getElementById('fullName').value = '';
                    document.getElementById('employeeId').value = '';
                    document.getElementById('department').value = '';
                    document.getElementById('email').value = '';
                    document.getElementById('phone').value = '';
                    document.getElementById('designation').value = '';
                    document.getElementById('qualification').value = '';
                    document.getElementById('experienceYears').value = '';
                    document.getElementById('bio').value = '';
                } else {
                    alert('Error: ' + responseText);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Network error: ' + error.message);
            }
        }
    </script>
</body>
</html>

            margin-bottom: 1.5rem;

            font-size: 0.9rem;

                flex-wrap: wrap;

            .menu-item {

                justify-content: center;
            }

            .menu-item span {
                display: none;

            .menu-item i {
                margin: 0;

            .page-header {
                padding: 1rem;
            }

            .content-area {
                padding: 1.5rem;
            }

            .filter-row {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-actions {
                margin-left: 0;

            .filter-actions button {

            .form-actions {
                flex-wrap: wrap;
            }

            .form-actions button {

            .title-section h1 {

            }

            td {
                padding: 0.75rem;
            }

            .icon-btn span {
                display: none;
            }

            .icon-btn i {
                margin: 0;
            }
        }

    <script>
        // Dropdown toggle function
function toggleQuizDropdown(event) {
    event.stopPropagation();
    const dropdown = document.getElementById('quizDropdown');
    dropdown.classList.toggle('show');
    
    // Close dropdown when clicking outside
    document.addEventListener('click', function closeDropdown(e) {
        if (!e.target.closest('.menu-item-with-dropdown')) {
            dropdown.classList.remove('show');
            document.removeEventListener('click', closeDropdown);
        }
    });
}

// Prevent dropdown from closing when clicking inside
document.addEventListener('click', function(e) {
    if (e.target.closest('.dropdown-menu')) {
        e.stopPropagation();
    }
});
        // Get teacher ID from token
        function getTeacherId() {
            const token = localStorage.getItem('token');
            if (!token) return null;
            
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                const username = payload.sub;
                // Simple mapping - update based on your user IDs
                const mapping = {
                    'teacherA': 1,
                    'teacherB': 2,
                    'teacherC': 3
                };
                return mapping[username] || 1;
            } catch (error) {
                console.error('Token error:', error);
                return 1;
            }
        }

            window.location.href = 'dashboard.html';
        }
        
        function showCreateForm() {
            document.getElementById('createForm').style.display = 'block';
            document.getElementById('assignmentsSection').style.display = 'none';
            
            // Set default due date to tomorrow
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('dueDate').value = tomorrow.toISOString().slice(0, 16);
        }
        
        function hideCreateForm() {
            document.getElementById('createForm').style.display = 'none';
            document.getElementById('assignmentsSection').style.display = 'block';
            clearForm();
        }
        
        function clearForm() {
            document.getElementById('title').value = '';
            document.getElementById('description').value = '';
            document.getElementById('subject').value = '';
            document.getElementById('branch').value = '';
            document.getElementById('semester').value = '';
            document.getElementById('maxMarks').value = '';
            document.getElementById('attachmentUrl').value = '';
        }
        
        // Load assignments
        function loadAssignments() {
    const teacherId = getTeacherId();

    const url = `http://localhost:8080/teacher/assignment?teacherId=${teacherId}`;

    fetch(url, {
        headers: {
            'Authorization': 'Bearer ' + localStorage.getItem('token')
        }
    })
    .then(response => {
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        return response.json();
    })
    .then(assignments => {
        displayAssignments(assignments);
    })
    .catch(error => {
        console.error('Error:', error);
        document.getElementById('assignmentsContainer').innerHTML = `
            <div style="color: #dc2626; background: #fef2f2; border-radius:12px; padding:2rem; text-align:center; border:1px solid #fecaca;">
                <i class="fas fa-exclamation-triangle" style="font-size:2rem; margin-bottom:1rem; color:#dc2626;"></i>
                <p>Error loading assignments: ${error.message}</p>
            </div>
        `;
    });
}
        
        // Display assignments
        function displayAssignments(assignments) {
            const container = document.getElementById('assignmentsContainer');
            
            if (!assignments || assignments.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-folder-open fa-2x"></i><p>No assignments found. Create your first assignment!</p></div>';
                return;
            }
            
            let html = '<table>';
            html += `
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Subject</th>
                        <th>Branch</th>
                        <th>Semester</th>
                        <th>Due Date</th>
                        <th>Max Marks</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
            `;
            
            assignments.forEach(assignment => {
                const dueDate = assignment.dueDate ? new Date(assignment.dueDate).toLocaleString() : 'Not set';
                
                html += `
                    <tr>
                        <td><span style="font-weight:500;">${assignment.title}</span></td>
                        <td>${assignment.subject || '-'}</td>
                        <td>${assignment.branch || '-'}</td>
                        <td>${assignment.semester || '-'}</td>
                        <td>${dueDate}</td>
                        <td>${assignment.maxMarks || '-'}</td>
                        <td>
                            <div class="action-btns">
                                <button class="icon-btn" onclick="viewAssignment(${assignment.id})" title="View details"><i class="fas fa-eye"></i> <span>View</span></button>
                                <button class="icon-btn" onclick="viewStats(${assignment.id})" title="Statistics"><i class="fas fa-chart-bar"></i> <span>Stats</span></button>
                                <button class="icon-btn delete-btn" onclick="deleteAssignment(${assignment.id})" title="Delete"><i class="fas fa-trash-alt"></i> <span>Delete</span></button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        // Create assignment
        function createAssignment() {
            const teacherId = getTeacherId();
            
            // Validation
            const title = document.getElementById('title').value;
            const subject = document.getElementById('subject').value;
            const branch = document.getElementById('branch').value;
            const semester = document.getElementById('semester').value;
            
            if (!title || !subject || !branch || !semester) {
                alert('Please fill all required fields');
                return;
            }
            
            const assignmentData = {
                title: title,
                description: document.getElementById('description').value,
                subject: subject,
                branch: branch,
                semester: parseInt(semester),
                maxMarks: parseInt(document.getElementById('maxMarks').value) || 100,
                dueDate: document.getElementById('dueDate').value + ':00',
                attachmentUrl: document.getElementById('attachmentUrl').value || null,
                createdBy: teacherId
            };
            
            console.log('Creating:', assignmentData);
            
            fetch('http://localhost:8080/teacher/assignment', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + localStorage.getItem('token'),
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(assignmentData)
            })
            .then(response => {
                if (!response.ok) {
                    return response.text().then(text => { throw new Error(text) });
                }
                return response.json();
            })
            .then(data => {
                alert('✅ Assignment created successfully!');
                hideCreateForm();
                loadAssignments();
            })
            .catch(error => {
                console.error('Error:', error);
                alert('❌ Failed to create assignment: ' + error.message);
            });
        }
        
        // View assignment details
        function viewAssignment(assignmentId) {
            fetch(`http://localhost:8080/teacher/assignment/${assignmentId}`, {
                headers: {
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                }
            })
            .then(response => response.json())
            .then(assignment => {
                const dueDate = assignment.dueDate ? new Date(assignment.dueDate).toLocaleString() : 'Not set';
                const createdAt = assignment.createdAt ? new Date(assignment.createdAt).toLocaleString() : 'Unknown';
                
                alert(`📋 Assignment Details\n
Title: ${assignment.title}
Subject: ${assignment.subject}
Branch: ${assignment.branch}
Semester: ${assignment.semester}
Max Marks: ${assignment.maxMarks}
Due Date: ${dueDate}
Created: ${createdAt}
Description: ${assignment.description || 'No description'}
Attachment: ${assignment.attachmentUrl || 'None'}`);
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error loading assignment details');
            });
        }
        
        // View statistics
        function viewStats(assignmentId) {
            fetch(`http://localhost:8080/teacher/assignment/${assignmentId}/stats`, {
                headers: {
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                }
            })
            .then(response => response.json())
            .then(stats => {
                let message = '📊 Assignment Statistics\n\n';
                message += `Total Students: ${stats.totalStudents || 0}\n`;
                message += `Viewed: ${stats.viewed || 0}\n`;
                message += `Submitted: ${stats.submitted || 0}\n`;
                message += `Not Viewed: ${stats.notViewed || 0}\n`;
                
                if (stats.totalStudents > 0) {
                    const viewPercent = ((stats.viewed || 0) * 100 / stats.totalStudents).toFixed(1);
                    const submitPercent = ((stats.submitted || 0) * 100 / stats.totalStudents).toFixed(1);
                    message += `\nView Rate: ${viewPercent}%\n`;
                    message += `Submit Rate: ${submitPercent}%`;
                }
                
                alert(message);
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error loading statistics');
            });
        }
        
        // Delete assignment
        function deleteAssignment(assignmentId) {
            if (!confirm('⚠️ Are you sure you want to delete this assignment?\nThis action cannot be undone.')) {
                return;
            }
            
            fetch(`http://localhost:8080/teacher/assignment/${assignmentId}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                }
            })
            .then(response => {
                if (response.ok) {
                    alert('✅ Assignment deleted successfully!');
                    loadAssignments();
                } else {
                    alert('❌ Failed to delete assignment');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error deleting assignment');
            });
        }
        
        // Filter functions
        function applyFilter() {
    loadAssignments();
}

function clearFilter() {
    document.getElementById('filterBranch').value = '';
    document.getElementById('filterSubject').value = '';
    loadAssignments();
}
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '../login.html';
                return;
            }
            
            loadAssignments();
        });
    </script>
